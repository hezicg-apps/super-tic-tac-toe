<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        signInAnonymously(auth);

        // פונקציית הצטרפות (Join) עם חלון טעינה
        window.joinGame = async (id) => {
            if (!id) return;
            
            // הצגת חלון טעינה עם אנימציית XOXO
            showModal('loadingModal');

            // המתנה קבועה של 3 שניות (זמן טעינה ויזואלי ובטוח למשיכת נתונים)
            await new Promise(resolve => setTimeout(resolve, 3000));

            const snap = await getDoc(doc(db, 'games', id));
            if (snap.exists()) {
                window.gameId = id; window.myRole = "O"; window.gameMode = "online";
                window.vocabulary = snap.data().vocabulary;
                await updateDoc(doc(db, 'games', id), { status: "playing" });
                listenToGame();
                // הסרת חלון הטעינה רק לאחר שהנתונים נמשכו והחיבור בוצע
                hideModal('loadingModal');
            } else {
                hideModal('loadingModal');
                alert("קוד משחק לא בתוקף");
            }
        };

        // יצירת משחק ושליחת לינק קצר (בלי מילים בתוך הלינק)
        window.startOnline = async () => {
            if (window.vocabulary.length < 3) return showModal('errorModal');
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            window.gameId = id; window.myRole = "X"; window.gameMode = "online";
            
            await setDoc(doc(db, 'games', id), {
                board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] },
                status: "waiting", vocabulary: window.vocabulary
            });

            const baseUrl = "https://hezicg-apps.github.io/super-tic-tac-toe/";
            const shortLink = `${baseUrl}?game=${id}`; // לינק קצר ומבריק
            const msg = `בוא לשחק איתי!%0Aלחץ להצטרפות ישירה:%0A${shortLink}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');

            document.getElementById('lobbyButtons').classList.add('hidden');
            document.getElementById('onlineWaiting').classList.remove('hidden');
            document.getElementById('displayCode').textContent = id;
            listenToGame();
        };

        function listenToGame() {
            onSnapshot(doc(db, 'games', window.gameId), (snap) => {
                const data = snap.data();
                if (!data) return;
                window.state = data;
                if (data.status === "playing" || data.status === "ready_to_move") {
                    hideModal('lobbyModal');
                    updateUI();
                    if (data.status === "playing" && data.currentPlayer === window.myRole) showQuiz();
                }
            });
        }

        // בדיקה אוטומטית בטעינה להצטרפות מהלינק
        window.checkDeepLink = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameCode = urlParams.get('game');
            if (gameCode) {
                window.joinGame(gameCode);
            }
        };
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; overflow: hidden; }
        
        /* כותרות נֵאוֹן */
        .title-super { color: #fff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; font-size: 3.8rem; font-weight: 900; font-style: italic; line-height: 0.9; }
        .title-ttt { color: #fff; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; font-size: 3.2rem; font-weight: 900; font-style: italic; }

        /* כפתורי מסך פתיחה */
        .btn-lobby { width: 100%; max-width: 320px; height: 60px; border: 2px solid #facc15; border-radius: 18px; color: #facc15; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; background: none; cursor: pointer; }
        .btn-fill { background: #facc15; color: #000; }
        .btn-green { background: #16a34a; border: none; color: #fff; }
        .input-lobby { width: 100%; max-width: 320px; height: 60px; background: transparent; border: 2px solid #facc15; border-radius: 18px; text-align: center; color: #fff; margin-bottom: 12px; outline: none; }

        /* לוח משחק (#) */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); width: 90vw; max-width: 360px; margin: 20px auto; position: relative; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; cursor: pointer; position: relative; border-color: #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(7), .cell:nth-child(8) { border-left: 4px solid #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 4px solid #fff; }

        .x-style { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; border-color: #00f2ff !important; }
        .o-style { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; border-color: #bc13fe !important; }
        
        /* מודלים */
        .modal-full { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .modal-full.active { display: flex; }
        .quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }

        .btn-option { background: #111; border: 2px solid #fff; padding: 20px; margin: 10px 0; border-radius: 15px; width: 100%; font-size: 1.4rem; font-weight: bold; }
        .opacity-30 { opacity: 0.3 !important; }

        /* סימן שאלה פועם */
        .btn-help { position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00f2ff; color: #00f2ff; font-size: 1.5rem; font-weight: bold; background: none; animation: pulse-blue 2s infinite ease-in-out; }
        @keyframes pulse-blue { 0%, 100% { box-shadow: 0 0 5px #00f2ff; transform: scale(1); } 50% { box-shadow: 0 0 20px #00f2ff; transform: scale(1.1); } }

        /* עיצוב חלון טעינה (XOXO מהבהב כמו הלוגו) */
        .loading-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 120px; height: 120px; }
        .load-symbol { font-size: 4rem; font-weight: 900; opacity: 0.1; transition: opacity 0.3s; line-height: 1; }
        
        /* אנימציה מהבהבת בכיוון השעון */
        @keyframes xoxo-blink { 
            0%, 25% { opacity: 1; } 
            30%, 100% { opacity: 0.1; } 
        }

        /* למעלה-שמאל (X כחול) */
        .load-symbol:nth-child(1) { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; animation: xoxo-blink 2s infinite 0s; }
        /* למעלה-ימין (O סגול) */
        .load-symbol:nth-child(2) { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; animation: xoxo-blink 2s infinite 0.5s; }
        /* למטה-ימין (X כחול) */
        .load-symbol:nth-child(3) { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; animation: xoxo-blink 2s infinite 1s; }
        /* למטה-שמאל (O סגול) */
        .load-symbol:nth-child(4) { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; animation: xoxo-blink 2s infinite 1.5s; }
    </style>
</head>
<body onload="checkDeepLink()">

    <div id="turnBar" class="h-16 flex items-center justify-center border-b border-zinc-800 text-2xl font-bold">
        <span id="turnIcon" class="ml-2 font-black">✕</span> תור השחקן
    </div>

    <div class="board" id="mainBoard">
        <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
        <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
        <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
    </div>

    <div id="lobbyModal" class="modal-full modal-full.active">
        <button class="btn-help" onclick="showRules()">?</button>
        <div class="mb-12">
            <div class="game-title title-super">SUPER</div>
            <div class="game-title title-ttt">TIC TAC TOE</div>
        </div>
        <div id="lobbyButtons" class="w-full max-w-xs">
            <button onclick="openEditor()" class="btn-lobby italic">לחצו להוספת מילים למשחק</button>
            <button onclick="startGame('ai')" class="btn-lobby btn-fill text-xl">משחק נגד AI</button>
            <button onclick="startGame('friend')" class="btn-lobby">משחק 1:1</button>
            <p class="text-yellow-400 text-[10px] text-center font-bold tracking-widest mt-4 mb-2 uppercase">Multiplayer Mode</p>
            <button onclick="startOnline()" class="btn-lobby btn-green text-lg">משחק אונליין (שלח לינק)</button>
            <input type="text" id="joinInput" placeholder="או הדבק קוד כאן" class="input-lobby">
            <button onclick="joinGame(document.getElementById('joinInput').value)" class="btn-lobby">הצטרף</button>
        </div>
        <div id="onlineWaiting" class="hidden text-center">
            <p class="text-gray-500 mb-2">קוד המשחק שלך:</p>
            <div id="displayCode" class="text-6xl font-bold text-white mb-8"></div>
            <p class="animate-pulse text-yellow-500">מחכה לחבר/ה שייכנסו מהלינק...</p>
        </div>
    </div>

    <div id="loadingModal" class="modal-full modal-full.active" style="display:none; z-index: 3000;">
        <div class="loading-container">
            <div class="load-symbol">✕</div> <div class="load-symbol">◯</div> <div class="load-symbol">◯</div> <div class="load-symbol">✕</div> </div>
        <p class="mt-8 text-xl text-gray-400 italic font-medium">מתחבר לחדר המשחק וטוען מילים...</p>
    </div>

    <div id="quizModal" class="quiz-overlay">
        <div id="quizContent" class="w-full max-w-xs text-center">
            <h2 id="questionText" class="text-6xl font-black mb-10 italic"></h2>
            <div id="optionsContainer"></div>
        </div>
        <div id="planningArea" class="hidden flex-col items-center">
            <p class="text-3xl mb-8 text-green-400 font-bold">תשובה נכונה!</p>
            <button onclick="closeQuizAndContinue()" class="btn-lobby btn-fill">המשך ללוח</button>
        </div>
    </div>

    <div id="vocabModal" class="modal-full" style="display:none;">
        <div class="w-full max-w-md bg-zinc-900 p-6 rounded-2xl border border-zinc-700">
            <h2 class="text-white font-bold mb-4 italic uppercase">עריכת אוצר מילים</h2>
            <textarea id="vocabInput" class="w-full h-48 bg-black text-white p-4 border border-zinc-700 rounded-lg font-mono mb-4" placeholder="Dog - כלב"></textarea>
            <button onclick="saveVocab()" class="btn-lobby btn-fill w-full">שמור מילים</button>
            <button onclick="closeModal('vocabModal')" class="w-full text-zinc-500 text-sm mt-2">סגור</button>
        </div>
    </div>

    <script>
        window.vocabulary = [];
        window.state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "lobby" };
        window.gameMode = "ai";

        function showModal(id) { 
            const m = document.getElementById(id);
            m.style.display = 'flex';
            if (!m.classList.contains('active')) m.classList.add('active'); 
        }
        function hideModal(id) { 
            const m = document.getElementById(id);
            if (m.classList.contains('active')) m.classList.remove('active');
            m.style.display = 'none';
        }

        function openEditor() { showModal('vocabModal'); }
        function closeModal(id) { hideModal(id); }
        function saveVocab() {
            vocabulary = document.getElementById('vocabInput').value.split('\n').map(line => {
                const p = line.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i !== null);
            closeModal('vocabModal');
        }

        function startGame(mode) {
            if (vocabulary.length < 3) {
                alert("יש להוזין לפחות 3 מילים בעריכת המילים!");
                return;
            }
            gameMode = mode;
            state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "playing" };
            hideModal('lobbyModal');
            updateUI();
            showQuiz();
        }

        function updateUI() {
            const bar = document.getElementById('turnBar');
            const icon = document.getElementById('turnIcon');
            const isX = state.currentPlayer === 'X';
            
            bar.className = `h-16 flex items-center justify-center border-b text-2xl font-bold ${isX ? 'x-style' : 'o-style'}`;
            bar.style.borderColor = isX ? '#00f2ff' : '#bc13fe';
            icon.textContent = isX ? "✕" : "◯";

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = `cell ${val === 'X' ? 'x-style' : (val === 'O' ? 'o-style' : '')}`;
                const isOldestX = state.history.X.length === 3 && state.history.X[0] === i;
                const isOldestO = state.history.O.length === 3 && state.history.O[0] === i;
                if (isOldestX || isOldestO) cell.classList.add('opacity-30');
            });
        }

        function showQuiz() {
            const item = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random() * vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const color = state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            const qTxt = document.getElementById('questionText');
            qTxt.textContent = item.en;
            qTxt.style.color = color;
            qTxt.style.textShadow = `0 0 15px ${color}`;

            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('planningArea').classList.add('hidden');
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.style.borderColor = color;
                btn.textContent = o;
                btn.onclick = () => {
                    if (o === item.he) {
                        state.status = "ready_to_move";
                        document.getElementById('quizContent').classList.add('hidden');
                        document.getElementById('planningArea').classList.remove('hidden');
                    } else {
                        alert("טעות! התור עובר לשחקן הבא.");
                        state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
                        updateUI();
                        hideModal('quizModal');
                        if (gameMode === "ai" && state.currentPlayer === "O") setTimeout(aiMove, 1000);
                        else setTimeout(showQuiz, 500);
                    }
                };
                container.appendChild(btn);
            });
            showModal('quizModal');
            speak(item.en);
        }

        function closeQuizAndContinue() {
            hideModal('quizModal');
        }

        function cellClick(i) {
            if (state.status !== "ready_to_move" || state.board[i] !== "") return;
            state.board[i] = state.currentPlayer;
            state.history[state.currentPlayer].push(i);
            if (state.history[state.currentPlayer].length > 3) state.board[state.history[state.currentPlayer].shift()] = "";
            if (checkWin()) { confetti(); alert(state.currentPlayer + " ניצח!"); location.reload(); return; }
            state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
            state.status = "playing";
            updateUI();
            if (gameMode === "ai" && state.currentPlayer === "O") setTimeout(aiMove, 1000);
            else setTimeout(showQuiz, 300);
        }

        function aiMove() {
            const empty = state.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                const randomIdx = empty[Math.floor(Math.random() * empty.length)];
                state.board[randomIdx] = "O";
                state.history.O.push(randomIdx);
                if (state.history.O.length > 3) state.board[state.history.O.shift()] = "";
                if (checkWin()) { alert("ה-AI ניצח!"); location.reload(); return; }
                state.currentPlayer = "X";
                state.status = "playing";
                updateUI();
                showQuiz();
            }
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => state.board[p[0]] && state.board[p[0]] === state.board[p[1]] && state.board[p[0]] === state.board[p[2]]);
        }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function showRules() { alert("חוקים:\n1. עונים נכון על שאלה.\n2. מסמנים בלוח.\n3. מותר רק 3 סימנים - הרביעי מוחק את הראשון (שמופיע שקוף)."); }
    </script>
</body>
</html>
