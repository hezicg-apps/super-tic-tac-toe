<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tic Tac Toe - 9x9</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Varela Round', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        .main-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 95vw; max-width: 500px; margin: 10px auto;
            background: #333; padding: 10px; border-radius: 12px;
        }
        .sub-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 4px; background: #222; padding: 4px; border-radius: 8px;
            position: relative; aspect-ratio: 1;
        }
        .cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: bold; background: #0a0a0a; border-radius: 4px;
            cursor: pointer; border: 1px solid #1a1a1a;
        }
        .cell.active-target { border: 2px solid #facc15; box-shadow: inset 0 0 5px #facc15; }
        .sub-grid.won-x::after, .sub-grid.won-o::after {
            content: attr(data-winner);
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; border-radius: 8px; z-index: 10;
        }
        .sub-grid.won-x::after { content: "✕"; color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .sub-grid.won-o::after { content: "◯"; color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        
        .x-neon { color: #00f2ff; } .o-neon { color: #bc13fe; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .btn-game { height: 55px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px solid #facc15; color: #facc15; }
        .btn-yellow-solid { background: #facc15; color: #000; }
        .sets-scroll { display: flex; gap: 8px; overflow-x: auto; width: 100%; padding: 10px 0; scrollbar-width: none; }
        textarea { background: #050505; color: #0f0; padding: 12px; border: 1px solid #333; width: 100%; height: 180px; border-radius: 10px; font-family: monospace; direction: ltr; }
        .btn-option { background: #111; border: 2px solid #333; padding: 12px; border-radius: 12px; min-height: 55px; }
        .highlight-grid { outline: 4px solid #facc15; z-index: 5; }
    </style>
</head>
<body>
    <div id="turnBar" class="h-[60px] flex items-center justify-center font-bold bg-[#111] border-b border-[#222]">
        <span id="playerDisplay" class="x-neon text-xl">תור השחקן: X</span>
    </div>
    
    <div id="mainBoard" class="main-grid">
        <!-- 9 Sub-grids will be generated here -->
    </div>

    <div id="lobbyModal" class="modal">
        <h1 class="text-3xl font-black mb-8 italic">SUPER TIC TAC TOE</h1>
        <div id="lobbyInputs" class="w-full max-w-xs space-y-4">
            <button onclick="openVocabEditor()" class="btn-game">נהל מילים ופרקים</button>
            <button onclick="startGame('ai')" class="btn-game btn-yellow-solid">נגד המחשב</button>
            <button onclick="startGame('friend')" class="btn-game">שני שחקנים בכיתה</button>
        </div>
    </div>

    <div id="vocabModal" class="modal">
        <div class="w-full max-w-md bg-zinc-900 p-6 rounded-2xl">
            <h2 class="text-white font-bold mb-4">פרקים ומילים</h2>
            <div id="setsContainer" class="sets-scroll"></div>
            <textarea id="vocabInput" placeholder="Apple - תפוח"></textarea>
            <button onclick="saveCurrentSet()" class="text-yellow-500 text-xs mt-2 underline">שמור כפרק חדש</button>
            <div class="mt-6 flex gap-2">
                <button onclick="saveVocab()" class="btn-game btn-yellow-solid">השתמש ברשימה</button>
                <button onclick="closeModal('vocabModal')" class="btn-game border-zinc-700 text-zinc-500">סגור</button>
            </div>
        </div>
    </div>

    <div id="quizModal" class="modal">
        <h2 id="questionText" class="text-5xl font-black mb-12 text-center w-full px-4 break-words"></h2>
        <div id="optionsContainer" class="w-full max-w-xs px-2"></div>
    </div>
    
    <div id="resultModal" class="modal">
        <h2 id="resultTitle" class="text-5xl font-bold mb-10 text-center"></h2>
        <button onclick="location.reload()" class="btn-game bg-white text-black w-48 font-bold">שחק שוב</button>
    </div>

    <script>
        let vocabulary = [], gameMode = "ai", currentPlayer = "X";
        let mainBoard = Array(9).fill(null).map(() => Array(9).fill("")); // 9 grids of 9 cells
        let gridWinners = Array(9).fill(""); // Winners of each sub-grid
        let activeGrid = -1; // -1 means player can move in any grid
        let pendingMove = null;
        let sets = JSON.parse(localStorage.getItem('teacher_sets')) || {};

        function init() {
            const board = document.getElementById('mainBoard');
            board.innerHTML = '';
            for (let g = 0; g < 9; g++) {
                const subGrid = document.createElement('div');
                subGrid.className = 'sub-grid';
                subGrid.id = `grid-${g}`;
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => handleMoveRequest(g, c);
                    subGrid.appendChild(cell);
                }
                board.appendChild(subGrid);
            }
            renderSets();
            document.getElementById('lobbyModal').classList.add('active');
        }

        function handleMoveRequest(gridIdx, cellIdx) {
            if (gridWinners[gridIdx] !== "" || mainBoard[gridIdx][cellIdx] !== "") return;
            if (activeGrid !== -1 && activeGrid !== gridIdx) return;
            
            pendingMove = { gridIdx, cellIdx };
            showQuiz();
        }

        function executeMove() {
            const { gridIdx, cellIdx } = pendingMove;
            mainBoard[gridIdx][cellIdx] = currentPlayer;
            
            // Update UI
            const cell = document.querySelector(`#grid-${gridIdx}`).children[cellIdx];
            cell.textContent = currentPlayer === "X" ? "✕" : "◯";
            cell.className = `cell ${currentPlayer === "X" ? "x-neon" : "o-neon"}`;

            // Check if sub-grid is won
            const subWinner = checkWinner(mainBoard[gridIdx]);
            if (subWinner) {
                gridWinners[gridIdx] = subWinner;
                const gridDiv = document.getElementById(`grid-${gridIdx}`);
                gridDiv.classList.add(subWinner === "X" ? 'won-x' : 'won-o');
                
                // Check if main game is won
                const finalWinner = checkWinner(gridWinners);
                if (finalWinner) {
                    endGame(finalWinner);
                    return;
                }
            }

            // Route to next grid
            if (gridWinners[cellIdx] === "") {
                activeGrid = cellIdx;
            } else {
                activeGrid = -1; // Any open grid
            }

            // Check for Draw (Board full)
            if (gridWinners.every(w => w !== "") || (activeGrid === -1 && gridWinners.every((w, i) => w !== "" || mainBoard[i].every(c => c !== "")))) {
                 endGame("Draw");
                 return;
            }

            // Switch Player
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            updateUI();

            if (gameMode === "ai" && currentPlayer === "O") {
                setTimeout(aiMove, 600);
            }
        }

        function aiMove() {
            let gIdx = activeGrid === -1 ? Math.floor(Math.random()*9) : activeGrid;
            while(gridWinners[gIdx] !== "" || mainBoard[gIdx].every(c => c !== "")) {
                gIdx = Math.floor(Math.random()*9);
            }
            
            const empties = mainBoard[gIdx].map((v, i) => v === "" ? i : null).filter(v => v !== null);
            const cIdx = empties[Math.floor(Math.random()*empties.length)];
            
            pendingMove = { gridIdx: gIdx, cellIdx: cIdx };
            // In AI mode O doesn't quiz, or quizzes automatically
            executeMove();
        }

        function checkWinner(b) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let p of w) if (b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) return b[p[0]];
            return null;
        }

        function updateUI() {
            const display = document.getElementById('playerDisplay');
            display.textContent = `תור השחקן: ${currentPlayer}`;
            display.className = currentPlayer === "X" ? "x-neon text-xl" : "o-neon text-xl";

            for(let i=0; i<9; i++) {
                const grid = document.getElementById(`grid-${i}`);
                grid.classList.remove('highlight-grid');
                if (activeGrid === i || (activeGrid === -1 && gridWinners[i] === "")) {
                    grid.classList.add('highlight-grid');
                }
            }
        }

        function showQuiz() {
            const item = vocabulary[Math.floor(Math.random()*vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random()-0.5);
            
            const qText = document.getElementById('questionText');
            qText.textContent = item.en;
            qText.style.fontSize = item.en.length > 10 ? '2.5rem' : '4rem';

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "btn-option w-full mb-2 text-center break-words leading-tight";
                b.style.fontSize = o.length > 12 ? '1.1rem' : '1.3rem';
                b.textContent = o;
                b.onclick = () => {
                    if (o === item.he) {
                        document.getElementById('quizModal').classList.remove('active');
                        executeMove();
                    } else {
                        alert("טעות! התור עובר");
                        document.getElementById('quizModal').classList.remove('active');
                        currentPlayer = currentPlayer === "X" ? "O" : "X";
                        updateUI();
                        if(gameMode === "ai" && currentPlayer === "O") setTimeout(aiMove, 600);
                    }
                };
                container.appendChild(b);
            });
            document.getElementById('quizModal').classList.add('active');
            const u = new SpeechSynthesisUtterance(item.en); u.lang = 'en-US'; window.speechSynthesis.speak(u);
        }

        function endGame(winner) {
            const title = document.getElementById('resultTitle');
            if (winner === "Draw") title.textContent = "תיקו!";
            else {
                title.textContent = `שחקן ${winner} ניצח את הלוח!`;
                confetti();
            }
            document.getElementById('resultModal').classList.add('active');
        }

        // --- Utils & Vocab Management ---
        function parseVocab(text) {
            vocabulary = text.split('\n').map(line => {
                const parts = line.split(/[-:,/|]|\s{2,}/); 
                return parts.length >= 2 ? { en: parts[0].trim(), he: parts[1].trim() } : null;
            }).filter(i => i !== null);
        }

        window.saveCurrentSet = () => {
            const name = prompt("שם לפרק:");
            if (name) {
                sets[name] = document.getElementById('vocabInput').value;
                localStorage.setItem('teacher_sets', JSON.stringify(sets));
                renderSets();
            }
        };

        window.loadSet = (name) => { document.getElementById('vocabInput').value = sets[name]; };
        window.deleteSet = (name) => { if(confirm(`למחוק את ${name}?`)) { delete sets[name]; localStorage.setItem('teacher_sets', JSON.stringify(sets)); renderSets(); } };

        function renderSets() {
            const container = document.getElementById('setsContainer');
            container.innerHTML = Object.keys(sets).map(name => `
                <div class="flex items-center bg-zinc-800 rounded-full px-3 py-1 gap-2 whitespace-nowrap">
                    <button onclick="loadSet('${name}')" class="text-xs text-white">${name}</button>
                    <button onclick="deleteSet('${name}')" class="text-red-500 font-bold">×</button>
                </div>
            `).join('');
        }

        window.startGame = (mode) => {
            parseVocab(document.getElementById('vocabInput').value);
            if (vocabulary.length < 3) return alert("הכנס לפחות 3 מילים");
            gameMode = mode;
            document.getElementById('lobbyModal').classList.remove('active');
            updateUI();
        };

        window.saveVocab = () => {
            parseVocab(document.getElementById('vocabInput').value);
            if (vocabulary.length >= 3) document.getElementById('vocabModal').classList.remove('active');
        };

        window.openVocabEditor = () => document.getElementById('vocabModal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        init();
    </script>
</body>
</html>
