<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        signInAnonymously(auth);

        // משתני משחק
        window.vocabulary = [];
        window.state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "lobby" };
        window.gameMode = "ai";
        window.gameId = "";
        window.myRole = "X";

        // פונקציות ניהול משחק
        window.startGame = (mode) => {
            if (window.vocabulary.length < 3) return alert("יש להוסיף מילים קודם!");
            window.gameMode = mode;
            window.state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "playing" };
            document.getElementById('lobbyModal').style.display = 'none';
            updateUI();
            showQuiz();
        };

        window.createOnline = async () => {
            if (window.vocabulary.length < 3) return alert("יש להוסיף מילים קודם!");
            window.gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            window.myRole = "X";
            window.gameMode = "online";
            await setDoc(doc(db, 'games', window.gameId), {
                board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "waiting", vocabulary: window.vocabulary
            });
            listenToGame();
            document.getElementById('lobbyInputs').classList.add('hidden');
            document.getElementById('onlineCodeArea').classList.remove('hidden');
            document.getElementById('displayCode').textContent = window.gameId;
        };

        window.joinOnline = async () => {
            const id = document.getElementById('joinInput').value.toUpperCase();
            if (!id) return;
            const snap = await getDoc(doc(db, 'games', id));
            if (snap.exists()) {
                window.gameId = id;
                window.myRole = "O";
                window.gameMode = "online";
                window.vocabulary = snap.data().vocabulary;
                await updateDoc(doc(db, 'games', id), { status: "playing" });
                listenToGame();
                document.getElementById('lobbyModal').style.display = 'none';
            }
        };

        function listenToGame() {
            onSnapshot(doc(db, 'games', window.gameId), (snap) => {
                const data = snap.data();
                if (!data) return;
                window.state = data;
                if (data.status === "playing" || data.status === "ready_to_move") {
                    document.getElementById('lobbyModal').style.display = 'none';
                    updateUI();
                    if (data.status === "playing" && data.currentPlayer === window.myRole) showQuiz();
                }
            });
        }

        window.cellClick = async (i) => {
            if (window.state.status !== "ready_to_move") return;
            if (window.gameMode === "online" && window.state.currentPlayer !== window.myRole) return;
            if (window.state.board[i] !== "") return;

            let newBoard = [...window.state.board];
            let newHistory = {...window.state.history};
            newBoard[i] = window.state.currentPlayer;
            newHistory[window.state.currentPlayer].push(i);

            if (newHistory[window.state.currentPlayer].length > 3) {
                const old = newHistory[window.state.currentPlayer].shift();
                newBoard[old] = "";
            }

            const win = checkWin(newBoard);
            const nextPlayer = window.state.currentPlayer === "X" ? "O" : "X";
            const updates = { 
                board: newBoard, history: newHistory, 
                currentPlayer: nextPlayer, 
                status: win ? "finished" : "playing",
                winner: win ? window.state.currentPlayer : null
            };

            if (window.gameMode === "online") {
                await updateDoc(doc(db, 'games', window.gameId), updates);
            } else {
                window.state = {...window.state, ...updates};
                updateUI();
                if (win) { confetti(); alert(updates.winner + " ניצח!"); location.reload(); }
                else if (window.gameMode === "ai" && nextPlayer === "O") setTimeout(aiMove, 1000);
                else showQuiz();
            }
        };
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        /* מסך פתיחה - שחזור מדויק */
        .modal-lobby { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .game-title { font-size: 3.5rem; font-weight: 900; line-height: 1.1; font-style: italic; text-align: center; }
        .title-x { color: #fff; text-shadow: 0 0 15px #00f2ff; }
        .title-o { color: #fff; text-shadow: 0 0 15px #bc13fe; }

        .btn-gold { width: 100%; max-width: 320px; height: 65px; border: 2px solid #facc15; border-radius: 20px; color: #facc15; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .btn-gold-fill { background: #facc15; color: #000; }
        .btn-green { background: #16a34a; border: none; color: #fff; }
        .input-dark { width: 100%; max-width: 320px; height: 65px; background: transparent; border: 2px solid #facc15; border-radius: 20px; text-align: center; color: #fff; margin-bottom: 15px; outline: none; }

        .btn-help { position: absolute; top: 25px; left: 25px; width: 45px; height: 45px; border: 2px solid #00f2ff; border-radius: 50%; color: #00f2ff; font-weight: bold; font-size: 1.5rem; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; background: none; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px #00f2ff; } 50% { box-shadow: 0 0 20px #00f2ff; } }

        /* לוח # קלאסי */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); width: 90vw; max-width: 360px; margin: 25px auto; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; cursor: pointer; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(7), .cell:nth-child(8) { border-left: 4px solid #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 4px solid #fff; }

        .x-color { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; border-color: #00f2ff !important; }
        .o-color { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; border-color: #bc13fe !important; }
        .opacity-30 { opacity: 0.3 !important; }

        .quiz-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .btn-option { width: 100%; max-width: 300px; padding: 20px; border: 2px solid #fff; border-radius: 15px; margin: 10px 0; font-size: 1.4rem; font-weight: bold; background: #111; }
    </style>
</head>
<body>

    <div id="lobbyModal" class="modal-lobby">
        <button class="btn-help" onclick="alert('חוקים: 3 סימנים לכל שחקן. הרביעי מוחק את הראשון.')">?</button>
        <div class="mb-12">
            <div class="game-title title-x">SUPER</div>
            <div class="game-title title-o">TIC TAC TOE</div>
        </div>
        <div id="lobbyInputs" class="w-full flex flex-col items-center">
            <button onclick="document.getElementById('vocabEditor').style.display='flex'" class="btn-gold italic">לחצו להוספת מילים למשחק</button>
            <button onclick="startGame('ai')" class="btn-gold btn-gold-fill">משחק נגד AI</button>
            <button onclick="startGame('friend')" class="btn-gold">משחק 1:1</button>
            <div class="text-[10px] text-yellow-500 font-bold tracking-widest my-4 uppercase">Multiplayer Mode</div>
            <button onclick="createOnline()" class="btn-gold btn-green">משחק אונליין</button>
            <input type="text" id="joinInput" placeholder="קיבלתם קוד? פה מדביקים" class="input-dark">
            <button onclick="joinOnline()" class="btn-gold">הצטרף לחבר</button>
        </div>
        <div id="onlineCodeArea" class="hidden text-center">
            <p class="text-zinc-500 mb-2">שלח את הקוד לחבר:</p>
            <div id="displayCode" class="text-6xl font-bold text-white mb-8"></div>
            <p class="animate-pulse text-yellow-500">מחכה לשחקן נוסף...</p>
        </div>
    </div>

    <div id="turnBar" class="h-16 flex items-center justify-center border-b-4 text-2xl font-bold transition-all">
        <span id="turnIcon" class="ml-2 font-black">✕</span> תור השחקן
    </div>

    <div class="board">
        <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
        <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
        <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
    </div>

    <div id="quizModal" class="quiz-modal">
        <div id="quizMain">
            <h2 id="questionText" class="text-6xl font-black mb-12 italic"></h2>
            <div id="optionsContainer"></div>
        </div>
        <div id="planArea" class="hidden">
            <h2 class="text-3xl text-green-400 font-bold mb-8">תשובה נכונה!</h2>
            <button onclick="document.getElementById('quizModal').style.display='none'" class="btn-gold btn-gold-fill">המשך ללוח</button>
        </div>
    </div>

    <div id="vocabEditor" class="quiz-modal" style="display:none;">
        <div class="w-full max-w-xs">
            <textarea id="vocabInput" class="w-full h-48 bg-zinc-900 border border-zinc-700 rounded-xl p-4 text-white mb-4" placeholder="English - עברית"></textarea>
            <button onclick="saveVocab()" class="btn-gold btn-gold-fill w-full">שמור מילים</button>
        </div>
    </div>

    <script>
        function updateUI() {
            const bar = document.getElementById('turnBar');
            const isX = window.state.currentPlayer === 'X';
            bar.className = `h-16 flex items-center justify-center border-b-4 text-2xl font-bold transition-all ${isX ? 'x-color' : 'o-color'}`;
            document.getElementById('turnIcon').textContent = isX ? "✕" : "◯";

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = window.state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = "cell";
                if (val === 'X') cell.classList.add('x-color');
                if (val === 'O') cell.classList.add('o-color');
                
                const isOldest = (window.state.history.X.length === 3 && window.state.history.X[0] === i) || 
                                 (window.state.history.O.length === 3 && window.state.history.O[0] === i);
                if (isOldest) cell.classList.add('opacity-30');
            });
        }

        function showQuiz() {
            const item = window.vocabulary[Math.floor(Math.random()*window.vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, window.vocabulary.length)) {
                const r = window.vocabulary[Math.floor(Math.random()*window.vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const color = window.state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            document.getElementById('questionText').textContent = item.en;
            document.getElementById('questionText').style.color = color;
            document.getElementById('questionText').style.textShadow = `0 0 15px ${color}`;

            document.getElementById('quizMain').classList.remove('hidden');
            document.getElementById('planArea').classList.add('hidden');
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.style.borderColor = color;
                btn.textContent = o;
                btn.onclick = async () => {
                    if (o === item.he) {
                        window.state.status = "ready_to_move";
                        document.getElementById('quizMain').classList.add('hidden');
                        document.getElementById('planArea').classList.remove('hidden');
                        if (window.gameMode === "online") await updateDoc(doc(db, 'games', window.gameId), { status: "ready_to_move" });
                    } else {
                        alert("טעות!");
                        const next = window.state.currentPlayer === "X" ? "O" : "X";
                        if (window.gameMode === "online") await updateDoc(doc(db, 'games', window.gameId), { currentPlayer: next });
                        else { window.state.currentPlayer = next; updateUI(); showQuiz(); }
                    }
                };
                container.appendChild(btn);
            });
            document.getElementById('quizModal').style.display = 'flex';
            speak(item.en);
        }

        function saveVocab() {
            window.vocabulary = document.getElementById('vocabInput').value.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i);
            document.getElementById('vocabEditor').style.display = 'none';
        }

        function checkWin(b) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(p => b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]);
        }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
