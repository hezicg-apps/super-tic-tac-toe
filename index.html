<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Tic Tac Toe - V1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { 
            background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed;
        }
        
        .main-app { height: 100vh; display: flex; flex-direction: column; width: 100%; }
        
        .title-super { color: #fff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; font-size: 3.2rem; font-weight: 900; font-style: italic; line-height: 0.8; }
        .title-ttt { color: #fff; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; font-size: 2.8rem; font-weight: 900; font-style: italic; }
        .version-tag { color: #444; font-size: 0.75rem; font-weight: bold; margin-top: 4px; letter-spacing: 1px; }

        .btn-lobby { width: 85vw; max-width: 320px; height: 55px; border: 2px solid #facc15; border-radius: 18px; color: #facc15; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; background: none; }
        .btn-fill { background: #facc15; color: #000; }
        
        /* אזור המשחק - חלוקה קשיחה למניעת קפיצות */
        .game-header { height: 15vh; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        .game-body { height: 75vh; display: flex; align-items: center; justify-content: center; }
        
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            width: 85vw; height: 85vw; max-width: 380px; max-height: 380px;
            margin: 0 auto;
        }
        
        .cell { 
            display: flex; align-items: center; justify-content: center; 
            font-size: 5rem; font-weight: bold; line-height: 1;
        }
        /* גבולות הלוח */
        .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8) { border-left: 5px solid #fff; border-right: 5px solid #fff; }
        .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-top: 5px solid #fff; border-bottom: 5px solid #fff; }
        
        /* עיצוב סימנים */
        .x-ui { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; opacity: 1; transition: opacity 0.3s; }
        .o-ui { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; opacity: 1; transition: opacity 0.3s; }
        .fading { opacity: 0.3; } /* סימן שעומד להיעלם */

        .modal-full { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="main-app">
        <div id="lobbyModal" class="modal-full p-4">
            <div class="mb-8 text-center">
                <div class="title-super">SUPER</div>
                <div class="title-ttt">TIC TAC TOE</div>
                <div class="version-tag">VERSION 1.2</div>
            </div>
            <div class="flex flex-col items-center">
                <button onclick="document.getElementById('vocabModal').style.display='flex'" class="btn-lobby italic">לחצו להוספת מילים למשחק</button>
                <button onclick="startGame('ai')" class="btn-lobby btn-fill">משחק נגד AI</button>
                <button onclick="startGame('friend')" class="btn-lobby">משחק 1:1</button>
            </div>
        </div>

        <div id="gameContainer" style="display:none;" class="flex flex-col h-full w-full">
            <div class="game-header" id="turnBar">
                <span id="turnIcon" class="ml-3 text-5xl">✕</span>
                <span class="text-3xl font-bold">תור השחקן</span>
            </div>
            
            <div class="game-body">
                <div class="board">
                    <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
                    <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
                    <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vocabModal" style="display:none;" class="modal-full bg-black/95 z-[2000] p-6">
        <div class="bg-zinc-900 p-6 rounded-3xl w-full max-w-sm border-2 border-[#facc15]">
            <h2 class="text-white font-bold mb-4 italic">English - עברית</h2>
            <textarea id="vocabInput" placeholder="apple - תפוח" class="w-full h-48 bg-black text-white p-3 mb-4 rounded-xl border border-zinc-700 text-right"></textarea>
            <button onclick="saveVocab()" class="btn-lobby btn-fill w-full">שמור מילים</button>
        </div>
    </div>

    <div id="quizModal" class="quiz-overlay">
        <h2 id="qText" class="text-6xl font-black mb-12 italic text-center px-4"></h2>
        <div id="optionsContainer" class="flex flex-col items-center w-full px-6"></div>
    </div>

    <script>
        window.vocabulary = [];
        window.state = { board: Array(9).fill(""), currentPlayer: "X", history: {X:[], O:[]}, status: "lobby" };
        window.gameMode = "ai";

        function startGame(mode) {
            if (vocabulary.length < 3) return alert("הכנס לפחות 3 מילים!");
            gameMode = mode;
            document.getElementById('lobbyModal').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            window.state.status = "playing";
            updateUI(); 
            showQuiz();
        }

        function saveVocab() {
            const input = document.getElementById('vocabInput').value;
            window.vocabulary = input.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i);
            document.getElementById('vocabModal').style.display = 'none';
        }

        function showQuiz() {
            const item = vocabulary[Math.floor(Math.random()*vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const qTxt = document.getElementById('qText');
            qTxt.textContent = item.en;
            qTxt.style.color = window.state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-lobby w-full bg-zinc-900 border-zinc-700 text-white mb-4';
                btn.textContent = o;
                btn.onclick = () => {
                    if(o === item.he) {
                        document.getElementById('quizModal').style.display = 'none';
                        window.state.status = "ready_to_move";
                    } else {
                        alert("טעות!"); switchTurn();
                    }
                };
                container.appendChild(btn);
            });
            document.getElementById('quizModal').style.display = 'flex';
        }

        function switchTurn() {
            window.state.currentPlayer = window.state.currentPlayer === "X" ? "O" : "X";
            window.state.status = "playing";
            updateUI();
            if(gameMode === "ai" && window.state.currentPlayer === "O") setTimeout(aiMove, 1000);
            else setTimeout(showQuiz, 400);
        }

        function updateUI() {
            const isX = window.state.currentPlayer === 'X';
            const bar = document.getElementById('turnBar');
            bar.style.color = isX ? "#00f2ff" : "#bc13fe";
            bar.style.borderColor = isX ? "#00f2ff" : "#bc13fe";
            document.getElementById('turnIcon').textContent = isX ? "✕" : "◯";
            
            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = window.state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                
                // בדיקה אם זה הסימן שעומד להיעלם
                let isFading = false;
                if (val && window.state.history[val].length === 3 && window.state.history[val][0] === i) {
                    isFading = true;
                }
                
                cell.className = `cell ${val === 'X' ? 'x-ui' : 'o-ui'} ${isFading ? 'fading' : ''}`;
                if (!val) cell.className = 'cell';
            });
        }

        function cellClick(i) {
            if (window.state.status !== "ready_to_move" || window.state.board[i] !== "") return;
            
            window.state.board[i] = window.state.currentPlayer;
            window.state.history[window.state.currentPlayer].push(i);
            
            if(window.state.history[window.state.currentPlayer].length > 3) {
                const oldIndex = window.state.history[window.state.currentPlayer].shift();
                window.state.board[oldIndex] = "";
            }
            
            if(checkWin()) {
                confetti();
                setTimeout(() => { alert("ניצחון ל-" + window.state.currentPlayer); location.reload(); }, 500);
                return;
            }
            switchTurn();
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => window.state.board[p[0]] && window.state.board[p[0]] === window.state.board[p[1]] && window.state.board[p[0]] === window.state.board[p[2]]);
        }

        function aiMove() {
            const empty = window.state.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if(empty.length > 0) {
                const move = empty[Math.floor(Math.random() * empty.length)];
                window.state.status = "ready_to_move";
                cellClick(move);
            }
        }
    </script>
</body>
</html>
