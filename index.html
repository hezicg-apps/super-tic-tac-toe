                <video id="help-video" controls class="w-full h-auto">
                    <source src="https://hezicg-apps.github.io/super-tic-tac-toe/how-to-play.mp4" type="video/mp4">
                    הדפדפן שלך לא תומך בווידאו.
                </video>
            </div>

            <div class="text-right text-sm space-y-1 mb-4 px-2">
                <p> 1. לחצו על ה-<b>?</b> הצבעוני וענו על השאלה.</p>
                <p> 2. תשובה נכונה תהפוך אותו ל-<b>!</b> ותאפשר לכם לסמן.</p>
                <p> 3. המטרה: ליצור רצף של 3 לוחות קטנים כדי לנצח.</p>
            </div>
            
            <button onclick="closeHelpModal()" class="app-btn btn-yellow !py-3">סגור והבנתי!</button>
        </div>
    </dialog>

    <dialog id="quiz-modal">
        <div class="dialog-content text-center">
            <p class="text-gray-500 font-bold mb-3">כיצד אומרים בעברית:</p>
            <div class="flex items-center justify-center gap-4 mb-6" dir="ltr">
                <button onclick="speakWord()" class="text-3xl">🔊</button>
                <h3 id="quiz-word" class="text-4xl font-black">WORD</h3>
            </div>
            <div id="quiz-options" class="space-y-3"></div>
        </div>
    </dialog>

    <dialog id="end-game-modal">
        <div class="dialog-content text-center">
            <h2 id="end-game-title" class="text-4xl font-black mb-8">ניצחון!</h2>
            <button onclick="location.reload()" class="app-btn btn-yellow">משחק חדש</button>
        </div>
    </dialog>

    <dialog id="vocab-modal">
        <div class="dialog-content">
            <h2 class="text-xl font-bold mb-2">מילים (Word - תרגום)</h2>
            <textarea id="vocab-input" class="w-full h-40 border-4 border-black rounded-2xl p-3 mb-4 font-bold" dir="ltr"></textarea>
            <button onclick="saveVocab()" class="app-btn btn-yellow !py-2">שמור</button>
        </div>
    </dialog>

    <script>
        // פונקציה לסגירת מודאל העזרה ועצירת הווידאו
        function closeHelpModal() {
            const video = document.getElementById('help-video');
            video.pause();
            video.currentTime = 0; // מחזיר להתחלה
            closeModal('help-modal');
        }

        let vocab = [{word:'Red',translation:'אדום'},{word:'Blue',translation:'כחול'},{word:'Sun',translation:'שמש'},{word:'Apple',translation:'תפוח'},{word:'Dog',translation:'כלב'},{word:'Cat',translation:'חתול'}];
        let state = { player: 'X', grids: Array(9).fill(null).map(() => Array(9).fill(null)), mainBoard: Array(9).fill(null), nextBoard: -1, phase: 'ASK', mode: 'pvp', currentWord: '' };

        function speakWord() { if (!state.currentWord) return; window.speechSynthesis.cancel(); const ut = new SpeechSynthesisUtterance(state.currentWord); ut.lang = 'en-US'; window.speechSynthesis.speak(ut); }
        function openModal(id) { document.getElementById(id).showModal(); }
        function closeModal(id) { document.getElementById(id).close(); }

        function startGame(mode) {
            state.mode = mode;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initBoard();
            updateUI();
        }

        function initBoard() {
            const b = document.getElementById('board-wrapper');
            b.innerHTML = '';
            for(let i=0; i<9; i++) {
                const sg = document.createElement('div');
                sg.className = 'sub-grid';
                sg.id = `board-${i}`;
                for(let j=0; j<9; j++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => handleCellClick(i, j);
                    sg.appendChild(c);
                }
                b.appendChild(sg);
            }
        }

        function handleActionClick() { if(state.phase === 'ASK') showQuiz(); }

        function showQuiz() {
            const q = vocab[Math.floor(Math.random()*vocab.length)];
            state.currentWord = q.word;
            const wordElem = document.getElementById('quiz-word');
            wordElem.innerText = q.word;
            wordElem.style.color = state.player === 'X' ? '#2563eb' : '#dc2626';
            const opts = [q.translation];
            while(opts.length < 4 && opts.length < vocab.length + 1) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].translation;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(()=>Math.random()-0.5);
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "app-btn !py-2 !text-lg";
                btn.innerText = o;
                btn.onclick = () => {
                    if(o === q.translation) {
                        btn.classList.add('answer-correct');
                        setTimeout(() => { closeModal('quiz-modal'); state.phase = 'MOVE'; updateUI(); }, 400);
                    } else {
                        btn.classList.add('answer-wrong');
                        setTimeout(() => { closeModal('quiz-modal'); changePlayer(); }, 400);
                    }
                };
                container.appendChild(btn);
            });
            openModal('quiz-modal');
        }

        function handleCellClick(bi, ci) {
            if(state.phase !== 'MOVE') return;
            if(state.mainBoard[bi] !== null || (state.nextBoard !== -1 && state.nextBoard !== bi) || state.grids[bi][ci] !== null) return;
            state.grids[bi][ci] = state.player;
            if(checkWin(state.grids[bi])) {
                state.mainBoard[bi] = state.player;
                const div = document.getElementById(`board-${bi}`);
                const ov = document.createElement('div');
                ov.className = `won-overlay ${state.player === 'X' ? 'player-x' : 'player-o'}`;
                ov.innerText = state.player;
                div.appendChild(ov);
            }
            state.nextBoard = state.mainBoard[ci] === null ? ci : -1;
            if(checkWin(state.mainBoard)) { endGame(`ניצחון ל-${state.player}!`); }
            else if (!state.mainBoard.includes(null) && !state.grids.flat().includes(null)) { endGame("תיקו!"); }
            else { changePlayer(); }
        }

        function changePlayer() {
            state.player = state.player === 'X' ? 'O' : 'X';
            state.phase = 'ASK';
            updateUI();
            if(state.mode === 'pvc' && state.player === 'O') setTimeout(aiMove, 600);
        }

        function aiMove() {
            let bi = (state.nextBoard === -1 || state.mainBoard[state.nextBoard] !== null) ? 
                state.mainBoard.map((v, i) => v === null ? i : null).filter(v => v !== null)[0] : state.nextBoard;
            const validCells = state.grids[bi].map((v, i) => v === null ? i : null).filter(v => v !== null);
            if(validCells.length > 0) {
                const ci = validCells[Math.floor(Math.random() * validCells.length)];
                state.phase = 'MOVE'; handleCellClick(bi, ci);
            }
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(l => b[l[0]] && b[l[0]]===b[l[1]] && b[l[0]]===b[l[2]]);
        }

        function updateUI() {
            const btn = document.getElementById('action-btn');
            btn.innerText = state.phase === 'ASK' ? '?' : '!';
            btn.style.color = state.player === 'X' ? '#2563eb' : '#dc2626';
            btn.style.borderColor = state.player === 'X' ? '#2563eb' : '#dc2626';
            document.getElementById('turn-text').innerText = `תור: ${state.player}`;
            document.getElementById('turn-text').className = `text-xl ${state.player === 'X' ? 'text-blue-600' : 'text-red-600'}`;
            for(let i=0; i<9; i++) {
                const bg = document.getElementById(`board-${i}`);
                bg.classList.remove('active-board');
                if(state.phase === 'MOVE' && state.mainBoard[i] === null && (state.nextBoard === -1 || state.nextBoard === i)) bg.classList.add('active-board');
                for(let j=0; j<9; j++) {
                    const c = bg.querySelectorAll('.cell')[j];
                    c.innerText = state.grids[i][j] || '';
                    c.className = `cell ${state.grids[i][j] === 'X' ? 'player-x' : 'player-o'} ${(!state.grids[i][j] && bg.classList.contains('active-board')) ? 'can-move' : ''}`;
                }
            }
        }

        function endGame(msg) { document.getElementById('end-game-title').innerText = msg; openModal('end-game-modal'); }
        function saveVocab() { const lines = document.getElementById('vocab-input').value.split('\n'); const newVocab = lines.filter(l => l.includes('-')).map(l => { const [w, t] = l.split('-').map(s => s.trim()); return { word: w, translation: t }; }); if(newVocab.length > 0) vocab = newVocab; closeModal('vocab-modal'); }
        window.onload = () => { document.getElementById('vocab-input').value = vocab.map(v => `${v.word} - ${v.translation}`).join('\n'); };
    </script>
</body>
</html>
