<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Super Tic Tac Toe - Words Edition</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

<style>
:root{
  --green:#1f7a4d;
  --yellow:#f4c430;
  --blue:#2d7ff9;
  --red:#e74c3c;
  --white:#ffffff;
  --black:#111;
}

*{box-sizing:border-box;font-family:'Varela Round',sans-serif}

body{
  margin:0;
  background:var(--green);
  color:#000;
  display:flex;
  justify-content:center;
}

.screen{
  width:100%;
  max-width:420px;
  padding:16px;
}

/* Buttons */
.btn{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:20px;
  border:3px solid #000;
  font-size:18px;
  cursor:pointer;
}
.btn-yellow{background:var(--yellow)}
.btn-white{background:#eee}

.title{
  text-align:center;
  font-size:40px;
  color:var(--yellow);
}
.subtitle{
  text-align:center;
  font-size:24px;
  color:#fff;
}

/* Board */
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}
.small-board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  background:#fff;
  border:3px solid #000;
}
.cell{
  width:100%;
  aspect-ratio:1;
  border:1px solid #999;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}
.big-win{
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Top bar */
.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.turn{
  font-size:22px;
  padding:8px 16px;
  border-radius:20px;
  background:#fff;
}
.circle-btn{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:2px solid #000;
  cursor:pointer;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
}
.modal-content{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}
.answers button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  border:none;
  font-size:18px;
}
.correct{background:#2ecc71!important;color:#fff}
.wrong{background:#e74c3c!important;color:#fff}

/* bottom question */
.bottom-btn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

/* confetti */
.confetti{
  position:fixed;
  width:10px;height:10px;
  top:-10px;
  animation:fall 3s linear infinite;
}
@keyframes fall{
  to{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div class="screen" id="menu">
  <div class="title">SUPER</div>
  <div class="subtitle">TIC TAC TOE</div>

  <textarea id="words" placeholder="dog - כלב&#10;cat - חתול" style="width:100%;height:100px;margin-top:10px"></textarea>

  <button class="btn btn-yellow" onclick="startGame('2p')">שני שחקנים</button>
  <button class="btn btn-white" onclick="startGame('ai-easy')">נגד מחשב - קל</button>
  <button class="btn btn-white" onclick="startGame('ai-hard')">נגד מחשב - מאתגר</button>
  <button class="btn btn-white" onclick="openHow()">הוראות</button>
</div>

<div class="screen" id="game" style="display:none">
  <div class="top-bar">
    <div class="circle-btn" onclick="openHow()">i</div>
    <div class="turn" id="turn"></div>
    <div class="circle-btn" onclick="backMenu()">←</div>
  </div>

  <div class="board" id="board"></div>

  <div class="circle-btn bottom-btn" id="qBtn" onclick="openQuestion()">?</div>
</div>

<!-- Question Modal -->
<div class="modal" id="qModal">
  <div class="modal-content">
    <div id="questionText"></div>
    <div class="answers" id="answers"></div>
  </div>
</div>

<!-- Win Modal -->
<div class="modal" id="winModal">
  <div class="modal-content">
    <h2 id="winText"></h2>
    <button class="btn btn-yellow" onclick="restart()">שחקו שוב</button>
  </div>
</div>

<!-- How Modal -->
<div class="modal" id="howModal">
  <div class="modal-content">
    <iframe width="100%" height="200" src="https://www.youtube.com/embed/xLcUtltJk2c"></iframe>
    <button class="btn btn-yellow" onclick="closeHow()">הבנתי</button>
  </div>
</div>

<script>
// --- STATE ---
let wordsBank=[];
let currentPlayer='X';
let gameMode='2p';
let allowedBoard=null;
let bigBoard = Array(9).fill(null);
let smallBoards = Array(9).fill(null).map(()=>Array(9).fill(null));
let pendingMove=null;

// --- WORD PARSE ---
function parseWords(){
  let text=document.getElementById('words').value;
  wordsBank = text.split('\n').map(l=>{
    let [en,he]=l.split('-').map(x=>x.trim());
    return {en,he};
  }).filter(x=>x.en && x.he);
}

// --- START ---
function startGame(mode){
  parseWords();
  gameMode=mode;
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
  buildBoard();
  updateTurn();
}

// --- BOARD ---
function buildBoard(){
  const boardDiv=document.getElementById('board');
  boardDiv.innerHTML='';
  for(let i=0;i<9;i++){
    let sb=document.createElement('div');
    sb.className='small-board';
    for(let j=0;j<9;j++){
      let cell=document.createElement('div');
      cell.className='cell';
      cell.onclick=()=>cellClick(i,j);
      sb.appendChild(cell);
    }
    boardDiv.appendChild(sb);
  }
}

function cellClick(b,c){
  if(smallBoards[b][c] || bigBoard[b]) return;
  if(allowedBoard!==null && allowedBoard!==b) return;

  pendingMove={b,c};
  openQuestion();
}

// --- QUESTION ---
function openQuestion(){
  let q = wordsBank[Math.floor(Math.random()*wordsBank.length)];
  let options=[q];
  while(options.length<3){
    let r=wordsBank[Math.floor(Math.random()*wordsBank.length)];
    if(!options.includes(r)) options.push(r);
  }
  options.sort(()=>Math.random()-0.5);

  document.getElementById('qModal').style.display='flex';
  document.getElementById('questionText').innerHTML =
    `<button onclick="speak('${q.en}')">🔊</button> ${q.en}`;

  let ansDiv=document.getElementById('answers');
  ansDiv.innerHTML='';

  options.forEach(o=>{
    let btn=document.createElement('button');
    btn.innerText=o.he;
    btn.onclick=()=>answer(btn,o.he===q.he,q.he);
    ansDiv.appendChild(btn);
  });
}

function answer(btn,correct,correctText){
  if(correct){
    btn.classList.add('correct');
    setTimeout(()=>{
      document.getElementById('qModal').style.display='none';
      makeMove();
    },600);
  }else{
    btn.classList.add('wrong');
    [...btn.parentNode.children].forEach(b=>{
      if(b.innerText===correctText) b.classList.add('correct');
    });
    switchTurn();
  }
}

// --- MOVE ---
function makeMove(){
  let {b,c}=pendingMove;
  smallBoards[b][c]=currentPlayer;

  updateBoardUI();

  if(checkWin(smallBoards[b],currentPlayer)){
    bigBoard[b]=currentPlayer;
  }

  allowedBoard = smallBoards[c].includes(null) ? c : null;

  if(checkWin(bigBoard,currentPlayer)){
    endGame(currentPlayer);
    return;
  }

  switchTurn();
}

// --- TURN ---
function switchTurn(){
  currentPlayer = currentPlayer==='X'?'O':'X';
  updateTurn();

  if(gameMode.includes('ai') && currentPlayer==='O'){
    setTimeout(aiMove,500);
  }
}

function updateTurn(){
  let el=document.getElementById('turn');
  el.innerText='תור '+currentPlayer;
  el.style.color=currentPlayer==='X'?'var(--blue)':'var(--red)';
}

// --- UI ---
function updateBoardUI(){
  let boards=document.querySelectorAll('.small-board');
  boards.forEach((sb,i)=>{
    let cells=sb.children;
    for(let j=0;j<9;j++){
      cells[j].innerText=smallBoards[i][j]||'';
    }
    if(bigBoard[i]){
      sb.innerHTML=`<div class="big-win">${bigBoard[i]}</div>`;
    }
  });
}

// --- WIN ---
function checkWin(arr,p){
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return wins.some(w=>w.every(i=>arr[i]===p));
}

function endGame(p){
  document.getElementById('winModal').style.display='flex';
  document.getElementById('winText').innerText = p?`ניצחון ל ${p}!`:'תיקו';
  confetti();
}

// --- AI ---
function aiMove(){
  // simple random / smarter block
  let moves=[];
  smallBoards.forEach((b,bi)=>{
    b.forEach((c,ci)=>{
      if(!c && (!allowedBoard || allowedBoard===bi)){
        moves.push({b:bi,c:ci});
      }
    });
  });
  let move=moves[Math.floor(Math.random()*moves.length)];
  pendingMove=move;
  makeMove();
}

// --- SPEECH ---
function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';
  speechSynthesis.speak(u);
}

// --- UI extras ---
function backMenu(){
  location.reload();
}
function restart(){
  location.reload();
}

function openHow(){
  document.getElementById('howModal').style.display='flex';
}
function closeHow(){
  document.getElementById('howModal').style.display='none';
}

// --- CONFETTI ---
function confetti(){
  for(let i=0;i<30;i++){
    let c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=['red','blue','yellow'][Math.floor(Math.random()*3)];
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
