<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe Bolt</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { 
            background: #1a7b4e; 
            color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; overflow: hidden; position: fixed; width: 100%; 
        }
        
        /* Lobby Styles */
        .logo-container { 
            margin-bottom: 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
        }
        .super-text { 
            font-size: 5rem; font-weight: 900; color: #facc15; 
            margin: 0; line-height: 0.9; letter-spacing: 0.05em;
            text-shadow: 4px 4px 0px #000;
        }
        .ttt-text { 
            color: #fff; font-size: 2.2rem; font-weight: 900; 
            margin-top: 5px; line-height: 1;
        }

        /* Layout & Game UI */
        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
            gap: 15px;
            padding: 0 10px;
        }

        #statusContainer {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 0;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex: 1;
            max-width: 280px;
            text-align: center;
            border: 3px solid #000;
        }
        #statusText { font-size: 2.2rem; font-weight: 900; line-height: 1; }

        .side-btn {
            color: #fff;
            background: none;
            border: none;
            font-size: 2.2rem;
            font-weight: 900;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .side-btn:active { opacity: 0.7; transform: scale(0.9); }

        /* Board Styles */
        .board-container {
            position: relative;
            margin: 15px auto;
        }
        .super-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
            background: #000;
            border-radius: 12px;
            width: 92vw;
            max-width: 380px;
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 10;
        }
        .mini-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; background: #bbb; position: relative;
            border-radius: 4px; overflow: hidden;
        }
        .cell {
            background: #fff; aspect-ratio: 1 / 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            line-height: 1; padding: 0;
        }
        .active-mini {
            outline: 5px solid #facc15; z-index: 20;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.6);
        }
        .x-color { color: #1976d2; }
        .o-color { color: #d32f2f; }

        .mini-win-overlay {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center;
            font-size: 7.5rem; font-weight: 900; z-index: 30;
            background: rgba(255, 255, 255, 0.9); pointer-events: none;
            line-height: 1;
        }

        .footer-area {
            margin-bottom: 50px;
            display: flex; flex-direction: column; align-items: center;
        }

        .q-btn {
            width: 85px; height: 85px; border-radius: 50%;
            background: #fff; border: 6px solid #000;
            font-size: 4rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        /* Buttons & Modals */
        .btn-main { 
            width: 280px; min-height: 60px; border-radius: 35px; font-weight: 900; 
            margin-bottom: 12px; border: 4px solid #000; background: #fff; color: #000;
            font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 0 #000; transition: all 0.2s; cursor: pointer;
            font-family: 'Varela Round', sans-serif;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .btn-correct { background-color: #4ade80 !important; }
        .btn-wrong { background-color: #f87171 !important; }

        .modal { 
            position: fixed; inset: 0; background: rgba(26, 123, 78, 0.98); 
            z-index: 2000; display: none; flex-direction: column; align-items: center; 
            justify-content: center; padding: 20px; 
        }

        .rules-content {
            background: #fff; color: #000; padding: 25px; border-radius: 20px;
            max-width: 350px; border: 4px solid #facc15;
        }

        .footer-credit {
            position: absolute; bottom: 12px; width: 100%; text-align: center;
            font-size: 0.85rem; font-weight: bold; color: rgba(255,255,255,0.8);
            pointer-events: none;
        }

        .speak-btn {
            background: #facc15; border: 3px solid #000; border-radius: 50%;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
        }

        .hidden { display: none; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
    </style>
</head>
<body>

    <!-- לובי -->
    <div id="lobby" class="modal" style="display: flex;">
        <div class="logo-container">
            <h1 class="super-text">SUPER</h1>
            <div class="ttt-text">TIC TAC TOE</div>
        </div>
        <button onclick="showModal('rulesModal')" class="btn-main">איך משחקים?</button>
        <button onclick="showModal('vocabModal')" class="btn-main" style="background-color: #facc15;">הוספת מילים</button>
        <button onclick="startGame('pvp')" class="btn-main" style="color: #1976d2;">שחקן נגד שחקן</button>
        <button onclick="startGame('pvc')" class="btn-main" style="color: #d32f2f;">שחקן נגד מחשב</button>
        <div class="footer-credit">פותח ע"י חזי כהן גלמן 2026 © SUPER TIC TAC TOE</div>
    </div>

    <!-- מסך משחק -->
    <div id="gameUI" class="hidden flex-col items-center justify-between" style="height: 100%;">
        
        <div class="header-controls">
            <!-- כפתור חזרה מימין -->
            <button onclick="location.reload()" class="side-btn" title="חזרה לתפריט">➔</button>
            
            <div id="statusContainer">
                <div id="statusText">תור X</div>
            </div>
            
            <!-- כפתור חוקים משמאל -->
            <button onclick="showModal('rulesModal')" class="side-btn" title="חוקים">ⓘ</button>
        </div>

        <div class="board-container">
            <div id="mainGrid" class="super-grid"></div>
        </div>

        <div class="footer-area">
            <div id="qButton" onclick="openQuiz()" class="q-btn x-color">?</div>
        </div>

        <div class="footer-credit">פותח ע"י חזי כהן גלמן 2026 © SUPER TIC TAC TOE</div>
    </div>

    <!-- מודאל חוקים -->
    <div id="rulesModal" class="modal" onclick="hideModal('rulesModal')">
        <div class="rules-content" onclick="event.stopPropagation()">
            <h2 style="text-align: center; color: #facc15; font-size: 2rem; margin-bottom: 15px;">איך משחקים?</h2>
            <ul style="padding-right: 20px; font-weight: bold; line-height: 1.5; direction: rtl;">
                <li>נצח 3 לוחות קטנים בשורה/אלכסון.</li>
                <li>המהלך שלך קובע את מיקום היריב.</li>
                <li>לפני מהלך - עונים על שאלה ב-?.</li>
                <li>טעות? התור עובר ליריב.</li>
            </ul>
            <button onclick="hideModal('rulesModal')" class="btn-main" style="width: 100%; background: #facc15;">הבנתי!</button>
        </div>
    </div>

    <!-- מודאל שאלה -->
    <div id="quizModal" class="modal">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <div id="qWord" style="font-size: 4rem; font-weight: 900; font-style: italic; direction: ltr;"></div>
            <button onclick="speakWord()" class="speak-btn">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.04C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
            </button>
        </div>
        <div id="qOptions" class="flex flex-col gap-4" style="width: 280px;"></div>
    </div>

    <!-- מודאל מילים -->
    <div id="vocabModal" class="modal">
        <div onclick="hideModal('vocabModal')" class="side-btn" style="position: absolute; top: 20px; right: 20px;">➔</div>
        <h2 style="color: #fff; font-size: 2rem; margin-bottom: 10px;">עריכת מילים</h2>
        <textarea id="vInput" style="width: 300px; height: 300px; padding: 15px; border-radius: 15px; border: 4px solid #000; font-family: 'Varela Round'; font-size: 1.1rem; text-align: right;"></textarea>
        <button onclick="hideModal('vocabModal')" class="btn-main" style="margin-top: 15px; background: #facc15;">שמור</button>
    </div>

    <script>
        let vocab = [], turn = "X", activeBoard = -1, canMove = false, gameMode = 'pvp';
        let superData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let quizActive = false, currentWordEn = "";

        window.onload = () => {
            const saved = localStorage.getItem('sttt_bolt_v8');
            document.getElementById('vInput').value = saved || "red - אדום\nblue - כחול\ngreen - ירוק\nyellow - צהוב\napple - תפוח\ndog - כלב\ncat - חתול\nsun - שמש";
        };

        const showModal = id => document.getElementById(id).style.display = 'flex';
        const hideModal = id => document.getElementById(id).style.display = 'none';

        function startGame(mode) {
            const raw = document.getElementById('vInput').value;
            vocab = raw.split('\n').map(l => {
                const p = l.split(/[–\-\—:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);
            if(vocab.length < 3) return alert("הוסף עוד מילים");
            gameMode = mode;
            hideModal('lobby');
            document.getElementById('gameUI').classList.remove('hidden');
            document.getElementById('gameUI').classList.add('flex');
            initBoard();
            updateUI();
            localStorage.setItem('sttt_bolt_v8', raw);
        }

        function initBoard() {
            const container = document.getElementById('mainGrid');
            container.innerHTML = '';
            for(let b=0; b<9; b++) {
                const mini = document.createElement('div');
                mini.id = `mini-${b}`;
                mini.className = 'mini-grid';
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => handleCellClick(b, c);
                    mini.appendChild(cell);
                }
                container.appendChild(mini);
            }
        }

        function handleCellClick(bIdx, cIdx) {
            if(!canMove || miniWinners[bIdx] !== "" || superData[bIdx][cIdx] !== "") return;
            if(activeBoard !== -1 && activeBoard !== bIdx) return;
            
            superData[bIdx][cIdx] = turn;
            canMove = false;
            if(checkCombo(superData[bIdx], turn)) miniWinners[bIdx] = turn;
            activeBoard = (miniWinners[cIdx] === "" && superData[cIdx].some(v => v === "")) ? cIdx : -1;

            if(checkCombo(miniWinners, turn)) {
                confetti({ particleCount: 200, spread: 80 });
                document.getElementById('statusText').textContent = `ניצחון ל-${turn}!`;
                document.getElementById('qButton').style.display = 'none';
                render();
                return;
            }
            turn = turn === "X" ? "O" : "X";
            updateUI();
            if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 800);
        }

        function openQuiz() {
            if(canMove || quizActive) return;
            quizActive = true;
            const item = vocab[Math.floor(Math.random() * vocab.length)];
            currentWordEn = item.en;
            const opts = [item.he];
            while(opts.length < 3) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            document.getElementById('qWord').textContent = item.en;
            const cont = document.getElementById('qOptions'); cont.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-main'; b.textContent = o;
                b.onclick = () => {
                    if(o === item.he) {
                        b.classList.add('btn-correct');
                        setTimeout(() => { hideModal('quizModal'); canMove = true; quizActive = false; updateUI(); if(gameMode === 'pvc' && turn === 'O') executeAiMove(); }, 600);
                    } else {
                        b.classList.add('btn-wrong');
                        setTimeout(() => { hideModal('quizModal'); quizActive = false; turn = turn === "X" ? "O" : "X"; updateUI(); if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600); }, 1200);
                    }
                };
                cont.appendChild(b);
            });
            showModal('quizModal');
            setTimeout(speakWord, 400);
        }

        function speakWord() {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(currentWordEn);
            u.lang = 'en-US'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function executeAiMove() {
            let boards = activeBoard === -1 ? miniWinners.map((w,i)=>w===""?i:null).filter(v=>v!==null) : [activeBoard];
            let b = boards[Math.floor(Math.random()*boards.length)];
            let cells = superData[b].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            let c = cells[Math.floor(Math.random()*cells.length)];
            handleCellClick(b, c);
        }

        function checkCombo(arr, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => s.every(i => arr[i] === p));
        }

        function render() {
            for(let b=0; b<9; b++) {
                const mini = document.getElementById(`mini-${b}`);
                mini.classList.remove('active-mini');
                if(canMove && (activeBoard === -1 || activeBoard === b) && miniWinners[b] === "") mini.classList.add('active-mini');
                const cells = mini.querySelectorAll('.cell');
                superData[b].forEach((val, i) => {
                    cells[i].textContent = val === 'X' ? '✕' : (val === 'O' ? '◯' : '');
                    cells[i].className = 'cell ' + (val === 'X' ? 'x-color' : (val === 'O' ? 'o-color' : ''));
                });
                if(miniWinners[b] !== "" && !mini.querySelector('.mini-win-overlay')) {
                    const over = document.createElement('div');
                    over.className = 'mini-win-overlay ' + (miniWinners[b] === 'X' ? 'x-color' : 'o-color');
                    over.textContent = miniWinners[b] === 'X' ? '✕' : '◯';
                    mini.appendChild(over);
                }
            }
        }

        function updateUI() {
            const st = document.getElementById('statusText');
            st.textContent = `תור ${turn}`;
            st.className = turn === 'X' ? 'x-color' : 'o-color';
            const btn = document.getElementById('qButton');
            btn.textContent = canMove ? '!' : '?';
            btn.className = `q-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;
            render();
        }
    </script>
</body>
</html>
