
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe - Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        signInAnonymously(auth);

        window.db = db; window.updateDoc = updateDoc; window.doc = doc;

        // לוגיקת אונליין
        window.createOnline = async () => {
            if (window.vocabulary.length < 3) return showVocabError();
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            window.gameId = id; window.myRole = "X"; window.gameMode = "online";
            await setDoc(doc(db, 'games', id), {
                board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] },
                status: "waiting", vocabulary: window.vocabulary
            });
            listenToGame();
            document.getElementById('lobbyButtons').classList.add('hidden');
            document.getElementById('onlineArea').classList.remove('hidden');
            document.getElementById('displayCode').textContent = id;
        };

        window.joinOnline = async () => {
            const id = document.getElementById('joinInput').value.toUpperCase();
            if (!id) return;
            const snap = await getDoc(doc(db, 'games', id));
            if (snap.exists()) {
                window.gameId = id; window.myRole = "O"; window.gameMode = "online";
                window.vocabulary = snap.data().vocabulary;
                await updateDoc(doc(db, 'games', id), { status: "playing" });
                listenToGame();
            } else alert("קוד לא נמצא");
        };

        function listenToGame() {
            onSnapshot(doc(db, 'games', window.gameId), (snap) => {
                const data = snap.data();
                if (!data) return;
                window.state = data;
                if (data.status === "playing" || data.status === "ready_to_move") {
                    document.getElementById('lobbyModal').style.display = 'none';
                    updateUI();
                    if (data.status === "playing" && data.currentPlayer === window.myRole) showQuiz();
                }
                if (data.status === "finished" && data.winner) {
                    alert("הזוכה הוא: " + data.winner);
                    location.reload();
                }
            });
        }
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; overflow: hidden; }
        
        /* שחזור עיצוב כותרות מהתמונה */
        .title-super { color: #fff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; font-size: 3.8rem; font-weight: 900; font-style: italic; line-height: 0.9; }
        .title-ttt { color: #fff; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; font-size: 3.2rem; font-weight: 900; font-style: italic; }

        /* כפתורים לפי התמונה */
        .btn-lobby { width: 100%; max-width: 320px; height: 60px; border: 2px solid #facc15; border-radius: 18px; color: #facc15; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; background: none; cursor: pointer; }
        .btn-fill { background: #facc15; color: #000; }
        .btn-green { background: #16a34a; border: none; color: #fff; }
        .input-lobby { width: 100%; max-width: 320px; height: 60px; background: transparent; border: 2px solid #facc15; border-radius: 18px; text-align: center; color: #fff; margin-bottom: 12px; outline: none; }

        .help-circle { position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; border: 2px solid #00f2ff; border-radius: 50%; color: #00f2ff; font-weight: bold; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px #00f2ff; } 50% { box-shadow: 0 0 20px #00f2ff; } }

        /* לוח # קלאסי */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); width: 90vw; max-width: 360px; margin: 20px auto; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; cursor: pointer; border-color: #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(7), .cell:nth-child(8) { border-left: 4px solid #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 4px solid #fff; }

        .x-ui { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; border-color: #00f2ff !important; }
        .o-ui { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; border-color: #bc13fe !important; }
        .opacity-30 { opacity: 0.3 !important; }

        .modal-full { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="turnBar" class="h-16 flex items-center justify-center border-b-4 text-2xl font-bold transition-all">
        <span id="turnIcon" class="ml-2">✕</span> תור השחקן
    </div>

    <div class="board" id="mainBoard">
        <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
        <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
        <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
    </div>

    <div id="lobbyModal" class="modal-full">
        <div class="help-circle">?</div>
        <div class="mb-10 text-center">
            <div class="title-super">SUPER</div>
            <div class="title-ttt">TIC TAC TOE</div>
        </div>
        
        <div id="lobbyButtons" class="w-full flex flex-col items-center">
            <button onclick="document.getElementById('editor').style.display='flex'" class="btn-lobby italic">לחצו להוספת מילים למשחק</button>
            <button onclick="checkStart('ai')" class="btn-lobby btn-fill">משחק נגד AI</button>
            <button onclick="checkStart('friend')" class="btn-lobby">משחק 1:1</button>
            <div class="text-[10px] text-yellow-500 font-bold tracking-widest my-2 uppercase">Multiplayer Mode</div>
            <button onclick="createOnline()" class="btn-lobby btn-green">משחק אונליין</button>
            <input type="text" id="joinInput" placeholder="קיבלתם קוד? פה מדביקים" class="input-lobby">
            <button onclick="joinOnline()" class="btn-lobby">הצטרף לחבר</button>
        </div>

        <div id="onlineArea" class="hidden text-center">
            <p class="text-zinc-500 mb-2">שלח את הקוד לחבר:</p>
            <div id="displayCode" class="text-6xl font-bold text-white mb-8"></div>
            <p class="animate-pulse text-yellow-500">מחכה לשחקן...</p>
        </div>
    </div>

    <div id="quizModal" class="modal-full" style="display:none; background: rgba(0,0,0,0.95); z-index: 2000;">
        <div id="quizMain" class="w-full flex flex-col items-center">
            <h2 id="qText" class="text-5xl font-black mb-12 italic"></h2>
            <div id="options" class="w-full flex flex-col items-center"></div>
        </div>
        <div id="planArea" class="hidden text-center">
            <p class="text-3xl text-green-400 font-bold mb-8">תשובה נכונה!</p>
            <button onclick="document.getElementById('quizModal').style.display='none'" class="btn-lobby btn-fill">המשך ללוח</button>
        </div>
    </div>

    <div id="editor" class="modal-full" style="display:none;">
        <textarea id="vIn" class="w-full max-w-sm h-64 bg-zinc-900 border border-zinc-700 rounded-xl p-4 text-white mb-4"></textarea>
        <button onclick="saveVocab()" class="btn-lobby btn-fill">שמור</button>
    </div>

    <script>
        window.vocabulary = [];
        window.state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "lobby" };
        window.gameMode = "ai";

        function checkStart(m) {
            if (window.vocabulary.length < 3) return alert("הוסף 3 מילים!");
            window.gameMode = m;
            document.getElementById('lobbyModal').style.display = 'none';
            updateUI(); showQuiz();
        }

        function updateUI() {
            const isX = window.state.currentPlayer === 'X';
            const bar = document.getElementById('turnBar');
            bar.className = `h-16 flex items-center justify-center border-b-4 text-2xl font-bold ${isX ? 'x-ui' : 'o-ui'}`;
            document.getElementById('turnIcon').textContent = isX ? "✕" : "◯";

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = window.state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = "cell " + (val === 'X' ? 'x-ui' : (val === 'O' ? 'o-ui' : ''));
                if ((window.state.history.X.length === 3 && window.state.history.X[0] === i) || 
                    (window.state.history.O.length === 3 && window.state.history.O[0] === i)) cell.classList.add('opacity-30');
            });
        }

        function showQuiz() {
            const item = window.vocabulary[Math.floor(Math.random()*window.vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, window.vocabulary.length)) {
                const r = window.vocabulary[Math.floor(Math.random()*window.vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            document.getElementById('qText').textContent = item.en;
            document.getElementById('qText').style.color = window.state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-lobby';
                b.textContent = o;
                b.onclick = async () => {
                    if (o === item.he) {
                        if (window.gameMode === "online") await updateDoc(doc(db, 'games', window.gameId), { status: "ready_to_move" });
                        else window.state.status = "ready_to_move";
                        document.getElementById('quizMain').classList.add('hidden');
                        document.getElementById('planArea').classList.remove('hidden');
                    } else {
                        const next = window.state.currentPlayer === "X" ? "O" : "X";
                        if (window.gameMode === "online") await updateDoc(doc(db, 'games', window.gameId), { currentPlayer: next });
                        else { window.state.currentPlayer = next; updateUI(); showQuiz(); }
                    }
                };
                container.appendChild(b);
            });
            document.getElementById('quizMain').classList.remove('hidden');
            document.getElementById('planArea').classList.add('hidden');
            document.getElementById('quizModal').style.display = 'flex';
        }

        async function cellClick(i) {
            if (window.state.status !== "ready_to_move" || window.state.board[i] !== "") return;
            if (window.gameMode === "online" && window.state.currentPlayer !== window.myRole) return;

            let nb = [...window.state.board];
            let nh = JSON.parse(JSON.stringify(window.state.history));
            nb[i] = window.state.currentPlayer;
            nh[window.state.currentPlayer].push(i);
            if (nh[window.state.currentPlayer].length > 3) nb[nh[window.state.currentPlayer].shift()] = "";

            const win = checkWin(nb);
            const next = window.state.currentPlayer === "X" ? "O" : "X";
            const up = { board: nb, history: nh, currentPlayer: next, status: win ? "finished" : "playing", winner: win ? window.state.currentPlayer : null };

            if (window.gameMode === "online") await updateDoc(doc(db, 'games', window.gameId), up);
            else {
                window.state = {...window.state, ...up}; updateUI();
                if (win) { confetti(); alert("ניצחת!"); location.reload(); }
                else if (window.gameMode === "ai" && next === "O") setTimeout(aiMove, 1000);
                else showQuiz();
            }
        }

        function aiMove() {
            const empty = window.state.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                cellClick(empty[Math.floor(Math.random()*empty.length)]);
            }
        }

        function checkWin(b) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(p => b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]);
        }

        window.saveVocab = () => {
            window.vocabulary = document.getElementById('vIn').value.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i);
            document.getElementById('editor').style.display = 'none';
        }
    </script>
</body>
</html>
