<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v1.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2; /* כחול סטנדרטי */
            --o-color: #d32f2f; /* אדום סטנדרטי */
            --yellow: #facc15;
            --black: #000000;
            --white: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0;
            user-select: none;
        }

        body, html { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* מרכוז תוכן */
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .page.active { display: flex; }

        /* לוגו מרכזי */
        .logo-container { text-align: center; margin-bottom: 40px; }
        .title-main { font-size: 5rem; font-weight: 900; color: var(--yellow); line-height: 0.8; letter-spacing: -2px; }
        .title-sub { font-size: 2.2rem; font-weight: 900; margin-top: 5px; color: #fff; text-shadow: 2px 2px 0px #000; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .primary-btn { 
            width: 280px; height: 60px; border-radius: 40px; font-weight: 900; 
            border: 4px solid #000; background: #fff; color: #000; 
            font-size: 1.4rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 0 #000; cursor: pointer; transition: 0.1s;
        }
        .primary-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* לוח המשחק */
        .header-ui { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 90%; max-width: 400px; margin-bottom: 20px;
        }
        .status-pill { 
            background: #fff; height: 45px; border-radius: 40px; 
            border: 3px solid #000; flex: 1; margin: 0 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #000;
        }
        #statusLabel { font-size: 1.5rem; font-weight: 900; color: #000; }

        /* לוח לבן עם קווים שחורים */
        .game-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; border: 5px solid #000; border-radius: 10px;
            width: 90vw; max-width: 360px; aspect-ratio: 1/1; gap: 5px;
        }
        
        .mini-board { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; gap: 1px; height: 100%; width: 100%; position: relative;
        }

        .active-glow { 
            outline: 5px solid var(--yellow);
            outline-offset: -2px;
            z-index: 10;
        }

        .cell { 
            background: #fff; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; height: 100%; width: 100%;
        }

        .x-color { color: var(--x-color); }
        .o-color { color: var(--o-color); }

        .winner-overlay { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 5.5rem; font-weight: 900; background: rgba(255, 255, 255, 0.85); z-index: 20;
        }

        .action-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 3.5rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; margin-top: 20px;
        }

        /* מודאל */
        .modal { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        
        #quizWord { font-size: 3.8rem; font-weight: 900; text-shadow: 2px 2px 0 #000; margin: 0; }

        .tts-icon {
            background: none; border: none; cursor: pointer; color: #fff;
            display: flex; align-items: center; justify-content: center;
        }

        .info-btn { 
            background: none; border: none; font-size: 2.2rem; color: #fff; cursor: pointer;
        }

        .footer-tag { font-size: 0.7rem; opacity: 0.6; position: absolute; bottom: 10px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="lobby-screen" class="page active">
        <div class="logo-container">
            <h1 class="title-main">SUPER</h1>
            <div class="title-sub">TIC TAC TOE</div>
        </div>
        <div class="btn-group">
            <button onclick="nav('vocab')" class="primary-btn" style="background: var(--yellow);">הוספת מילים</button>
            <button onclick="launchGame('pvp')" class="primary-btn">שני שחקנים</button>
            <button onclick="launchGame('pvc')" class="primary-btn">נגד המחשב</button>
            <button onclick="nav('info')" class="info-btn" style="margin-top:10px;">ⓘ הוראות</button>
        </div>
        <div class="footer-tag">v1.7 | פותח ע"י חזי כהן גלמן</div>
    </div>

    <!-- מסך משחק -->
    <div id="game-screen" class="page">
        <div class="header-ui">
            <button onclick="location.reload()" style="background:none; border:none; font-size:2.2rem; color:#fff;">➔</button>
            <div class="status-pill"><div id="statusLabel">תור X</div></div>
            <button onclick="nav('info')" class="info-btn">ⓘ</button>
        </div>
        
        <div id="gridContainer" class="game-grid"></div>
        
        <div id="quizTrigger" onclick="startQuiz()" class="action-btn x-color">?</div>
    </div>

    <!-- מודאל שאלה -->
    <div id="quiz-modal" class="modal">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom: 35px;">
            <button class="tts-icon" onclick="speakCurrentWord()">
                <svg viewBox="0 0 24 24" width="55" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <h2 id="quizWord"></h2>
        </div>
        <div id="quizOptions" style="display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px;"></div>
    </div>

    <!-- מודאל הגדרות מילים -->
    <div id="vocab-modal" class="modal">
        <h2 style="margin-bottom:15px;">ניהול מילים</h2>
        <textarea id="vocabInput" style="width:90%; height:50vh; border-radius:15px; padding:15px; border:4px solid #000; font-size:1.1rem; text-align:right;"></textarea>
        <button onclick="saveVocab()" class="primary-btn" style="margin-top:20px; background:var(--yellow);">שמור וצא</button>
    </div>

    <!-- מודאל הוראות -->
    <div id="info-modal" class="modal">
        <h2 style="margin-bottom:15px;">איך משחקים?</h2>
        <iframe id="infoVid" style="width:90%; aspect-ratio:9/16; border:4px solid #000; border-radius:15px;" src="" allowfullscreen></iframe>
        <button onclick="closeInfo()" class="primary-btn" style="margin-top:20px;">סגור</button>
    </div>

    <!-- מודאל ניצחון -->
    <div id="win-modal" class="modal" style="background:rgba(0,0,0,0.9);">
        <div style="background:#fff; padding:35px; border-radius:30px; border:8px solid var(--yellow); text-align:center; color:#000;">
            <h2 style="font-size:2.5rem; margin:0;">ניצחון מוחלט!</h2>
            <div id="winnerMark" style="font-size:6rem; font-weight:900;">✕</div>
            <p id="winnerMsg" style="font-size:1.4rem; font-weight:900; margin-bottom:20px;"></p>
            <button onclick="location.reload()" class="primary-btn" style="width:100%; background:var(--yellow);">משחק חדש</button>
        </div>
    </div>

    <script>
        let words = [], turn = "X", activeMini = -1, canPlay = false, mode = 'pvp';
        let gridData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let activeQuestion = null;

        window.onload = () => {
            const saved = localStorage.getItem('sttt_v17_vocab');
            document.getElementById('vocabInput').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול\nsun - שמש\nwater - מים";
            if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
        };

        function nav(target) {
            if(target === 'vocab') document.getElementById('vocab-modal').style.display = 'flex';
            if(target === 'info') {
                document.getElementById('infoVid').src = "https://www.youtube.com/embed/xLcUtltJk2c?autoplay=1";
                document.getElementById('info-modal').style.display = 'flex';
            }
        }

        function closeInfo() {
            document.getElementById('infoVid').src = "";
            document.getElementById('info-modal').style.display = 'none';
        }

        function saveVocab() {
            localStorage.setItem('sttt_v17_vocab', document.getElementById('vocabInput').value);
            document.getElementById('vocab-modal').style.display = 'none';
        }

        function launchGame(m) {
            const lines = document.getElementById('vocabInput').value.split('\n');
            words = lines.map(l => {
                const parts = l.split(/[-–:]/);
                return parts.length >= 2 ? { en: parts[0].trim(), he: parts[1].trim() } : null;
            }).filter(w => w);

            if(words.length < 4) return alert("צריך לפחות 4 מילים");
            
            mode = m;
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            buildGrid();
            refreshUI();
        }

        function buildGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            for(let i=0; i<9; i++) {
                const mini = document.createElement('div');
                mini.id = `mini-${i}`;
                mini.className = 'mini-board';
                for(let j=0; j<9; j++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => handleMove(i, j);
                    mini.appendChild(c);
                }
                container.appendChild(mini);
            }
        }

        function handleMove(mIdx, cIdx) {
            if(!canPlay || miniWinners[mIdx] || gridData[mIdx][cIdx]) return;
            if(activeMini !== -1 && activeMini !== mIdx) return;

            gridData[mIdx][cIdx] = turn;
            const cell = document.getElementById(`mini-${mIdx}`).children[cIdx];
            cell.textContent = turn === 'X' ? '✕' : '◯';
            cell.className = 'cell ' + (turn === 'X' ? 'x-color' : 'o-color');

            if(checkWin(gridData[mIdx], turn)) miniWinners[mIdx] = turn;

            const isNextFull = gridData[cIdx].every(v => v !== "");
            activeMini = (miniWinners[cIdx] || isNextFull) ? -1 : cIdx;

            if(checkWin(miniWinners, turn)) {
                endGame(turn);
                return;
            }

            turn = turn === 'X' ? 'O' : 'X';
            canPlay = false;
            refreshUI();

            if(mode === 'pvc' && turn === 'O') setTimeout(startQuiz, 600);
        }

        function speakCurrentWord() {
            if(!activeQuestion) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(activeQuestion.en);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function startQuiz() {
            activeQuestion = words[Math.floor(Math.random() * words.length)];
            const choices = [activeQuestion.he];
            while(choices.length < 4) {
                const r = words[Math.floor(Math.random()*words.length)].he;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);

            const display = document.getElementById('quizWord');
            display.textContent = activeQuestion.en;
            display.className = turn === 'X' ? 'x-color' : 'o-color';

            const optsDiv = document.getElementById('quizOptions');
            optsDiv.innerHTML = '';
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'primary-btn';
                b.style.width = "100%";
                b.textContent = c;
                b.onclick = () => checkAnswer(c === activeQuestion.he, b);
                optsDiv.appendChild(b);
            });

            document.getElementById('quiz-modal').style.display = 'flex';
            setTimeout(speakCurrentWord, 300);
        }

        function checkAnswer(isRight, btn) {
            const btns = document.querySelectorAll('#quizOptions .primary-btn');
            btns.forEach(b => {
                b.disabled = true;
                if(b.textContent === activeQuestion.he) b.style.background = "#4caf50";
            });

            if(!isRight) btn.style.background = "#f44336";

            setTimeout(() => {
                document.getElementById('quiz-modal').style.display = 'none';
                if(isRight) {
                    canPlay = true;
                    refreshUI();
                    if(mode === 'pvc' && turn === 'O') setTimeout(aiAction, 500);
                } else {
                    turn = turn === 'X' ? 'O' : 'X';
                    refreshUI();
                    if(mode === 'pvc' && turn === 'O') setTimeout(startQuiz, 600);
                }
            }, 1200);
        }

        function aiAction() {
            const availableMinis = activeMini === -1 ? 
                miniWinners.map((w,i) => w==="" && !gridData[i].every(c=>c!=="") ? i : null).filter(v=>v!==null) : [activeMini];
            const m = availableMinis[Math.floor(Math.random()*availableMinis.length)];
            const empties = gridData[m].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            const c = empties[Math.floor(Math.random()*empties.length)];
            handleMove(m, c);
        }

        function checkWin(arr, p) {
            const combos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return combos.some(s => s.every(i => arr[i] === p));
        }

        function refreshUI() {
            const label = document.getElementById('statusLabel');
            label.textContent = `תור ${turn}`;
            label.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';

            const trigger = document.getElementById('quizTrigger');
            trigger.textContent = canPlay ? '!' : '?';
            trigger.className = `action-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;

            for(let i=0; i<9; i++) {
                const mini = document.getElementById(`mini-${i}`);
                mini.classList.remove('active-glow');
                if(canPlay && (activeMini === -1 || activeMini === i) && !miniWinners[i]) {
                    mini.classList.add('active-glow');
                }
                if(miniWinners[i] && !mini.querySelector('.winner-overlay')) {
                    const over = document.createElement('div');
                    over.className = 'winner-overlay ' + (miniWinners[i] === 'X' ? 'x-color' : 'o-color');
                    over.textContent = miniWinners[i] === 'X' ? '✕' : '◯';
                    mini.appendChild(over);
                }
            }
        }

        function endGame(w) {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            document.getElementById('winnerMark').textContent = w === 'X' ? '✕' : '◯';
            document.getElementById('winnerMark').className = w === 'X' ? 'x-color' : 'o-color';
            document.getElementById('winnerMsg').textContent = `שחקן ${w} ניצח את כל הלוח!`;
            document.getElementById('win-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
