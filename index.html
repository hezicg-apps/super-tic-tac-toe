<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v1.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #00f2ff;
            --o-color: #bc13fe;
            --yellow: #facc15;
            --black: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0;
            user-select: none;
        }

        body, html { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* ניהול דפים */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            height: 100%;
            width: 100%;
        }
        .page.active { display: flex; }

        /* מרכוז לוגו - כמו בגרסה 1.1 */
        #lobby { justify-content: center; }
        .logo-box { text-align: center; margin-bottom: 50px; }
        .super-title { font-size: 4.8rem; font-weight: 900; color: var(--yellow); line-height: 0.85; letter-spacing: -2px; }
        .ttt-title { font-size: 2.2rem; font-weight: 900; margin-top: 10px; color: #fff; text-shadow: 2px 2px 0px #000; }

        /* כפתורי תפריט */
        .btn-list { display: flex; flex-direction: column; gap: 18px; width: 100%; align-items: center; }
        .menu-btn { 
            width: 290px; height: 65px; border-radius: 40px; font-weight: 900; 
            border: 4px solid #000; background: #fff; color: #000; 
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 0 #000; cursor: pointer; transition: transform 0.1s;
        }
        .menu-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* לוח המשחק */
        .game-nav { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 90%; max-width: 400px; margin-top: 20px;
        }
        .status-box { 
            background: #fff; height: 50px; border-radius: 50px; 
            border: 3px solid #000; flex: 1; margin: 0 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #000;
        }
        #statusText { font-size: 1.6rem; font-weight: 900; color: #000; }

        .main-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; border: 6px solid #000; border-radius: 12px;
            width: 92vw; max-width: 380px; aspect-ratio: 1/1; gap: 6px; margin: 25px auto;
        }
        
        .sub-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #444; gap: 1px; height: 100%; width: 100%; position: relative;
        }

        /* קו מתאר צהוב פשוט - דרישה מהמשתמש */
        .playable-sub { 
            outline: 6px solid var(--yellow);
            outline-offset: -3px;
            z-index: 10;
        }

        .cell { 
            background: #111; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; height: 100%; width: 100%;
            transition: background 0.2s;
        }

        .x-mark { color: var(--x-color); text-shadow: 0 0 10px var(--x-color); }
        .o-mark { color: var(--o-color); text-shadow: 0 0 10px var(--o-color); }

        .mini-win { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 6rem; font-weight: 900; background: rgba(0,0,0,0.8); z-index: 20; border-radius: 4px;
        }

        /* כפתור שאלה - ללא צל */
        .q-trigger { 
            width: 85px; height: 85px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 4rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: none !important;
        }

        /* מודאלים */
        .overlay { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 1000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        
        #wordDisplay { font-size: 4rem; font-weight: 900; text-shadow: 2px 2px 0 #000; margin: 0; }

        /* הקראה - ללא רקע או עיגול */
        .speak-btn-only {
            background: none; border: none; padding: 0; cursor: pointer; color: #fff;
            display: flex; align-items: center; justify-content: center; margin: 0;
        }

        .footer { font-size: 0.8rem; margin-top: auto; padding-bottom: 20px; opacity: 0.6; text-align: center; }
        .ver { font-weight: 900; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="lobby" class="page active">
        <div class="logo-box">
            <h1 class="super-title">SUPER</h1>
            <div class="ttt-title">TIC TAC TOE</div>
        </div>
        <div class="btn-list">
            <button onclick="showVocab()" class="menu-btn" style="background: var(--yellow);">הוספת מילים</button>
            <button onclick="startGame('pvp')" class="menu-btn" style="color: var(--x-color);">שני שחקנים</button>
            <button onclick="startGame('pvc')" class="menu-btn" style="color: var(--o-color);">נגד המחשב</button>
        </div>
        <div class="ver">v1.6</div>
        <div class="footer">פותח ע"י חזי כהן גלמן 2026 ©</div>
    </div>

    <!-- מסך משחק -->
    <div id="game" class="page">
        <div class="game-nav">
            <button onclick="location.reload()" style="background:none; border:none; font-size:2.5rem; color:#fff;">➔</button>
            <div class="status-box"><div id="statusText">תור X</div></div>
            <button onclick="showInfo()" style="background:none; border:none; font-size:2.5rem; color:#fff;">ⓘ</button>
        </div>
        
        <div id="superGrid" class="main-grid"></div>
        
        <div id="quizBtn" onclick="openQuiz()" class="q-trigger x-mark">?</div>
        
        <div class="ver">v1.6</div>
    </div>

    <!-- מודאל שאלה -->
    <div id="quizModal" class="overlay">
        <div style="display:flex; align-items:center; gap:25px; margin-bottom: 30px;">
            <button class="speak-btn-only" onclick="playTTS()">
                <svg viewBox="0 0 24 24" width="60" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <h2 id="wordDisplay"></h2>
        </div>
        <div id="options" style="display:flex; flex-direction:column; gap:15px; width:100%; max-width:320px;"></div>
    </div>

    <!-- מודאל מילים -->
    <div id="vocabModal" class="overlay">
        <h2 style="margin-bottom:20px;">אוצר מילים</h2>
        <textarea id="vocabArea" style="width:90%; height:50vh; border-radius:15px; padding:15px; border:4px solid #000; font-size:1.1rem; text-align:right; font-family: inherit;"></textarea>
        <button onclick="hideVocab()" class="menu-btn" style="margin-top:25px; background:var(--yellow);">שמור וחזור</button>
    </div>

    <!-- מודאל ניצחון -->
    <div id="winModal" class="overlay" style="background:rgba(0,0,0,0.95);">
        <div style="background:#fff; padding:40px; border-radius:40px; border:10px solid var(--yellow); text-align:center; color:#000;">
            <h2 style="font-size:3.5rem; margin:0;">ניצחון!</h2>
            <div id="winnerIcon" style="font-size:7rem; font-weight:900; margin:10px 0;">✕</div>
            <p id="winnerMsg" style="font-size:1.5rem; font-weight:900; margin-bottom:30px;"></p>
            <button onclick="location.reload()" class="menu-btn" style="width:100%; background:var(--yellow); box-shadow:none;">משחק חדש</button>
        </div>
    </div>

    <script>
        let currentVocab = [], turn = "X", activeSub = -1, canMove = false, mode = 'pvp';
        let fullData = Array(9).fill(null).map(() => Array(9).fill(""));
        let subWinners = Array(9).fill("");
        let currentWordItem = null;

        window.onload = () => {
            const saved = localStorage.getItem('sttt_v16_data');
            document.getElementById('vocabArea').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול\nsun - שמש\nwater - מים";
            if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
        };

        function showVocab() { document.getElementById('vocabModal').style.display = 'flex'; }
        function hideVocab() { 
            localStorage.setItem('sttt_v16_data', document.getElementById('vocabArea').value);
            document.getElementById('vocabModal').style.display = 'none'; 
        }

        function startGame(m) {
            const lines = document.getElementById('vocabArea').value.split('\n');
            currentVocab = lines.map(l => {
                const p = l.split(/[-–:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(v => v);

            if(currentVocab.length < 4) return alert("הזן לפחות 4 מילים");
            
            mode = m;
            document.getElementById('lobby').classList.remove('active');
            document.getElementById('game').classList.add('active');
            
            initBoard();
            updateUI();
        }

        function initBoard() {
            const grid = document.getElementById('superGrid');
            grid.innerHTML = '';
            for(let i=0; i<9; i++) {
                const sub = document.createElement('div');
                sub.id = `sub-${i}`;
                sub.className = 'sub-grid';
                for(let j=0; j<9; j++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => onCellClick(i, j);
                    sub.appendChild(c);
                }
                grid.appendChild(sub);
            }
        }

        function onCellClick(sIdx, cIdx) {
            if(!canMove || subWinners[sIdx] || fullData[sIdx][cIdx]) return;
            if(activeSub !== -1 && activeSub !== sIdx) return;

            fullData[sIdx][cIdx] = turn;
            const cell = document.getElementById(`sub-${sIdx}`).children[cIdx];
            cell.textContent = turn === 'X' ? '✕' : '◯';
            cell.className = 'cell ' + (turn === 'X' ? 'x-mark' : 'o-mark');

            if(checkMatch(fullData[sIdx], turn)) subWinners[sIdx] = turn;

            const nextFull = fullData[cIdx].every(v => v !== "");
            activeSub = (subWinners[cIdx] || nextFull) ? -1 : cIdx;

            if(checkMatch(subWinners, turn)) {
                doWin(turn);
                return;
            }

            turn = turn === 'X' ? 'O' : 'X';
            canMove = false;
            updateUI();

            if(mode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
        }

        function playTTS() {
            if(!currentWordItem) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(currentWordItem.en);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function openQuiz() {
            currentWordItem = currentVocab[Math.floor(Math.random() * currentVocab.length)];
            const optionsArr = [currentWordItem.he];
            while(optionsArr.length < 4) {
                const r = currentVocab[Math.floor(Math.random()*currentVocab.length)].he;
                if(!optionsArr.includes(r)) optionsArr.push(r);
            }
            optionsArr.sort(() => Math.random() - 0.5);

            const wordH2 = document.getElementById('wordDisplay');
            wordH2.textContent = currentWordItem.en;
            wordH2.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';

            const box = document.getElementById('options');
            box.innerHTML = '';
            optionsArr.forEach(o => {
                const b = document.createElement('button');
                b.className = 'menu-btn';
                b.style.width = "100%";
                b.style.boxShadow = "0 4px 0 #000";
                b.textContent = o;
                b.onclick = () => verify(o === currentWordItem.he, b);
                box.appendChild(b);
            });

            document.getElementById('quizModal').style.display = 'flex';
            setTimeout(playTTS, 300);
        }

        function verify(correct, btn) {
            const btns = document.querySelectorAll('#options .menu-btn');
            btns.forEach(b => {
                b.disabled = true;
                if(b.textContent === currentWordItem.he) {
                    b.style.background = "#4caf50"; b.style.color = "#fff";
                }
            });

            if(!correct) {
                btn.style.background = "#f44336"; btn.style.color = "#fff";
            }

            setTimeout(() => {
                document.getElementById('quizModal').style.display = 'none';
                if(correct) {
                    canMove = true;
                    updateUI();
                    if(mode === 'pvc' && turn === 'O') setTimeout(aiLogic, 500);
                } else {
                    turn = turn === 'X' ? 'O' : 'X';
                    updateUI();
                    if(mode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
                }
            }, 1200);
        }

        function aiLogic() {
            const validSubs = activeSub === -1 ? 
                subWinners.map((w,i) => w==="" && !fullData[i].every(c=>c!=="") ? i : null).filter(v=>v!==null) : [activeSub];
            const s = validSubs[Math.floor(Math.random()*validSubs.length)];
            const empties = fullData[s].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            const c = empties[Math.floor(Math.random()*empties.length)];
            onCellClick(s, c);
        }

        function checkMatch(arr, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => s.every(i => arr[i] === p));
        }

        function updateUI() {
            const st = document.getElementById('statusText');
            st.textContent = `תור ${turn}`;
            st.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';

            const q = document.getElementById('quizBtn');
            q.textContent = canMove ? '!' : '?';
            q.className = `q-trigger ${turn === 'X' ? 'x-mark' : 'o-mark'}`;

            for(let i=0; i<9; i++) {
                const sub = document.getElementById(`sub-${i}`);
                sub.classList.remove('playable-sub');
                if(canMove && (activeSub === -1 || activeSub === i) && !subWinners[i]) {
                    sub.classList.add('playable-sub');
                }
                if(subWinners[i] && !sub.querySelector('.mini-win')) {
                    const winEl = document.createElement('div');
                    winEl.className = 'mini-win ' + (subWinners[i] === 'X' ? 'x-mark' : 'o-mark');
                    winEl.textContent = subWinners[i] === 'X' ? '✕' : '◯';
                    sub.appendChild(winEl);
                }
            }
        }

        function doWin(w) {
            confetti({ particleCount: 180, spread: 70, origin: { y: 0.6 } });
            document.getElementById('winnerIcon').textContent = w === 'X' ? '✕' : '◯';
            document.getElementById('winnerIcon').className = w === 'X' ? 'x-mark' : 'o-mark';
            document.getElementById('winnerMsg').textContent = `שחקן ${w} ניצח את המשחק!`;
            document.getElementById('winModal').style.display = 'flex';
        }
    </script>
</body>
</html>
