<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .btn-active:active { transform: scale(0.95); }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LockIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);
        const TrophyIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>);

        const App = () => {
            const [step, setStep] = useState('menu');
            const [finalScore, setFinalScore] = useState(null);
            const [unlocked, setUnlocked] = useState(false);

            const questions = {
                u1: [
                    { q: "___ a green apple on the desk.", options: ["There is", "There are"], correct: "There is" },
                    { q: "The ___ (fox) are in the forest.", options: ["foxes", "foxs"], correct: "foxes" },
                    { q: "___ many students in the library.", options: ["There is", "There are"], correct: "There are" }
                ],
                u2: [
                    { q: "Dana ___ a very cute cat.", options: ["have", "has"], correct: "has" },
                    { q: "The students ___ new books.", options: ["have", "has"], correct: "have" },
                    { q: "The dog ___ a long tail.", options: ["have", "has"], correct: "has" }
                ]
            };

            const Quiz = ({ qList, title }) => {
                const [idx, setIdx] = useState(0);
                const [score, setScore] = useState(0);
                const [done, setDone] = useState(false);

                const handleAns = (ans) => {
                    const isCorrect = ans === qList[idx].correct;
                    if (isCorrect) setScore(score + Math.round(100/qList.length));
                    
                    if (idx < qList.length - 1) setIdx(idx + 1);
                    else {
                        setDone(true);
                        if (title === "המבחן") {
                            setFinalScore(score + (isCorrect ? Math.round(100/qList.length) : 0));
                            if (score + (isCorrect ? Math.round(100/qList.length) : 0) >= 60) setUnlocked(true);
                        }
                    }
                };

                if (done) return (
                    <div className="text-center p-10 animate-pop">
                        <h2 className="text-4xl font-black mb-6 text-slate-800">ציון: {score}</h2>
                        <button onClick={() => setStep('menu')} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold">חזרה לתפריט</button>
                    </div>
                );

                return (
                    <div className="animate-pop p-4">
                        <div className="bg-white p-8 rounded-[40px] shadow-sm mb-6 text-center border-2 border-slate-50">
                            <h3 dir="ltr" className="text-2xl font-bold">{qList[idx].q}</h3>
                        </div>
                        <div className="space-y-3">
                            {qList[idx].options.map(o => (
                                <button key={o} onClick={() => handleAns(o)} className="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl font-bold text-xl text-indigo-900 active:bg-indigo-50 btn-active">{o}</button>
                            ))}
                        </div>
                    </div>
                );
            };

            if (step === 'menu') return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50">
                    <div className="gradient-bg p-12 text-white rounded-b-[60px] shadow-xl text-center mb-10">
                        <h1 className="text-5xl font-black italic mb-2">English Mastery</h1>
                        <p className="font-bold opacity-90">הדרך הקלה והמהנה לשלוט בדקדוק!</p>
                    </div>
                    <div className="px-6 pb-10">
                        <h2 className="text-2xl font-black text-slate-800 mb-8 text-center">מה נלמד היום?</h2>
                        <div className="grid grid-cols-2 gap-6">
                            <button onClick={() => setStep('u1_learn')} className="bg-gradient-to-br from-blue-500 to-blue-600 p-8 rounded-[40px] text-white shadow-lg btn-active">
                                <div className="font-black text-xl mb-1">יחידה 1</div>
                                <div className="text-sm font-bold opacity-90">There is/are</div>
                            </button>
                            <button onClick={() => setStep('u2_learn')} className="bg-gradient-to-br from-emerald-500 to-emerald-600 p-8 rounded-[40px] text-white shadow-lg btn-active">
                                <div className="font-black text-xl mb-1">יחידה 2</div>
                                <div className="text-sm font-bold opacity-90">Have / Has</div>
                            </button>
                            <button onClick={() => setStep('final')} className="bg-gradient-to-br from-amber-400 to-orange-500 p-8 rounded-[40px] text-white shadow-lg btn-active relative">
                                <div className="font-black text-xl mb-1">המבחן</div>
                                <div className="text-[10px] font-bold">ציון 60 לפתיחה</div>
                                {finalScore !== null && <div className="absolute top-2 right-2 bg-white/20 px-2 py-0.5 rounded-full text-[10px]">{finalScore}%</div>}
                            </button>
                            <button onClick={() => unlocked && setStep('game')} className={`p-8 rounded-[40px] shadow-lg flex flex-col items-center justify-center btn-active ${unlocked ? 'bg-gradient-to-br from-purple-500 to-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}`}>
                                <span className="font-black text-xl mb-1">{unlocked ? 'משחק' : 'נעול'}</span>
                                {!unlocked && <LockIcon />}
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen p-6">
                    <button onClick={() => setStep('menu')} className="mb-6 font-black text-indigo-600 flex items-center gap-2">➜ חזרה</button>
                    
                    {step === 'u1_learn' && (
                        <div className="space-y-6 animate-pop text-center">
                            <h2 className="text-4xl font-black text-blue-600">יחידה 1</h2>
                            <div className="bg-blue-50 p-6 rounded-[30px] border-b-4 border-blue-400 flex flex-col items-center">
                                <div className="bg-white px-4 py-2 rounded-xl mb-2 font-black text-blue-700">an</div>
                                <div className="font-bold text-blue-900 text-lg">לפני אות ניקוד (Vowel)</div>
                                <div className="text-rose-500 font-black tracking-widest mt-2 text-xl">a, e, i, o, u</div>
                            </div>
                            <div className="bg-white p-6 rounded-[30px] shadow-sm space-y-2" dir="ltr">
                                <div className="p-3 bg-slate-50 rounded-xl font-bold">an <span className="underline">a</span>pple</div>
                                <div className="p-3 bg-slate-50 rounded-xl font-bold">an <span className="underline">o</span>range</div>
                            </div>
                            <button onClick={() => setStep('u1_quiz')} className="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl">בואו נתרגל!</button>
                        </div>
                    )}

                    {step === 'u2_learn' && (
                        <div className="space-y-6 animate-pop text-center">
                            <h2 className="text-4xl font-black text-emerald-600">יחידה 2</h2>
                            <div className="bg-amber-50 p-8 rounded-[40px] border-2 border-dashed border-amber-300">
                                <div className="flex items-center gap-3 mb-4 justify-center">
                                    <span className="text-3xl">💡</span>
                                    <h4 className="font-black text-amber-900 text-xl">שימו לב למלכודת!</h4>
                                </div>
                                <p className="font-bold text-amber-800 leading-relaxed">
                                    גם אם מופיע שם מפורש כמו <span dir="ltr">The cat</span> או <span dir="ltr">Ron</span> במקום כינוי גוף - עדיין נשתמש ב-<b>Has</b>.
                                </p>
                            </div>
                            <button onClick={() => setStep('u2_quiz')} className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl">בואו נתרגל!</button>
                        </div>
                    )}

                    {step === 'u1_quiz' && <Quiz qList={questions.u1} title="תרגול 1" />}
                    {step === 'u2_quiz' && <Quiz qList={questions.u2} title="תרגול 2" />}
                    {step === 'final' && <Quiz qList={[...questions.u1, ...questions.u2]} title="המבחן" />}
                    
                    {step === 'game' && (
                        <div className="text-center py-20 animate-pop">
                            <div className="mb-6 flex justify-center"><TrophyIcon /></div>
                            <h2 className="text-4xl font-black mb-4">ניצחת!</h2>
                            <p className="font-bold text-slate-500">פתחת את כל השלבים!</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
