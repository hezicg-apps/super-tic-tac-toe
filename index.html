<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tic Tac Toe - Large Icons</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b",
            measurementId: "G-0476T9DDNG"
        };

        let db, auth;
        let firebaseReady = false;
        let vocabulary = [{ en: "Example", he: "דוגמה" }];
        let gameMode = "ai", gameId = "", myRole = "X", unsubscribe = null;
        let localState = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "playing" };

        async function setupFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                firebaseReady = true;
                document.getElementById('gameStatus').innerHTML = "מחובר לשרת ✅";
                enableLobby();
            } catch (e) {
                document.getElementById('gameStatus').innerHTML = `<span class="text-amber-500">אופליין</span>`;
                enableLobby();
            }
        }

        function enableLobby() {
            const lobby = document.getElementById('lobbyInputs');
            lobby.style.opacity = "1";
            lobby.classList.remove('pointer-events-none');
        }

        window.addEventListener('load', () => {
            setupFirebase();
            document.getElementById('lobbyModal').classList.add('active');
        });

        function checkWinner(board) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let p of wins) {
                if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) return board[p[0]];
            }
            return null;
        }

        window.startAI = () => {
            if (vocabulary.length < 3) { alert("יש להזין לפחות 3 מילים"); return; }
            gameMode = "ai";
            localState = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "playing" };
            document.getElementById('lobbyModal').classList.remove('active');
            renderGame(localState);
        };

        window.createOnline = async () => {
            if (!firebaseReady || vocabulary.length < 3) return;
            gameMode = "online";
            gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            myRole = "X";
            await setDoc(doc(db, 'games', gameId), { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "waiting", players: { X: auth.currentUser.uid, O: null } });
            startListening();
            showLobbyInfo();
        };

        window.joinOnline = async () => {
            const inputId = document.getElementById('gameIdInput').value.toUpperCase();
            if (!inputId || !firebaseReady) return;
            gameMode = "online"; gameId = inputId; myRole = "O";
            const snap = await getDoc(doc(db, 'games', gameId));
            if (snap.exists()) {
                await updateDoc(doc(db, 'games', gameId), { "players.O": auth.currentUser.uid, status: "playing" });
                startListening();
                document.getElementById('lobbyModal').classList.remove('active');
            } else alert("משחק לא נמצא");
        };

        function startListening() {
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(doc(db, 'games', gameId), (snap) => { if (snap.exists()) renderGame(snap.data()); });
        }

        function renderGame(data) {
            if (data.status !== 'waiting' && document.getElementById('lobbyModal').classList.contains('active')) {
                document.getElementById('lobbyModal').classList.remove('active');
            }
            const isMyTurn = data.currentPlayer === myRole;
            document.getElementById('turnBar').className = `turn-bar turn-${data.currentPlayer.toLowerCase()}`;
            document.getElementById('turnIcon').textContent = data.currentPlayer === "X" ? "✕" : "◯";
            document.getElementById('playerTurnCounter').textContent = data.history[data.currentPlayer]?.length || 0;

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = data.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = `cell ${val === "X" ? 'x-neon' : (val === "O" ? 'o-neon' : '')} ${val === "" && isMyTurn && data.status === 'ready_to_move' ? 'highlight' : ''}`;
                if (data.history[data.currentPlayer]?.length === 3 && data.history[data.currentPlayer][0] === i) cell.classList.add('fading-soon');
                else cell.classList.remove('fading-soon');
            });

            if (data.status === "playing" && isMyTurn) showQuiz(data.currentPlayer);
            else if (data.status === "finished") showResult(data.winner);
            else if (data.status === "ready_to_move") document.getElementById('quizModal').classList.remove('active');

            if (gameMode === "ai" && data.currentPlayer === "O" && data.status === "playing") setTimeout(() => aiMove(data), 800);
        }

        async function aiMove(data) {
            const emptyCells = data.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (emptyCells.length > 0) executeMove("O", emptyCells[Math.floor(Math.random() * emptyCells.length)]);
        }

        async function executeMove(role, idx) {
            let currentData = gameMode === "online" ? (await getDoc(doc(db, 'games', gameId))).data() : localState;
            if (currentData.board[idx] !== "") return;
            let newBoard = [...currentData.board], newHistory = { ...currentData.history };
            if (!newHistory[role]) newHistory[role] = [];
            newHistory[role].push(idx); newBoard[idx] = role;
            if (newHistory[role].length > 3) { newBoard[newHistory[role].shift()] = ""; showFlashMsg(); }
            const win = checkWinner(newBoard);
            const updates = { board: newBoard, history: newHistory, status: win ? "finished" : "playing", winner: win || null, currentPlayer: role === "X" ? "O" : "X" };
            if (gameMode === "online") await updateDoc(doc(db, 'games', gameId), updates);
            else { localState = {...localState, ...updates}; renderGame(localState); }
        }

        window.handleCellClick = async (idx) => {
            let data = gameMode === "online" ? (await getDoc(doc(db, 'games', gameId))).data() : localState;
            if (data.status === "ready_to_move" && data.currentPlayer === myRole && data.board[idx] === "") executeMove(myRole, idx);
        };

        function showQuiz(player) {
            if (document.getElementById('quizModal').classList.contains('active')) return;
            const item = vocabulary[Math.floor(Math.random()*vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random()-0.5);
            const color = player === 'X' ? '#00f2ff' : '#bc13fe';
            const qText = document.getElementById('questionText');
            qText.style.color = color; qText.style.textShadow = `0 0 10px ${color}`;
            qText.textContent = item.en;
            const pLabel = document.getElementById('quizPlayerLabel');
            pLabel.textContent = `תור שחקן ${player === 'X' ? '✕' : '◯'}`; pLabel.style.color = color;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = `btn-option w-full text-white`; b.style.borderColor = color; b.textContent = o;
                b.onclick = async () => {
                    const isCorrect = o === item.he;
                    const updates = isCorrect ? { status: 'ready_to_move' } : { currentPlayer: myRole === "X" ? "O" : "X" };
                    if (gameMode === "online") await updateDoc(doc(db, 'games', gameId), updates);
                    else { Object.assign(localState, updates); renderGame(localState); }
                    document.getElementById('quizModal').classList.remove('active');
                };
                container.appendChild(b);
            });
            document.getElementById('quizModal').classList.add('active');
            speak(item.en);
        }

        function showLobbyInfo() {
            document.getElementById('lobbyInputs').style.display = 'none';
            document.getElementById('codeDisplayArea').style.display = 'block';
            document.getElementById('displayCode').textContent = gameId;
            document.getElementById('waLink').href = `https://wa.me/?text=${encodeURIComponent('בוא לשחק איתי סופר איקס עיגול!\nקוד: ' + gameId)}`;
        }

        function showResult(winner) {
            const title = document.getElementById('resultTitle');
            title.textContent = winner === myRole ? "ניצחת! 🎉" : "הפסדת... 😢";
            title.style.color = winner === 'X' ? '#00f2ff' : '#bc13fe';
            document.getElementById('resultModal').classList.add('active');
        }

        function showFlashMsg() { const m = document.getElementById('removalMsg'); m.classList.add('visible'); setTimeout(() => m.classList.remove('visible'), 2000); }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }

        window.openVocabEditor = () => {
            document.getElementById('vocabInput').value = vocabulary.length > 0 && vocabulary[0].en !== "Example" ? vocabulary.map(item => `${item.en} - ${item.he}`).join('\n') : "";
            document.getElementById('vocabModal').classList.add('active');
        };

        window.saveVocab = () => {
            const lines = document.getElementById('vocabInput').value.split('\n');
            const newVocab = lines.map(line => {
                const parts = line.includes('-') ? line.split('-') : line.split(':');
                if (parts.length === 2) return { en: parts[0].trim(), he: parts[1].trim() };
                return null;
            }).filter(i => i !== null);
            if (newVocab.length >= 3) { vocabulary = newVocab; document.getElementById('vocabModal').classList.remove('active'); }
            else alert("הזן לפחות 3 מילים בפורמט: English - Hebrew");
        };

        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.playAgain = () => location.reload();
    </script>
    <style>
        body { background: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: manipulation; }
        .turn-bar { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid #222; }
        .turn-x { color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }
        .turn-o { color: #bc13fe; text-shadow: 0 0 5px #bc13fe; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); width: 90vw; max-width: 360px; margin: 20px auto; gap: 0; }
        
        /* הגדלת הסמלים כאן */
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 5.5rem; font-weight: bold; cursor: pointer; border: 2px solid #222; line-height: 1; }
        
        .cell.highlight { background: rgba(255, 255, 255, 0.1); animation: pulse 1.5s infinite; }
        .fading-soon { opacity: 0.3; animation: blink 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.1; } }
        .x-neon { color: #fff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        .o-neon { color: #fff; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
        .modal.active { display: flex; }
        .btn-option { background: #111; border: 2px solid #333; padding: 20px; margin: 8px 0; border-radius: 16px; font-size: 1.2rem; }
        .removal-alert { color: #ff4444; font-weight: bold; opacity: 0; transition: 0.3s; height: 20px; font-size: 0.9rem; }
        .removal-alert.visible { opacity: 1; }
        .wa-btn { background: #25D366; color: white; padding: 16px; border-radius: 16px; font-weight: bold; text-decoration: none; display: block; margin-top: 20px; }
        textarea { background: #0a0a0a; color: #0f0; padding: 15px; border: 1px solid #333; width: 100%; height: 200px; border-radius: 12px; font-family: monospace; }
        
        /* התאמה למסכים קטנים מאוד */
        @media (max-height: 600px) {
            .cell { font-size: 4rem; }
            .board { margin: 10px auto; }
        }
    </style>
</head>
<body>
    <div id="turnBar" class="turn-bar turn-x"><span id="turnIcon" class="ml-3">✕</span><span class="text-sm opacity-50 font-normal">תור השחקן</span></div>
    <div class="text-center mt-4">
        <div class="flex justify-center items-baseline gap-1"><span id="playerTurnCounter" class="text-2xl font-light">0</span><span class="text-gray-600 text-sm">/ 3</span></div>
        <div id="removalMsg" class="removal-alert">סימן ישן הוסר!</div>
        <p id="gameStatus" class="text-[10px] text-gray-600 mt-1">טוען...</p>
    </div>
    <div class="board">
        <div class="cell" onclick="handleCellClick(0)"></div><div class="cell" onclick="handleCellClick(1)"></div><div class="cell" onclick="handleCellClick(2)"></div>
        <div class="cell" onclick="handleCellClick(3)"></div><div class="cell" onclick="handleCellClick(4)"></div><div class="cell" onclick="handleCellClick(5)"></div>
        <div class="cell" onclick="handleCellClick(6)"></div><div class="cell" onclick="handleCellClick(7)"></div><div class="cell" onclick="handleCellClick(8)"></div>
    </div>
    <div id="lobbyModal" class="modal">
        <h1 class="text-4xl font-black mb-8 text-yellow-400 uppercase tracking-tighter">Super Tic Tac Toe</h1>
        <div id="lobbyInputs" class="w-full max-w-xs space-y-4 pointer-events-none" style="opacity:0.5;">
            <button onclick="startAI()" class="bg-white text-black w-full py-5 rounded-2xl font-bold text-xl">שחקן יחיד (AI)</button>
            <div class="flex gap-2">
                <button onclick="openVocabEditor()" class="bg-zinc-900 flex-1 py-3 rounded-xl text-xs">מילים ⚙️</button>
                <button onclick="location.reload()" class="bg-zinc-900 flex-1 py-3 rounded-xl text-xs">רענון 🔄</button>
            </div>
            <hr class="border-zinc-800 my-4">
            <button onclick="createOnline()" class="bg-blue-600 w-full py-4 rounded-xl font-bold">צור משחק אונליין</button>
            <input type="text" id="gameIdInput" placeholder="קוד מהמורה" class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-center w-full">
            <button onclick="joinOnline()" class="bg-zinc-800 w-full py-4 rounded-xl font-bold">הצטרף</button>
        </div>
        <div id="codeDisplayArea" style="display:none" class="bg-zinc-900 p-8 rounded-3xl mt-4 w-full max-w-xs">
            <p class="text-gray-500 text-xs">הקוד שלך:</p><div id="displayCode" class="text-6xl font-mono font-bold my-4"></div>
            <a id="waLink" href="#" target="_blank" class="wa-btn">שתף בוואטסאפ</a>
        </div>
    </div>
    <div id="quizModal" class="modal"><p id="quizPlayerLabel" class="text-xs mb-2 font-bold"></p><h2 id="questionText" class="text-5xl font-black mb-10"></h2><div id="optionsContainer" class="w-full max-w-xs"></div></div>
    <div id="resultModal" class="modal"><h2 id="resultTitle" class="text-6xl font-black mb-12"></h2><button onclick="playAgain()" class="bg-white text-black px-12 py-5 rounded-2xl font-bold">משחק חדש</button></div>
    <div id="vocabModal" class="modal">
        <div class="w-full max-w-md bg-zinc-900 p-6 rounded-3xl">
            <h2 class="text-white mb-2">מחסן מילים</h2><p class="text-gray-500 text-[10px] mb-4">פורמט: English - Hebrew</p>
            <textarea id="vocabInput" placeholder="Apple - תפוח"></textarea>
            <button onclick="saveVocab()" class="bg-white text-black w-full py-4 rounded-xl mt-4 font-bold">שמור</button>
            <button onclick="closeModal('vocabModal')" class="text-zinc-500 mt-4 text-sm">ביטול</button>
        </div>
    </div>
</body>
</html>
