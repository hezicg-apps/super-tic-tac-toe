<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v1.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2;
            --o-color: #d32f2f;
            --yellow: #facc15;
            --black: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
            margin: 0; padding: 0;
        }

        body, html { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* ניהול דפים */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
        }
        .page.active { display: flex; }

        /* מסך פתיחה - לוגו באמצע */
        .logo-container { text-align: center; margin-bottom: 50px; }
        .super-text { font-size: 4.5rem; font-weight: 900; color: var(--yellow); line-height: 1; }
        .ttt-text { font-size: 2.5rem; font-weight: 900; margin-top: 5px; text-shadow: 2px 2px 0px #000; }

        .btn-container { display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: center; }
        .btn-main { 
            width: 280px; height: 65px; border-radius: 40px; font-weight: 900; 
            border: 4px solid #000; background: #fff; color: #000; 
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 0 #000; cursor: pointer; transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* לוח המשחק */
        .header-controls { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 90vw; max-width: 400px; margin-top: 20px;
        }
        #statusDisplay { 
            background: #fff; height: 50px; border-radius: 50px; 
            border: 3px solid #000; flex: 1; margin: 0 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #000;
        }
        #statusText { font-size: 1.7rem; font-weight: 900; color: #000; }

        .super-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; border: 6px solid #000; border-radius: 12px;
            width: 92vw; max-width: 380px; aspect-ratio: 1/1; gap: 6px; margin: 20px auto;
        }
        
        .mini-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #ccc; gap: 1px; height: 100%; width: 100%; position: relative;
        }

        /* קו מתאר צהוב פשוט */
        .active-mini { 
            outline: 6px solid var(--yellow);
            outline-offset: -3px;
            z-index: 10;
        }

        .cell { 
            background: #fff; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; height: 100%; width: 100%;
            padding: 0; margin: 0; line-height: 1; text-align: center;
        }

        .x-color { color: var(--x-color); }
        .o-color { color: var(--o-color); }

        .mini-win-overlay { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 6rem; font-weight: 900; background: rgba(255, 255, 255, 0.9); z-index: 20;
        }

        /* כפתור שאלה - ללא הצללה */
        .q-btn { 
            width: 85px; height: 85px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 4rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: none !important;
        }

        /* מודאלים */
        .modal { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 10000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        
        #quizWord { font-size: 4rem; font-weight: 900; text-shadow: 2px 2px 0 #000; margin: 0; }

        /* הקראה - רק אייקון ללא רקע */
        .speak-icon-only {
            background: none; border: none; padding: 10px; cursor: pointer; color: #fff;
            display: flex; align-items: center; justify-content: center;
        }

        .footer-tag { font-size: 0.8rem; margin-top: auto; padding-bottom: 20px; opacity: 0.7; text-align: center; }
        .version { font-weight: 900; opacity: 0.8; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="lobby" class="page active">
        <div class="logo-container">
            <h1 class="super-text">SUPER</h1>
            <div class="ttt-text">TIC TAC TOE</div>
        </div>
        <div class="btn-container">
            <button onclick="openVocab()" class="btn-main" style="background: var(--yellow);">הוספת מילים</button>
            <button onclick="startSession('pvp')" class="btn-main" style="color: var(--x-color);">שחקן נגד שחקן</button>
            <button onclick="startSession('pvc')" class="btn-main" style="color: var(--o-color);">שחקן נגד מחשב</button>
        </div>
        <div class="version">v1.4</div>
        <div class="footer-tag">פותח ע"י חזי כהן גלמן 2026 ©</div>
    </div>

    <!-- מסך המשחק -->
    <div id="game" class="page">
        <div class="header-controls">
            <button onclick="location.reload()" style="background:none; border:none; font-size:2.5rem; color:#fff; cursor:pointer;">➔</button>
            <div id="statusDisplay"><div id="statusText">תור X</div></div>
            <button onclick="openVideo()" style="background:none; border:none; font-size:2.5rem; color:#fff; cursor:pointer;">ⓘ</button>
        </div>
        
        <div id="mainGrid" class="super-grid"></div>
        
        <div id="qButton" onclick="openQuiz()" class="q-btn x-color">?</div>
        
        <div class="version">v1.4</div>
        <div class="footer-tag">SUPER TIC TAC TOE © 2026</div>
    </div>

    <!-- מודאל שאלה -->
    <div id="quizModal" class="modal">
        <div style="display:flex; align-items:center; gap:25px; margin-bottom: 40px;">
            <button class="speak-icon-only" onclick="playVoice()">
                <svg viewBox="0 0 24 24" width="55" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <h2 id="quizWord"></h2>
        </div>
        <div id="quizOptions" style="display:flex; flex-direction:column; gap:15px; width:100%; align-items:center;"></div>
    </div>

    <!-- מודאל הגדרות מילים -->
    <div id="vocabModal" class="modal">
        <h2 style="margin-bottom:20px;">עריכת אוצר מילים</h2>
        <textarea id="vocabArea" style="width:85%; height:50vh; border-radius:20px; padding:20px; border:5px solid #000; font-size:1.2rem; text-align:right; font-family: inherit;"></textarea>
        <button onclick="closeVocab()" class="btn-main" style="margin-top:25px; background:var(--yellow);">שמור וחזור</button>
    </div>

    <!-- מודאל סרטון -->
    <div id="videoModal" class="modal">
        <h2 style="margin-bottom:20px;">איך משחקים?</h2>
        <iframe id="vidFrame" style="width:90%; aspect-ratio:9/16; border:5px solid #000; border-radius:20px;" src="" allowfullscreen></iframe>
        <button onclick="closeVideo()" class="btn-main" style="margin-top:25px;">סגור</button>
    </div>

    <!-- מודאל ניצחון -->
    <div id="winModal" class="modal" style="background:rgba(0,0,0,0.95);">
        <div style="background:#fff; padding:40px; border-radius:40px; border:10px solid var(--yellow); text-align:center; color:#000;">
            <h2 style="font-size:3.5rem; margin:0;">ניצחון!</h2>
            <div id="winIcon" style="font-size:7rem; font-weight:900; margin:10px 0;">✕</div>
            <p id="winMsg" style="font-size:1.8rem; font-weight:900; margin-bottom:30px;"></p>
            <button onclick="location.reload()" class="btn-main" style="width:100%; background:var(--yellow);">משחק חדש</button>
        </div>
    </div>

    <script>
        let vocab = [], turn = "X", activeBoard = -1, canMove = false, gameMode = 'pvp';
        let superData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let currentWord = null;

        // טעינה ראשונית
        window.onload = () => {
            const saved = localStorage.getItem('sttt_vocab_v14');
            document.getElementById('vocabArea').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול\nsun - שמש\nwater - מים";
            
            // אתחול מנוע הדיבור
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        };

        function startSession(mode) {
            const raw = document.getElementById('vocabArea').value;
            vocab = raw.split('\n').map(l => {
                const p = l.split(/[-–:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(v => v);

            if(vocab.length < 4) return alert("יש להזין לפחות 4 מילים");
            
            gameMode = mode;
            // "התעוררות" למנוע הדיבור על ידי צליל שקט בלחיצה הראשונה
            const silence = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silence);

            document.getElementById('lobby').classList.remove('active');
            document.getElementById('game').classList.add('active');
            
            buildBoard();
            refreshUI();
        }

        function openVocab() { document.getElementById('vocabModal').style.display = 'flex'; }
        function closeVocab() { 
            localStorage.setItem('sttt_vocab_v14', document.getElementById('vocabArea').value);
            document.getElementById('vocabModal').style.display = 'none'; 
        }

        function openVideo() {
            document.getElementById('vidFrame').src = "https://www.youtube.com/embed/xLcUtltJk2c?autoplay=1";
            document.getElementById('videoModal').style.display = 'flex';
        }
        function closeVideo() {
            document.getElementById('vidFrame').src = "";
            document.getElementById('videoModal').style.display = 'none';
        }

        function buildBoard() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            for(let i=0; i<9; i++) {
                const mini = document.createElement('div');
                mini.id = `mini-${i}`;
                mini.className = 'mini-grid';
                for(let j=0; j<9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => onCellTap(i, j);
                    mini.appendChild(cell);
                }
                grid.appendChild(mini);
            }
        }

        function onCellTap(bIdx, cIdx) {
            if(!canMove || miniWinners[bIdx] || superData[bIdx][cIdx]) return;
            if(activeBoard !== -1 && activeBoard !== bIdx) return;

            superData[bIdx][cIdx] = turn;
            const cell = document.getElementById(`mini-${bIdx}`).children[cIdx];
            cell.textContent = turn === 'X' ? '✕' : '◯';
            cell.className = 'cell ' + (turn === 'X' ? 'x-color' : 'o-color');

            if(checkMatch(superData[bIdx], turn)) {
                miniWinners[bIdx] = turn;
            }

            const nextIsFull = superData[cIdx].every(v => v !== "");
            activeBoard = (miniWinners[cIdx] || nextIsFull) ? -1 : cIdx;

            if(checkMatch(miniWinners, turn)) {
                showWin(turn);
                return;
            }

            turn = turn === 'X' ? 'O' : 'X';
            canMove = false;
            refreshUI();

            if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
        }

        function playVoice() {
            if(!currentWord) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(currentWord.en);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function openQuiz() {
            currentWord = vocab[Math.floor(Math.random() * vocab.length)];
            const opts = [currentWord.he];
            while(opts.length < 4) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const qText = document.getElementById('quizWord');
            qText.textContent = currentWord.en;
            qText.className = turn === 'X' ? 'x-color' : 'o-color';

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-main';
                btn.textContent = o;
                btn.onclick = () => checkAns(o === currentWord.he, btn);
                container.appendChild(btn);
            });

            document.getElementById('quizModal').style.display = 'flex';
            setTimeout(playVoice, 400);
        }

        function checkAns(isCorrect, btn) {
            const all = document.querySelectorAll('#quizOptions .btn-main');
            all.forEach(b => {
                b.disabled = true;
                if(b.textContent === currentWord.he) {
                    b.style.background = "#4caf50";
                    b.style.color = "#fff";
                }
            });

            if(!isCorrect) {
                btn.style.background = "#f44336";
                btn.style.color = "#fff";
            }

            setTimeout(() => {
                document.getElementById('quizModal').style.display = 'none';
                if(isCorrect) {
                    canMove = true;
                    refreshUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(aiPlay, 500);
                } else {
                    turn = turn === 'X' ? 'O' : 'X';
                    refreshUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
                }
            }, 1300);
        }

        function aiPlay() {
            const targets = activeBoard === -1 ? 
                miniWinners.map((w,i) => w==="" && !superData[i].every(c=>c!=="") ? i : null).filter(v=>v!==null) : [activeBoard];
            const b = targets[Math.floor(Math.random()*targets.length)];
            const cells = superData[b].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            const c = cells[Math.floor(Math.random()*cells.length)];
            onCellTap(b, c);
        }

        function checkMatch(arr, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => s.every(i => arr[i] === p));
        }

        function refreshUI() {
            const st = document.getElementById('statusText');
            st.textContent = `תור ${turn}`;
            st.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';

            const q = document.getElementById('qButton');
            q.textContent = canMove ? '!' : '?';
            q.className = `q-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;

            for(let i=0; i<9; i++) {
                const m = document.getElementById(`mini-${i}`);
                m.classList.remove('active-mini');
                if(canMove && (activeBoard === -1 || activeBoard === i) && !miniWinners[i]) {
                    m.classList.add('active-mini');
                }

                if(miniWinners[i]) {
                    if(!m.querySelector('.mini-win-overlay')) {
                        const ov = document.createElement('div');
                        ov.className = 'mini-win-overlay ' + (miniWinners[i] === 'X' ? 'x-color' : 'o-color');
                        ov.textContent = miniWinners[i] === 'X' ? '✕' : '◯';
                        m.appendChild(ov);
                    }
                }
            }
        }

        function showWin(w) {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            document.getElementById('winIcon').textContent = w === 'X' ? '✕' : '◯';
            document.getElementById('winIcon').className = w === 'X' ? 'x-color' : 'o-color';
            document.getElementById('winMsg').textContent = `שחקן ${w} ניצח את המשחק!`;
            document.getElementById('winModal').style.display = 'flex';
        }
    </script>
</body>
</html>
