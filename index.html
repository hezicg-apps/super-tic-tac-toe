<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER TIC TAC TOE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Varela Round', sans-serif; background-color: #2d845c; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .app-btn {
            background-color: white; color: #111; border: 4px solid #111; border-radius: 9999px;
            padding: 0.8rem 2rem; font-weight: 800; font-size: 1.2rem; width: 100%; max-width: 300px;
            box-shadow: 0 6px 0 0 #111; transition: all 0.1s; cursor: pointer; display: block; margin: 0 auto;
            text-align: center;
        }
        .app-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 0 #111; }
        .btn-yellow { background-color: #fbbf24; }
        .btn-red { background-color: #ef4444; color: white; }
        .btn-inverse-yellow { background-color: #111; color: #fbbf24; border-color: #fbbf24; }

        .game-header {
            background-color: white; border: 4px solid #111; border-radius: 9999px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.4rem 1.2rem; width: 92%; max-width: 500px; margin: 0.5rem auto;
            color: #111; font-weight: 800; z-index: 20;
        }

        .info-icon { font-style: normal; font-weight: bold; }

        .action-container { flex: 0.5; display: flex; align-items: center; justify-content: center; width: 100%; }

        .status-circle {
            width: 80px; height: 80px; border-radius: 50%; border: 5px solid #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; cursor: pointer; background: white;
            transition: transform 0.1s; flex-shrink: 0;
        }

        #board-container { flex: 1.5; display: flex; align-items: flex-start; justify-content: center; width: 100%; padding-bottom: 2rem;}
        
        #board-wrapper {
            width: 94vmin; height: 94vmin; max-width: 460px; max-height: 460px;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 15px; padding: 10px;
        }
        
        .sub-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); 
            gap: 2px; background-color: #111; position: relative; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        .active-board { outline: 6px solid #fbbf24; outline-offset: 2px; z-index: 5; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }

        .cell { background-color: white; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.4rem; }
        .cell.can-move { cursor: pointer; background-color: #fffde7; }

        .won-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; font-size: 5rem; z-index: 10; font-weight: 900; }
        
        .player-x { color: #2563eb; }
        .player-o { color: #dc2626; }

        /* מודאלים */
        dialog { border: 6px solid #111; border-radius: 2.5rem; padding: 0; overflow: hidden; max-width: 90vw; width: 380px; }
        dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .dialog-content { padding: 1.5rem; }

        /* כפתור הוידאו האדום */
        .video-btn {
            background-color: #ff0000; color: white; border-radius: 15px; padding: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: bold; margin: 15px 0; cursor: pointer; border: none; width: 100%;
        }

        /* מחלקות עבור משוב צבעים */
        .correct-choice { background-color: #22c55e !important; color: white !important; border-color: #166534 !important; box-shadow: 0 4px 0 0 #166534 !important; }
        .wrong-choice { background-color: #ef4444 !important; color: white !important; border-color: #991b1b !important; box-shadow: 0 4px 0 0 #991b1b !important; }

        /* פוטר */
        footer {
            width: 100%;
            background-color: #111;
            color: #ccc;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.8rem;
            position: fixed;
            bottom: 0;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="lobby" class="fixed inset-0 z-[110] flex flex-col items-center justify-center p-6" style="background-color: #2d845c;">
        <div class="mb-8 text-center">
            <h1 class="text-6xl font-black text-[#fbbf24] drop-shadow-md">SUPER</h1>
            <h2 class="text-3xl font-bold text-white tracking-widest">TIC TAC TOE</h2>
        </div>
        <div class="space-y-4 w-full">
            <button onclick="openModal('help-modal')" class="app-btn btn-inverse-yellow">איך משחקים?</button>
            <button onclick="openModal('vocab-modal')" class="app-btn btn-yellow">הוספת מילים</button>
            <button onclick="startGame('pvp')" class="app-btn">שחקן נגד שחקן</button>
            <button onclick="startGame('pvc')" class="app-btn">שחקן נגד מחשב</button>
        </div>
    </div>

    <div id="game-screen" class="hidden w-full h-full flex flex-col items-center">
        <div class="game-header">
            <button onclick="location.reload()" title="חזרה לראשי">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-home"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </button>
            <div id="turn-text" class="text-xl">תור: X</div>
            <button onclick="openModal('help-modal')" class="w-8 h-8 rounded-full border-2 border-black flex items-center justify-center font-bold">i</button>
        </div>

        <div class="action-container">
            <div id="action-btn" onclick="handleActionClick()" class="status-circle">?</div>
        </div>

        <div id="board-container">
            <div id="board-wrapper"></div>
        </div>
    </div>

    <footer>
        פותח ע''י חזי כהן גלמן 2026
    </footer>

    <dialog id="help-modal">
        <div class="dialog-content text-center">
            <h2 class="text-2xl font-bold mb-2">איך משחקים?</h2>
            
            <a href="https://youtube.com" target="_blank" class="video-btn">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/></svg>
                <span>צפייה בסרטון הסבר</span>
            </a>

            <div class="text-right text-sm space-y-2 mb-6 bg-gray-100 p-3 rounded-xl border-2 border-black">
                <p>• ענו על שאלה כדי לקבל אפשרות לזוז.</p>
                <p>• המיקום שתבחרו בלוח הקטן קובע באיזה לוח היריב ישחק.</p>
                <p>• המטרה: לנצח ב-3 לוחות בשורה!</p>
            </div>
            <button onclick="closeModal('help-modal')" class="app-btn btn-yellow !py-3">הבנתי!</button>
        </div>
    </dialog>

    <dialog id="end-game-modal">
        <div class="dialog-content text-center">
            <h2 id="end-game-title" class="text-4xl font-black mb-8">תיקו!</h2>
            <div class="space-y-4">
                <button onclick="resetGame()" class="app-btn btn-yellow">משחק חוזר</button>
                <button onclick="location.reload()" class="app-btn">חזרה לבית</button>
            </div>
        </div>
    </dialog>

    <dialog id="quiz-modal">
        <div class="dialog-content text-center">
            <p class="text-gray-500 font-bold mb-2">כיצד אומרים:</p>
            <h3 id="quiz-word" class="text-4xl font-black mb-6">WORD</h3>
            <div id="quiz-options" class="space-y-3"></div>
        </div>
    </dialog>

    <dialog id="vocab-modal">
        <div class="dialog-content">
            <h2 class="text-xl font-bold mb-2">מילים (Word - תרגום)</h2>
            <textarea id="vocab-input" class="w-full h-40 border-4 border-black rounded-2xl p-3 mb-4 font-bold" dir="ltr"></textarea>
            <button onclick="saveVocab()" class="app-btn btn-yellow !py-2">שמור</button>
        </div>
    </dialog>

    <script>
        let vocab = [{word:'Red',translation:'אדום'},{word:'Blue',translation:'כחול'},{word:'Sun',translation:'שמש'},{word:'Apple',translation:'תפוח'},{word:'Dog',translation:'כלב'},{word:'Cat',translation:'חתול'}];
        let state = { player: 'X', grids: Array(9).fill(null).map(() => Array(9).fill(null)), mainBoard: Array(9).fill(null), nextBoard: -1, phase: 'ASK', mode: 'pvp' };

        function openModal(id) { document.getElementById(id).showModal(); }
        function closeModal(id) { document.getElementById(id).close(); }

        function startGame(mode) {
            state.mode = mode;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initBoard();
            updateUI();
        }

        function initBoard() {
            const b = document.getElementById('board-wrapper');
            b.innerHTML = '';
            for(let i=0; i<9; i++) {
                const sg = document.createElement('div');
                sg.className = 'sub-grid';
                sg.id = `board-${i}`;
                for(let j=0; j<9; j++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => handleCellClick(i, j);
                    sg.appendChild(c);
                }
                b.appendChild(sg);
            }
        }

        function handleActionClick() { if(state.phase === 'ASK') showQuiz(); }

        function showQuiz() {
            const q = vocab[Math.floor(Math.random()*vocab.length)];
            document.getElementById('quiz-word').innerText = q.word;
            const opts = [q.translation];
            while(opts.length < 4 && opts.length < vocab.length + 1) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].translation;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(()=>Math.random()-0.5);
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "app-btn !py-2 !text-lg";
                btn.innerText = o;
                btn.onclick = () => {
                    // ביטול אפשרות ללחיצה כפולה בזמן הפידבק
                    const allBtns = container.querySelectorAll('button');
                    allBtns.forEach(b => b.style.pointerEvents = 'none');

                    if(o === q.translation) {
                        btn.classList.add('correct-choice');
                        setTimeout(() => {
                            closeModal('quiz-modal');
                            state.phase = 'MOVE';
                            updateUI();
                        }, 600);
                    } else {
                        btn.classList.add('wrong-choice');
                        setTimeout(() => {
                            closeModal('quiz-modal');
                            changePlayer();
                        }, 600);
                    }
                };
                container.appendChild(btn);
            });
            openModal('quiz-modal');
        }

        function handleCellClick(bi, ci) {
            if(state.phase !== 'MOVE') return;
            if(state.mainBoard[bi] !== null || (state.nextBoard !== -1 && state.nextBoard !== bi) || state.grids[bi][ci] !== null) return;
            
            state.grids[bi][ci] = state.player;
            
            if(checkWin(state.grids[bi])) {
                state.mainBoard[bi] = state.player;
                const div = document.getElementById(`board-${bi}`);
                const ov = document.createElement('div');
                ov.className = `won-overlay ${state.player === 'X' ? 'player-x' : 'player-o'}`;
                ov.innerText = state.player;
                div.appendChild(ov);
            }

            state.nextBoard = state.mainBoard[ci] === null ? ci : -1;

            if(checkWin(state.mainBoard)) { 
                endGame(`ניצחון ל-${state.player}!`); 
            } else if (isBoardFull()) {
                endGame("תיקו!");
            } else {
                changePlayer();
            }
        }

        function isBoardFull() {
            return state.grids.every((g, i) => state.mainBoard[i] !== null || g.every(c => c !== null));
        }

        function changePlayer() {
            state.player = state.player === 'X' ? 'O' : 'X';
            state.phase = 'ASK';
            updateUI();
            if(state.mode === 'pvc' && state.player === 'O') setTimeout(aiMove, 600);
        }

        function aiMove() {
            let bi = (state.nextBoard === -1 || state.mainBoard[state.nextBoard] !== null) ? 
                state.mainBoard.map((v, i) => v === null ? i : null).filter(v => v !== null)[0] : state.nextBoard;
            const validCells = state.grids[bi].map((v, i) => v === null ? i : null).filter(v => v !== null);
            if(validCells.length > 0) {
                state.phase = 'MOVE'; handleCellClick(bi, validCells[0]);
            }
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(l => b[l[0]] && b[l[0]]===b[l[1]] && b[l[0]]===b[l[2]]);
        }

        function updateUI() {
            const btn = document.getElementById('action-btn');
            btn.innerText = state.phase === 'ASK' ? '?' : '!';
            btn.style.color = state.player === 'X' ? '#2563eb' : '#dc2626';
            btn.style.borderColor = state.player === 'X' ? '#2563eb' : '#dc2626';
            document.getElementById('turn-text').innerText = `תור: ${state.player}`;
            
            for(let i=0; i<9; i++) {
                const bg = document.getElementById(`board-${i}`);
                bg.classList.remove('active-board');
                if(state.phase === 'MOVE' && state.mainBoard[i] === null && (state.nextBoard === -1 || state.nextBoard === i)) bg.classList.add('active-board');
                for(let j=0; j<9; j++) {
                    const c = bg.querySelectorAll('.cell')[j];
                    c.innerText = state.grids[i][j] || '';
                    c.className = `cell ${state.grids[i][j] === 'X' ? 'player-x' : 'player-o'} ${(!state.grids[i][j] && bg.classList.contains('active-board')) ? 'can-move' : ''}`;
                }
            }
        }

        function endGame(msg) { 
            document.getElementById('end-game-title').innerText = msg; 
            openModal('end-game-modal'); 
        }

        function resetGame() {
            state = { player: 'X', grids: Array(9).fill(null).map(() => Array(9).fill(null)), mainBoard: Array(9).fill(null), nextBoard: -1, phase: 'ASK', mode: state.mode };
            closeModal('end-game-modal');
            initBoard();
            updateUI();
        }

        function saveVocab() {
            const lines = document.getElementById('vocab-input').value.split('\n');
            const newVocab = lines.filter(l => l.includes('-')).map(l => {
                const [w, t] = l.split('-').map(s => s.trim());
                return { word: w, translation: t };
            });
            if(newVocab.length > 0) vocab = newVocab;
            closeModal('vocab-modal');
        }

        window.onload = () => { document.getElementById('vocab-input').value = vocab.map(v => `${v.word} - ${v.translation}`).join('\n'); };
    </script>
</body>
</html>
