<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2;
            --o-color: #d32f2f;
            --yellow: #facc15;
            --grid-line: #000000;
            --cell-bg: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            user-select: none;
        }

        body, html { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* מסך פתיחה */
        #lobby { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 5000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .logo-container { margin-bottom: 40px; text-align: center; }
        .super-text { font-size: 4rem; font-weight: 900; color: var(--yellow); margin: 0; line-height: 1; }
        .ttt-text { color: #fff; font-size: 2.4rem; font-weight: 900; margin-top: 5px; text-shadow: 2px 2px 0px #000; }

        .btn-container { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .btn-main { 
            width: 280px; height: 65px; border-radius: 40px; font-weight: 900; 
            border: 4px solid #000; background: #fff; 
            color: #000; font-size: 1.5rem; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 6px 0 #000; cursor: pointer; 
            transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* לוח המשחק */
        #gameUI { 
            display: none; 
            flex-direction: column; height: 100%; width: 100%; align-items: center; 
            justify-content: space-between; padding: 10px 0;
        }

        .header-controls { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 90vw; max-width: 400px; height: 70px;
        }
        #statusContainer { 
            background: #fff; height: 55px; border-radius: 50px; 
            box-shadow: 0 4px 0px #000; border: 3px solid #000; 
            flex: 1; margin: 0 15px; display: flex; align-items: center; justify-content: center;
        }
        #statusText { font-size: 1.8rem; font-weight: 900; color: #000; }

        .icon-btn { background: none; border: none; font-size: 2.5rem; cursor: pointer; color: #fff; text-shadow: 2px 2px 0 #000; }

        /* רשת קבועה */
        .super-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; border: 5px solid #000; 
            border-radius: 12px; width: 92vw; max-width: 380px; aspect-ratio: 1/1; 
            gap: 5px; position: relative; overflow: hidden;
        }
        .mini-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #ccc; position: relative; gap: 1px; height: 100%; width: 100%;
            transition: border 0.2s;
        }
        
        /* קו מתאר צהוב פשוט */
        .active-mini { 
            outline: 6px solid var(--yellow);
            outline-offset: -3px;
            z-index: 5;
        }

        .cell { 
            background: var(--cell-bg); display: flex; align-items: center; justify-content: center; 
            font-size: 1.6rem; font-weight: 900; height: 100%; width: 100%;
            padding: 0; margin: 0; line-height: 1;
        }
        
        .x-color { color: var(--x-color); }
        .o-color { color: var(--o-color); }

        .mini-win-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 5.5rem; font-weight: 900; z-index: 10; 
            background: rgba(255, 255, 255, 0.9); 
            pointer-events: none;
        }

        /* כפתור שאלה ללא הצללה */
        .q-btn { 
            width: 85px; height: 85px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 4rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: none; transition: transform 0.1s;
        }
        .q-btn:active { transform: scale(0.95); }

        /* מודאלים */
        .modal { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 6000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        
        .word-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        #qWord { font-size: 4rem; font-weight: 900; text-shadow: 2px 2px 0 #000; margin: 0; }
        
        .speaker-btn { 
            background: #fff; border: 4px solid #000; border-radius: 50%; 
            width: 65px; height: 65px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 4px 0 #000;
        }

        #winModal { background: rgba(0,0,0,0.9); }
        .win-card { 
            background: #fff; padding: 35px; border-radius: 30px; border: 8px solid var(--yellow);
            text-align: center; color: #000; max-width: 320px; width: 90%;
            transform: scale(0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .win-card.show { transform: scale(1); }

        .footer-text { font-size: 0.9rem; padding-bottom: 15px; opacity: 0.9; text-align: center; width: 100%; pointer-events: none; }
        .version-tag { font-weight: 900; color: #fff; margin: 25px 0; opacity: 0.8; font-size: 1.1rem; }
        
    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="lobby">
        <div class="logo-container">
            <h1 class="super-text">SUPER</h1>
            <div class="ttt-text">TIC TAC TOE</div>
        </div>
        <div class="btn-container">
            <button onclick="openVocabEditor()" class="btn-main" style="background-color: var(--yellow);">הוספת מילים</button>
            <button id="pvpBtn" class="btn-main" style="color: var(--x-color);">שחקן נגד שחקן</button>
            <button id="pvcBtn" class="btn-main" style="color: var(--o-color);">שחקן נגד מחשב</button>
        </div>
        <div class="version-tag">v1.1</div>
        <div class="footer-text">פותח ע"י חזי כהן גלמן 2026 ©</div>
    </div>

    <!-- לוח המשחק -->
    <div id="gameUI">
        <div class="header-controls">
            <button onclick="location.reload()" class="icon-btn">➔</button>
            <div id="statusContainer"><div id="statusText">תור X</div></div>
            <button onclick="showModal('videoModal')" class="icon-btn">ⓘ</button>
        </div>
        
        <div id="mainGrid" class="super-grid"></div>
        
        <div id="qButton" onclick="openQuiz()" class="q-btn x-color">?</div>
        
        <div class="footer-text">v1.1 | SUPER TIC TAC TOE © 2026</div>
    </div>

    <!-- מודאלים -->
    <div id="quizModal" class="modal">
        <div class="word-row">
            <button class="speaker-btn" onclick="speakWord()">
                <svg viewBox="0 0 24 24" width="35" height="35"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <div id="qWord"></div>
        </div>
        <div id="qOptions" style="display: flex; flex-direction: column; width: 100%; align-items: center; gap: 15px;"></div>
    </div>

    <div id="winModal" class="modal">
        <div class="win-card" id="winCard">
            <div style="font-size: 3rem; font-weight: 900; margin-bottom: 10px;">ניצחון!</div>
            <div id="winnerIcon" style="font-size: 6rem; line-height: 1; margin-bottom: 15px;">✕</div>
            <div id="winnerName" style="font-size: 1.6rem; font-weight: 900; margin-bottom: 25px;"></div>
            <button onclick="location.reload()" class="btn-main" style="width: 100%; background: var(--yellow);">משחק חדש</button>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <h2 style="margin-bottom: 20px;">איך משחקים?</h2>
        <div style="width: 100%; max-width: 350px; aspect-ratio: 9/16; background: #000; border-radius: 15px; overflow: hidden; border: 4px solid #000;">
            <iframe id="rulesVideo" style="width:100%; height:100%; border:none;" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closeVideoModal()" class="btn-main" style="margin-top: 25px;">סגור</button>
    </div>

    <div id="vocabModal" class="modal">
        <h2 style="margin-bottom: 20px;">עריכת אוצר מילים</h2>
        <textarea id="vInput" style="width: 85vw; max-width: 350px; height: 50vh; border-radius: 20px; padding: 20px; border: 5px solid #000; font-size: 1.2rem; text-align: right; font-family: inherit;"></textarea>
        <button onclick="saveVocab()" class="btn-main" style="margin-top: 25px; background: var(--yellow);">שמור וחזור</button>
    </div>

    <script>
        let vocab = [], turn = "X", activeBoard = -1, canMove = false, gameMode = 'pvp';
        let superData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let currentWord = null;
        let isAnswering = false;

        // אתחול דיבור (חובה בדפדפנים מסוימים)
        function initSpeech() {
            window.speechSynthesis.getVoices();
            const s = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(s);
        }

        window.onload = () => {
            const saved = localStorage.getItem('sttt_vocab_v1_1');
            document.getElementById('vInput').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול\nsun - שמש\nwater - מים\nhello - שלום\nbook - ספר";
            
            // חיבור אירועי לחיצה בצורה מפורשת למניעת בעיות "לא מגיב"
            document.getElementById('pvpBtn').addEventListener('click', () => startGame('pvp'));
            document.getElementById('pvcBtn').addEventListener('click', () => startGame('pvc'));
        };

        const showModal = id => {
            if(id === 'videoModal') document.getElementById('rulesVideo').src = "https://www.youtube.com/embed/xLcUtltJk2c?autoplay=1";
            document.getElementById(id).style.display = 'flex';
            if(id === 'winModal') setTimeout(() => document.getElementById('winCard').classList.add('show'), 50);
        };
        
        const hideModal = id => document.getElementById(id).style.display = 'none';

        function closeVideoModal() {
            document.getElementById('rulesVideo').src = "";
            hideModal('videoModal');
        }

        function openVocabEditor() {
            showModal('vocabModal');
        }

        function saveVocab() {
            localStorage.setItem('sttt_vocab_v1_1', document.getElementById('vInput').value);
            hideModal('vocabModal');
        }

        function startGame(mode) {
            initSpeech();
            const raw = document.getElementById('vInput').value;
            vocab = raw.split('\n').map(l => {
                const p = l.split(/[–\-\—:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);
            
            if(vocab.length < 4) {
                alert("יש להזין לפחות 4 מילים תקינות");
                return;
            }
            
            gameMode = mode;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameUI').style.display = 'flex';
            
            initBoard();
            updateUI();
        }

        function initBoard() {
            const container = document.getElementById('mainGrid');
            container.innerHTML = '';
            for(let b=0; b<9; b++) {
                const mini = document.createElement('div');
                mini.id = `mini-${b}`;
                mini.className = 'mini-grid';
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => handleCellClick(b, c);
                    mini.appendChild(cell);
                }
                container.appendChild(mini);
            }
        }

        function handleCellClick(bIdx, cIdx) {
            if(!canMove || miniWinners[bIdx] !== "" || superData[bIdx][cIdx] !== "") return;
            if(activeBoard !== -1 && activeBoard !== bIdx) return;
            
            superData[bIdx][cIdx] = turn;
            
            const mini = document.getElementById(`mini-${bIdx}`);
            const cell = mini.children[cIdx];
            cell.textContent = turn === 'X' ? '✕' : '◯';
            cell.className = 'cell ' + (turn === 'X' ? 'x-color' : 'o-color');

            // בדיקת ניצחון בלוח קטן
            if(checkCombo(superData[bIdx], turn)) {
                miniWinners[bIdx] = turn;
            }

            // קביעת הלוח הבא
            const isFull = superData[cIdx].every(c => c !== "");
            activeBoard = (miniWinners[cIdx] !== "" || isFull) ? -1 : cIdx;

            // בדיקת ניצחון במשחק כולו
            if(checkCombo(miniWinners, turn)) {
                endGame(turn);
                return;
            }
            
            turn = turn === "X" ? "O" : "X";
            canMove = false;
            updateUI();
            
            if(gameMode === 'pvc' && turn === 'O') {
                setTimeout(openQuiz, 600);
            }
        }

        function speakWord() {
            if(!currentWord) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(currentWord.en);
            u.lang = 'en-US';
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function openQuiz() {
            if(isAnswering) return;
            isAnswering = true;
            
            currentWord = vocab[Math.floor(Math.random() * vocab.length)];
            const opts = [currentWord.he];
            while(opts.length < 4) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            
            const qEl = document.getElementById('qWord');
            qEl.textContent = currentWord.en;
            qEl.className = turn === 'X' ? 'x-color' : 'o-color';
            
            const cont = document.getElementById('qOptions'); 
            cont.innerHTML = '';
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-main'; 
                b.style.width = '300px';
                b.textContent = o;
                b.onclick = () => handleAnswer(b, o === currentWord.he);
                cont.appendChild(b);
            });
            
            showModal('quizModal');
            setTimeout(speakWord, 300);
        }

        function handleAnswer(btn, isCorrect) {
            const allBtns = document.querySelectorAll('#qOptions .btn-main');
            allBtns.forEach(b => {
                b.disabled = true;
                if(b.textContent === currentWord.he) {
                    b.style.background = '#4caf50';
                    b.style.color = '#fff';
                }
            });

            if(!isCorrect) {
                btn.style.background = '#f44336';
                btn.style.color = '#fff';
            }

            setTimeout(() => {
                hideModal('quizModal');
                isAnswering = false;
                if(isCorrect) {
                    canMove = true; 
                    updateUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(executeAiMove, 400);
                } else {
                    turn = turn === "X" ? "O" : "X"; 
                    updateUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 500);
                }
            }, 1200);
        }

        function executeAiMove() {
            let possibleBoards = activeBoard === -1 ? 
                miniWinners.map((w,i)=>w==="" && !superData[i].every(c=>c!=="") ?i:null).filter(v=>v!==null) : [activeBoard];
            
            if (possibleBoards.length === 0) return;
            
            let bIdx = possibleBoards[Math.floor(Math.random()*possibleBoards.length)];
            let emptyCells = superData[bIdx].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            let cIdx = emptyCells[Math.floor(Math.random()*emptyCells.length)];
            
            handleCellClick(bIdx, cIdx);
        }

        function checkCombo(arr, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => s.every(i => arr[i] === p));
        }

        function updateUI() {
            const stText = document.getElementById('statusText');
            stText.textContent = `תור ${turn}`;
            stText.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';
            
            const qBtn = document.getElementById('qButton');
            qBtn.textContent = canMove ? '!' : '?';
            qBtn.className = `q-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;

            for(let b=0; b<9; b++) {
                const mini = document.getElementById(`mini-${b}`);
                mini.classList.remove('active-mini');
                
                // סימון קו מתאר צהוב ללוחות הפעילים
                if(canMove && (activeBoard === -1 || activeBoard === b) && miniWinners[b] === "") {
                    mini.classList.add('active-mini');
                }
                
                // שכבת ניצחון בלוח קטן
                if(miniWinners[b] !== "") {
                    let over = mini.querySelector('.mini-win-overlay');
                    if(!over) {
                        over = document.createElement('div');
                        over.className = 'mini-win-overlay ' + (miniWinners[b] === 'X' ? 'x-color' : 'o-color');
                        over.textContent = miniWinners[b] === 'X' ? '✕' : '◯';
                        mini.appendChild(over);
                    }
                }
            }
        }

        function endGame(winner) {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            document.getElementById('winnerIcon').textContent = winner === 'X' ? '✕' : '◯';
            document.getElementById('winnerIcon').className = winner === 'X' ? 'x-color' : 'o-color';
            document.getElementById('winnerName').textContent = `שחקן ${winner} ניצח את המשחק!`;
            showModal('winModal');
        }
    </script>
</body>
</html>
