ץ<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe - V1.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body, html { 
            background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed;
        }
        
        /* כותרות ועיצוב כללי */
        .title-super { color: #fff; text-shadow: 0 0 10px #00f2ff; font-size: 3rem; font-weight: 900; font-style: italic; }
        .title-ttt { color: #fff; text-shadow: 0 0 10px #bc13fe; font-size: 2.5rem; font-weight: 900; font-style: italic; }

        /* כפתורים */
        .btn-custom { width: 300px; height: 55px; border: 2px solid #facc15; border-radius: 20px; color: #facc15; font-weight: bold; font-size: 1.2rem; margin-bottom: 12px; background: none; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-fill { background: #facc15; color: #000; }
        .btn-help { position: absolute; top: 15px; left: 15px; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00f2ff; color: #00f2ff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; z-index: 100; }

        /* לוח משחק מקובע */
        .board-container { height: 400px; width: 350px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); width: 320px; height: 320px; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; border: 2px solid transparent; }
        
        /* גבולות הלוח */
        .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8) { border-left: 5px solid #fff; border-right: 5px solid #fff; }
        .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-top: 5px solid #fff; border-bottom: 5px solid #fff; }
        
        .x-color { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .o-color { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        .fading { opacity: 0.2; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.05; } }

        /* מודלים */
        .modal-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        /* צבעי תשובות */
        .ans-correct { background: #22c55e !important; color: #fff !important; border-color: #22c55e !important; }
        .ans-wrong { background: #ef4444 !important; color: #fff !important; border-color: #ef4444 !important; }
    </style>
</head>
<body>

    <div id="lobby" class="modal-overlay">
        <button class="btn-help" onclick="toggleModal('rulesModal', true)">?</button>
        <div class="text-center mb-10">
            <div class="title-super">SUPER</div>
            <div class="title-ttt">TIC TAC TOE</div>
            <div class="text-zinc-600 text-xs mt-2">VERSION 1.4</div>
        </div>
        <button onclick="toggleModal('vocabModal', true)" class="btn-custom">הוספת מילים למשחק</button>
        <button onclick="initGame('ai')" class="btn-custom btn-fill">משחק נגד AI</button>
        <button onclick="initGame('friend')" class="btn-custom">משחק 1:1</button>
    </div>

    <div id="gameUI" style="display:none;" class="flex flex-col h-full">
        <div id="header" class="h-[15vh] flex items-center justify-center border-b border-zinc-800 text-4xl font-black italic">
            <span id="playerSign" class="ml-4 text-5xl"></span>
            <span>תור השחקן <span id="curXorO"></span></span>
        </div>
        
        <div class="flex-grow flex items-center justify-center">
            <div class="board">
                <div class="cell" onclick="handleCell(0)"></div><div class="cell" onclick="handleCell(1)"></div><div class="cell" onclick="handleCell(2)"></div>
                <div class="cell" onclick="handleCell(3)"></div><div class="cell" onclick="handleCell(4)"></div><div class="cell" onclick="handleCell(5)"></div>
                <div class="cell" onclick="handleCell(6)"></div><div class="cell" onclick="handleCell(7)"></div><div class="cell" onclick="handleCell(8)"></div>
            </div>
        </div>
    </div>

    <div id="rulesModal" style="display:none;" class="modal-overlay bg-black/95 p-8">
        <div class="bg-zinc-900 p-8 rounded-3xl border-2 border-[#00f2ff] max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-4 text-[#00f2ff]">חוקי המשחק</h2>
            <ul class="text-right space-y-4 mb-6">
                <li>🎯 עונים על שאלה באנגלית כדי לקבל תור.</li>
                <li>❌ מותר רק 3 סימנים על הלוח לכל שחקן.</li>
                <li>⚠️ הסימן הרביעי ימחק את הסימן הראשון שלך!</li>
                <li>👻 הסימן שעומד להיעלם יהיה חצי שקוף.</li>
            </ul>
            <button onclick="toggleModal('rulesModal', false)" class="btn-custom btn-fill w-full">הבנתי!</button>
        </div>
    </div>

    <div id="vocabModal" style="display:none;" class="modal-overlay bg-black/95 p-6">
        <div class="bg-zinc-900 p-6 rounded-3xl border-2 border-[#facc15] w-full max-w-xs">
            <textarea id="vocabIn" placeholder="apple - תפוח" class="w-full h-40 bg-black text-white p-4 rounded-xl border border-zinc-700 text-right mb-4"></textarea>
            <button onclick="saveVocab()" class="btn-custom btn-fill w-full">שמור מילים</button>
        </div>
    </div>

    <div id="quiz" class="quiz-overlay">
        <div id="qWord" class="text-7xl font-black mb-16 italic text-center"></div>
        <div id="options" class="flex flex-col items-center w-full px-8"></div>
    </div>

    <script>
        let vocab = [];
        let state = { board: Array(9).fill(""), turn: "X", history: {X:[], O:[]}, active: false };
        let mode = "ai";

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        function saveVocab() {
            vocab = document.getElementById('vocabIn').value.split('\n').map(l => {
                const parts = l.split('-');
                return parts.length === 2 ? { en: parts[0].trim(), he: parts[1].trim() } : null;
            }).filter(x => x);
            toggleModal('vocabModal', false);
        }

        function initGame(m) {
            if (vocab.length < 3) return alert("אנא הזן לפחות 3 מילים");
            mode = m;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameUI').style.display = 'flex';
            render();
            ask();
        }

        function ask() {
            const item = vocab[Math.floor(Math.random()*vocab.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocab.length)) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const qElem = document.getElementById('qWord');
            qElem.textContent = item.en;
            qElem.className = `text-7xl font-black mb-16 italic ${state.turn==='X'?'x-color':'o-color'}`;
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-custom w-full border-zinc-700 text-white';
                b.textContent = o;
                b.onclick = () => {
                    if(o === item.he) {
                        b.classList.add('ans-correct');
                        setTimeout(() => { toggleModal('quiz', false); state.active = true; }, 800);
                    } else {
                        b.classList.add('ans-wrong');
                        // מסמן את התשובה הנכונה בירוק כדי שילמדו
                        Array.from(container.children).forEach(btn => {
                            if(btn.textContent === item.he) btn.classList.add('ans-correct');
                        });
                        setTimeout(() => { toggleModal('quiz', false); nextTurn(); }, 1500);
                    }
                };
                container.appendChild(b);
            });
            toggleModal('quiz', true);
        }

        function handleCell(i) {
            if (!state.active || state.board[i] !== "") return;
            
            state.board[i] = state.turn;
            state.history[state.turn].push(i);
            
            if (state.history[state.turn].length > 3) {
                const old = state.history[state.turn].shift();
                state.board[old] = "";
            }
            
            render();
            if (check()) {
                confetti();
                setTimeout(() => { alert("השחקן " + state.turn + " ניצח!"); location.reload(); }, 600);
            } else {
                state.active = false;
                nextTurn();
            }
        }

        function nextTurn() {
            state.turn = state.turn === "X" ? "O" : "X";
            render();
            if (mode === "ai" && state.turn === "O") {
                setTimeout(ai, 800);
            } else {
                setTimeout(ask, 400);
            }
        }

        function ai() {
            const empty = state.board.map((v,i) => v===""?i:null).filter(v=>v!==null);
            if (empty.length) {
                state.active = true;
                handleCell(empty[Math.floor(Math.random()*empty.length)]);
            }
        }

        function render() {
            const isX = state.turn === 'X';
            const h = document.getElementById('header');
            h.className = `h-[15vh] flex items-center justify-center border-b-4 ${isX?'border-[#00f2ff] text-[#00f2ff]':'border-[#bc13fe] text-[#bc13fe]'} text-4xl font-black italic`;
            document.getElementById('playerSign').textContent = isX ? "✕" : "◯";
            document.getElementById('curXorO').textContent = state.turn;

            document.querySelectorAll('.cell').forEach((c, i) => {
                const val = state.board[i];
                c.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                let cls = val === 'X' ? 'x-color' : (val === 'O' ? 'o-color' : '');
                if (val && state.history[val].length === 3 && state.history[val][0] === i) cls += " fading";
                c.className = "cell " + cls;
            });
        }

        function check() {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(p => state.board[p[0]] && state.board[p[0]] === state.board[p[1]] && state.board[p[0]] === state.board[p[2]]);
        }
    </script>
</body>
</html>
