<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe - Word Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        /* עיצוב רשת # קלאסית */
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            width: 90vw; max-width: 360px; margin: 20px auto; 
            position: relative;
        }
        .cell { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 5rem; font-weight: bold; cursor: pointer; position: relative;
        }
        /* ציור הקווים של ה-# */
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(7), .cell:nth-child(8) { border-left: 4px solid #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 4px solid #fff; }

        .x-style { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .o-style { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        
        /* מסך פתיחה לפי התמונה */
        .modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        
        .game-title { font-size: 3.5rem; font-weight: 900; line-height: 1.1; font-style: italic; letter-spacing: -2px; text-align: center; }
        .title-super { color: #fff; text-shadow: 0 0 15px #00f2ff; }
        .title-ttt { color: #fff; text-shadow: 0 0 15px #bc13fe; }

        .btn-main { height: 60px; width: 100%; max-width: 300px; border-radius: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: all 0.2s; cursor: pointer; border: 2px solid #facc15; color: #facc15; margin-bottom: 12px; }
        .btn-fill { background: #facc15; color: #000; }
        .btn-green { background: #16a34a; border: none; color: #fff; }

        /* סימן שאלה פועם */
        .btn-help { 
            position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; 
            border-radius: 50%; border: 2px solid #00f2ff; color: #00f2ff; 
            font-size: 1.5rem; font-weight: bold; background: none;
            animation: pulse-blue 2s infinite ease-in-out;
        }
        @keyframes pulse-blue { 0%, 100% { box-shadow: 0 0 5px #00f2ff; transform: scale(1); } 50% { box-shadow: 0 0 20px #00f2ff; transform: scale(1.1); } }

        .btn-option { background: #111; border: 2px solid #fff; padding: 20px; margin: 10px 0; border-radius: 15px; width: 100%; font-size: 1.4rem; font-weight: bold; }
        .opacity-30 { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="turnBar" class="h-16 flex items-center justify-center border-b border-zinc-800 text-2xl font-bold">
        <span id="turnIcon" class="ml-2">✕</span> תור השחקן
    </div>

    <div class="board" id="mainBoard">
        <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
        <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
        <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
    </div>

    <div id="lobbyModal" class="modal active">
        <button class="btn-help" onclick="showRules()">?</button>
        <div class="mb-12">
            <div class="game-title title-super">SUPER</div>
            <div class="game-title title-ttt">TIC TAC TOE</div>
        </div>
        <div class="w-full max-w-xs">
            <button onclick="openEditor()" class="btn-main">לחצו להוספת מילים למשחק</button>
            <button onclick="startGame('ai')" class="btn-main btn-fill">משחק נגד AI</button>
            <button onclick="startGame('friend')" class="btn-main">משחק 1:1</button>
            <p class="text-yellow-400 text-[10px] text-center font-bold tracking-widest mt-4 mb-2 uppercase">Multiplayer Mode</p>
            <button onclick="alert('פונקציה זו תהיה זמינה באתר Word Academy')" class="btn-main btn-green">משחק אונליין</button>
        </div>
    </div>

    <div id="quizModal" class="modal">
        <div id="quizContent" class="w-full max-w-xs text-center">
            <h2 id="questionText" class="text-6xl font-black mb-10 italic"></h2>
            <div id="optionsContainer"></div>
        </div>
        <div id="planningArea" class="hidden flex-col items-center">
            <p class="text-2xl mb-6 text-green-400 font-bold">תשובה נכונה!</p>
            <button onclick="closeQuizAndContinue()" class="btn-main btn-fill">המשך לתור הבא</button>
        </div>
    </div>

    <div id="vocabModal" class="modal">
        <div class="w-full max-w-md bg-zinc-900 p-6 rounded-2xl border border-zinc-700">
            <h2 class="text-white font-bold mb-4 italic uppercase">עריכת אוצר מילים</h2>
            <textarea id="vocabInput" class="w-full h-48 bg-black text-white p-4 border border-zinc-700 rounded-lg font-mono mb-4" placeholder="Dog - כלב"></textarea>
            <button onclick="saveVocab()" class="btn-main btn-fill w-full">שמור מילים</button>
            <button onclick="closeModal('vocabModal')" class="w-full text-zinc-500 text-sm mt-2">סגור</button>
        </div>
    </div>

    <script>
        let vocabulary = [];
        let state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "ready" };
        let gameMode = "ai";

        function startGame(mode) {
            if (vocabulary.length < 3) {
                alert("יש להוזין לפחות 3 מילים בעריכת המילים!");
                return;
            }
            gameMode = mode;
            state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "playing" };
            document.getElementById('lobbyModal').classList.remove('active');
            updateUI();
            showQuiz();
        }

        function cellClick(i) {
            if (state.status !== "ready_to_move" || state.board[i] !== "") return;
            
            state.board[i] = state.currentPlayer;
            state.history[state.currentPlayer].push(i);
            
            // לוגיקת ה-3 סימנים: מחיקת הישן ביותר
            if (state.history[state.currentPlayer].length > 3) {
                const oldIdx = state.history[state.currentPlayer].shift();
                state.board[oldIdx] = "";
            }

            if (checkWin()) {
                confetti();
                alert(state.currentPlayer + " ניצח!");
                location.reload();
                return;
            }

            state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
            state.status = "playing";
            updateUI();

            if (gameMode === "ai" && state.currentPlayer === "O") {
                setTimeout(aiMove, 1000);
            } else {
                showQuiz();
            }
        }

        function aiMove() {
            const empty = state.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                const randomIdx = empty[Math.floor(Math.random() * empty.length)];
                state.board[randomIdx] = "O";
                state.history.O.push(randomIdx);
                if (state.history.O.length > 3) state.board[state.history.O.shift()] = "";
                
                if (checkWin()) { alert("ה-AI ניצח!"); location.reload(); return; }
                state.currentPlayer = "X";
                state.status = "playing";
                updateUI();
                showQuiz();
            }
        }

        function showQuiz() {
            const item = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random() * vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const color = state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            const qTxt = document.getElementById('questionText');
            qTxt.textContent = item.en;
            qTxt.style.color = color;
            qTxt.style.textShadow = `0 0 15px ${color}`;

            document.getElementById('quizContent').classList.remove('hidden');
            document.getElementById('planningArea').classList.add('hidden');
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.style.borderColor = color;
                btn.textContent = o;
                btn.onclick = () => {
                    if (o === item.he) {
                        // תשובה נכונה - עוברים למסך תכנון
                        document.getElementById('quizContent').classList.add('hidden');
                        document.getElementById('planningArea').classList.remove('hidden');
                        state.status = "ready_to_move";
                        updateUI();
                    } else {
                        alert("טעות! התור עובר");
                        state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
                        updateUI();
                        document.getElementById('quizModal').classList.remove('active');
                        if (gameMode === "ai" && state.currentPlayer === "O") setTimeout(aiMove, 1000);
                        else showQuiz();
                    }
                };
                container.appendChild(btn);
            });
            document.getElementById('quizModal').classList.add('active');
            speak(item.en);
        }

        function closeQuizAndContinue() {
            document.getElementById('quizModal').classList.remove('active');
        }

        function updateUI() {
            const bar = document.getElementById('turnBar');
            bar.className = `h-16 flex items-center justify-center border-b border-zinc-800 text-2xl font-bold ${state.currentPlayer === 'X' ? 'x-style' : 'o-style'}`;
            document.getElementById('turnIcon').textContent = state.currentPlayer === "X" ? "✕" : "◯";

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = `cell ${val === 'X' ? 'x-style' : 'o-style'}`;
                
                // סימן שעומד להימחק (חצי שקוף)
                if (state.history.X.length === 3 && state.history.X[0] === i) cell.classList.add('opacity-30');
                if (state.history.O.length === 3 && state.history.O[0] === i) cell.classList.add('opacity-30');
            });
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => state.board[p[0]] && state.board[p[0]] === state.board[p[1]] && state.board[p[0]] === state.board[p[2]]);
        }

        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function openEditor() { document.getElementById('vocabModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function saveVocab() {
            vocabulary = document.getElementById('vocabInput').value.split('\n').map(line => {
                const p = line.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i !== null);
            closeModal('vocabModal');
        }
        function showRules() { alert("חוקי המשחק:\n1. עונים על שאלה כדי לשים סימן.\n2. מותר רק 3 סימנים על הלוח.\n3. הסימן הרביעי ימחק את הסימן הראשון ששמתם (הוא מופיע חצי שקוף).\n4. תכננו את הצעדים שלכם!"); }
    </script>
</body>
</html>
