<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .btn-active:active { transform: scale(0.95); }
        .gradient-header { background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); }
        .progress-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .heart-beat { animation: heartbeat 1s infinite; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        const App = () => {
            const [step, setStep] = useState('menu');
            const [unlocked, setUnlocked] = useState(false);
            const [finalScore, setFinalScore] = useState(null);

            const allQuestions = useMemo(() => [
                { id: 1, q: "___ a green apple on the desk.", options: ["There is", "There are"], correct: "There is", hint: "Apple הוא שם עצם ביחיד, לכן נשתמש ב-There is." },
                { id: 2, q: "The ___ (fox) are in the forest.", options: ["foxes", "foxs"], correct: "foxes", hint: "לשמות עצם שמסתיימים ב-x מוסיפים es ברבים." },
                { id: 3, q: "___ many students in the library.", options: ["There is", "There are"], correct: "There are", hint: "Students הם שמות עצם ברבים, לכן נשתמש ב-There are." },
                { id: 4, q: "___ an eraser in my pencil case.", options: ["There is", "There are"], correct: "There is", hint: "Eraser הוא שם עצם ביחיד." },
                { id: 5, q: "Dana ___ a very cute cat.", options: ["have", "has"], correct: "has", hint: "הגוף She (דנה) מקבל has." },
                { id: 6, q: "The students ___ new books.", options: ["have", "has"], correct: "have", hint: "הגוף They (סטודנטים) מקבל have." },
                { id: 7, q: "The dog ___ a long tail.", options: ["have", "has"], correct: "has", hint: "הגוף It (כלב) מקבל has." },
                { id: 8, q: "I ___ a blue pen.", options: ["have", "has"], correct: "have", hint: "הגוף I תמיד מקבל have." }
            ], []);

            const Quiz = ({ qList, title, isFinal = false }) => {
                const shuffledList = useMemo(() => shuffleArray(qList), [qList]);
                const [idx, setIdx] = useState(0);
                const [points, setPoints] = useState(0);
                const [feedback, setFeedback] = useState(null);
                const [selectedAns, setSelectedAns] = useState(null);
                const [done, setDone] = useState(false);

                const currentOptions = useMemo(() => {
                    if (!shuffledList[idx]) return [];
                    return shuffleArray(shuffledList[idx].options);
                }, [idx, shuffledList]);

                const handleAns = (ans) => {
                    if (feedback || done) return;
                    setSelectedAns(ans);
                    const isCorrect = ans === shuffledList[idx].correct;
                    if (isCorrect) setPoints(p => p + 1);
                    setFeedback(isCorrect ? 'correct' : 'wrong');
                };

                const next = () => {
                    if (idx < shuffledList.length - 1) {
                        setFeedback(null);
                        setSelectedAns(null);
                        setIdx(prev => prev + 1);
                    } else {
                        const score = Math.round((points / shuffledList.length) * 100);
                        if (isFinal) {
                            setFinalScore(score);
                            if (score >= 60) setUnlocked(true);
                        }
                        setDone(true);
                    }
                };

                if (done) return (
                    <div className="text-center p-8 animate-pop">
                        <div className="text-7xl font-black mb-4 text-indigo-600 drop-shadow-md">{Math.round((points / shuffledList.length) * 100)}%</div>
                        <h2 className="text-2xl font-bold mb-8 text-slate-700">סיימת את המשימה!</h2>
                        <button onClick={() => setStep('menu')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-[25px] font-black text-xl shadow-lg shadow-indigo-200 transition-all btn-active">חזרה לתפריט</button>
                    </div>
                );

                const current = shuffledList[idx];
                if (!current) return null;

                const renderQuestion = () => {
                    const text = current.q;
                    const parts = text.split("___");
                    return (
                        <h3 className="text-3xl font-black text-slate-800 leading-relaxed" dir="ltr">
                            {parts[0]}
                            <span className={`mx-2 ${feedback ? 'underline decoration-4' : 'text-indigo-500 underline decoration-2'}`} 
                                  style={{ color: feedback === 'correct' ? '#10b981' : feedback === 'wrong' ? '#f43f5e' : 'inherit' }}>
                                {selectedAns || "____"}
                            </span>
                            {parts[1]}
                        </h3>
                    );
                };

                return (
                    <div className="animate-pop">
                        <div className="flex justify-between items-end mb-4 font-bold text-slate-400">
                            <span className="text-indigo-500 font-black tracking-tight">{title}</span>
                            <span className="text-xs uppercase">שאלה {idx + 1} מתוך {shuffledList.length}</span>
                        </div>
                        <div className="h-2 w-full bg-slate-200 rounded-full mb-8 overflow-hidden">
                            <div className="h-full bg-indigo-500 progress-bar" style={{ width: `${((idx + 1) / shuffledList.length) * 100}%` }}></div>
                        </div>
                        <div className="bg-white p-10 rounded-[40px] shadow-sm mb-8 border-2 border-slate-50 text-center flex items-center justify-center min-h-[160px]">
                            {renderQuestion()}
                        </div>
                        {!feedback ? (
                            <div className="grid grid-cols-1 gap-4">
                                {currentOptions.map(o => (
                                    <button key={o} onClick={() => handleAns(o)} className="p-6 bg-white border-2 border-slate-200 rounded-[25px] font-black text-2xl text-indigo-700 hover:border-indigo-400 hover:bg-indigo-50 transition-all btn-active shadow-sm">{o}</button>
                                ))}
                            </div>
                        ) : (
                            <div className={`p-8 rounded-[35px] border-4 animate-pop shadow-xl ${feedback === 'correct' ? 'bg-emerald-50 border-emerald-400 text-emerald-900' : 'bg-rose-50 border-rose-400 text-rose-900'}`}>
                                <h4 className="font-black text-2xl mb-2">{feedback === 'correct' ? 'מעולה!' : 'טיפ קטן'}</h4>
                                <p className="font-bold text-lg mb-8 leading-relaxed">{feedback === 'correct' ? 'תשובה מדויקת. בוא נמשיך!' : current.hint}</p>
                                <button onClick={next} className={`w-full py-5 rounded-[20px] font-black text-xl text-white shadow-lg btn-active ${feedback === 'correct' ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-rose-500 hover:bg-rose-600'}`}>המשך</button>
                            </div>
                        )}
                    </div>
                );
            };

            const SentenceGame = () => {
                const [score, setScore] = useState(0);
                const [lives, setLives] = useState(3);
                const [gameState, setGameState] = useState('playing');
                const [currentTask, setCurrentTask] = useState(null);
                const [feedback, setFeedback] = useState(null);
                const [selectedVal, setSelectedVal] = useState(null);

                const tasks = [
                    { t: "___ a cat.", a: "There is" },
                    { t: "___ many dogs.", a: "There are" },
                    { t: "She ___ a ball.", a: "has" },
                    { t: "We ___ a car.", a: "have" },
                    { t: "___ an apple.", a: "There is" },
                    { t: "He ___ a book.", a: "has" },
                    { t: "___ five pens.", a: "There are" }
                ];

                useEffect(() => {
                    if (gameState === 'playing' && !feedback) {
                        setCurrentTask(tasks[Math.floor(Math.random() * tasks.length)]);
                        setSelectedVal(null);
                    }
                }, [score, gameState, feedback]);

                const check = (val) => {
                    if (feedback || gameState !== 'playing') return;
                    setSelectedVal(val);
                    if (val === currentTask.a) {
                        const newScore = score + 20;
                        setFeedback('correct');
                        if (newScore >= 100) {
                            setScore(100);
                            setTimeout(() => setGameState('won'), 500);
                        } else {
                            setScore(newScore);
                            setTimeout(() => setFeedback(null), 800);
                        }
                    } else {
                        setFeedback('wrong');
                        const newLives = lives - 1;
                        setLives(newLives);
                        if (newLives <= 0) {
                            setTimeout(() => setGameState('lost'), 600);
                        } else {
                            setTimeout(() => setFeedback(null), 1000);
                        }
                    }
                };

                if (gameState === 'won') return (
                    <div className="text-center p-10 animate-pop">
                        <div className="text-8xl mb-6">🏆</div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800">ניצחת! 100%</h2>
                        <button onClick={() => setStep('menu')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-[25px] font-black text-xl shadow-lg btn-active">חזרה לתפריט</button>
                    </div>
                );

                if (gameState === 'lost') return (
                    <div className="text-center p-10 animate-pop">
                        <div className="text-7xl mb-6">💔</div>
                        <h2 className="text-3xl font-black mb-4 text-slate-800">נגמרו החיים... נסה שוב!</h2>
                        <button onClick={() => setStep('menu')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-[25px] font-black text-xl shadow-lg btn-active">חזרה</button>
                    </div>
                );

                return (
                    <div className="animate-pop">
                        <div className="mb-6 flex justify-between items-center bg-indigo-50 p-5 rounded-[30px] border border-indigo-100">
                            <span className="font-black text-indigo-700 text-2xl tracking-tighter">SCORE: {score}%</span>
                            <div className="flex gap-1">
                                {[...Array(3)].map((_, i) => (
                                    <span key={i} className={`text-2xl ${i < lives ? 'text-rose-500 heart-beat' : 'text-slate-300 opacity-50'}`}>
                                        {i < lives ? '❤️' : '🖤'}
                                    </span>
                                ))}
                            </div>
                        </div>
                        <div className={`p-12 bg-white rounded-[45px] border-4 mb-8 flex items-center justify-center min-h-[220px] transition-all duration-300 ${feedback === 'correct' ? 'border-emerald-400 bg-emerald-50 scale-105 shadow-lg' : feedback === 'wrong' ? 'border-rose-400 bg-rose-50 animate-shake' : 'border-slate-50 shadow-sm'}`}>
                            <p className="text-4xl font-black text-slate-800 text-center" dir="ltr">
                                {currentTask?.t.split('___')[0]}
                                <span className={`mx-2 underline decoration-4 ${feedback === 'correct' ? 'text-emerald-500' : feedback === 'wrong' ? 'text-rose-500' : 'text-indigo-500'}`}>
                                    {selectedVal || "____"}
                                </span>
                                {currentTask?.t.split('___')[1]}
                            </p>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            {["There is", "There are", "have", "has"].map(b => (
                                <button key={b} onClick={() => check(b)} disabled={!!feedback} className="p-6 bg-white border-2 border-slate-200 rounded-[25px] font-black text-xl text-slate-700 hover:border-indigo-400 hover:text-indigo-600 transition-all btn-active shadow-sm disabled:opacity-50">{b}</button>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-6">
                    {step === 'menu' ? (
                        <div className="animate-pop">
                            <div className="gradient-header p-12 rounded-[55px] text-white text-center shadow-2xl mb-10 relative overflow-hidden">
                                <h1 className="text-5xl font-black italic mb-3 tracking-tighter drop-shadow-lg">English Mastery</h1>
                                <p className="font-bold text-lg opacity-90 leading-tight">בואו נכבוש את השפה האנגלית!</p>
                            </div>
                            <div className="grid grid-cols-2 gap-5">
                                <button onClick={() => setStep('u1_learn')} className="bg-blue-600 p-8 rounded-[40px] text-white btn-active flex flex-col items-center justify-center shadow-lg hover:bg-blue-700">
                                    <span className="text-xl font-black">There is/are</span>
                                </button>
                                <button onClick={() => setStep('u2_learn')} className="bg-emerald-600 p-8 rounded-[40px] text-white btn-active flex flex-col items-center justify-center shadow-lg hover:bg-emerald-700">
                                    <span className="text-xl font-black">Have/Has</span>
                                </button>
                                <button onClick={() => setStep('final')} className="bg-orange-500 p-8 rounded-[40px] text-white btn-active flex flex-col items-center justify-center shadow-lg hover:bg-orange-600 col-span-1">
                                    <span className="text-xl font-black">אתגר 100%</span>
                                    {finalScore !== null && <span className="text-xs font-black mt-1 bg-white/20 px-2 py-0.5 rounded-full">{finalScore}%</span>}
                                </button>
                                <button onClick={() => unlocked && setStep('game')} className={`p-8 rounded-[40px] btn-active flex flex-col items-center justify-center border-2 transition-all ${unlocked ? 'bg-indigo-600 text-white border-transparent shadow-indigo-200 shadow-xl' : 'bg-slate-100 text-slate-400 border-slate-200'}`}>
                                    <span className="text-xl font-black">{unlocked ? 'משחק' : 'נעול'}</span>
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1">
                            <button onClick={() => setStep('menu')} className="mb-8 text-indigo-600 font-black flex items-center gap-2 hover:bg-indigo-50 p-2 px-4 rounded-xl transition-colors w-fit">➜ חזרה לתפריט</button>
                            {step === 'u1_learn' && (
                                <div className="animate-pop space-y-8">
                                    <h2 className="text-4xl font-black text-blue-700 text-center tracking-tight">There is / There are</h2>
                                    <div className="bg-white p-8 rounded-[40px] shadow-sm border-2 border-slate-50">
                                        <p className="text-xl font-bold mb-6 text-slate-700 text-center">מתי נשתמש ב-an לפני שם עצם?</p>
                                        <div className="flex justify-center gap-3 mb-4">
                                            {['a', 'e', 'i', 'o', 'u'].map(l => <span key={l} className="w-10 h-10 flex items-center justify-center bg-blue-100 rounded-full font-black text-blue-600 text-xl shadow-inner">{l}</span>)}
                                        </div>
                                        <p className="text-sm text-center font-bold text-slate-600 leading-relaxed italic">משתמשים ב-an לפני שם עצם שמתחיל באות ניקוד.</p>
                                    </div>
                                    <button onClick={() => setStep('u1_quiz')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-6 rounded-[30px] font-black text-2xl shadow-xl transition-all btn-active">בואו נתרגל!</button>
                                </div>
                            )}
                            {step === 'u2_learn' && (
                                <div className="animate-pop space-y-8 text-center">
                                    <h2 className="text-4xl font-black text-emerald-700 tracking-tight">Have / Has</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-8 rounded-[35px] shadow-sm border-2 border-slate-50">
                                            <b className="text-emerald-600 text-3xl font-black italic">HAVE</b>
                                            <div className="mt-4 font-black text-slate-700 text-lg">I, You, We, They</div>
                                        </div>
                                        <div className="bg-white p-8 rounded-[35px] shadow-sm border-2 border-slate-50">
                                            <b className="text-emerald-600 text-3xl font-black italic">HAS</b>
                                            <div className="mt-4 font-black text-slate-700 text-lg">He, She, It</div>
                                        </div>
                                    </div>
                                    <button onClick={() => setStep('u2_quiz')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-6 rounded-[30px] font-black text-2xl shadow-xl transition-all btn-active">בואו נתרגל!</button>
                                </div>
                            )}
                            {step === 'u1_quiz' && <Quiz qList={allQuestions.slice(0, 4)} title="Lesson 1 Practice" />}
                            {step === 'u2_quiz' && <Quiz qList={allQuestions.slice(4, 8)} title="Lesson 2 Practice" />}
                            {step === 'final' && <Quiz qList={allQuestions} title="המבחן המסכם" isFinal={true} />}
                            {step === 'game' && <SentenceGame />}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
