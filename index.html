<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe Bolt</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2;
            --o-color: #d32f2f;
            --yellow: #facc15;
            --correct: #4caf50;
            --wrong: #f44336;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            background: var(--bg-color); 
            color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; overflow: hidden; position: fixed; width: 100%; 
        }
        
        /* לוגו ותפריט */
        .logo-container { margin-top: 40px; margin-bottom: 30px; text-align: center; }
        .super-text { font-size: 5.5rem; font-weight: 900; color: var(--yellow); margin: 0; line-height: 0.8; text-shadow: 4px 4px 0px #000; letter-spacing: 2px; }
        .ttt-text { color: #fff; font-size: 2.4rem; font-weight: 900; margin-top: 5px; text-shadow: 2px 2px 0px #000; }

        .btn-main { 
            width: 300px; height: 65px; border-radius: 40px; font-weight: 900; 
            margin-bottom: 15px; border: 4px solid #000; background: #fff; 
            color: #000; font-size: 1.6rem; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 5px 0 #000; cursor: pointer; 
            transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        /* כותרת משחק */
        .header-controls { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 92vw; max-width: 400px; margin: 20px auto 10px; height: 60px;
        }
        #statusContainer { 
            background: #fff; height: 55px; border-radius: 50px; 
            box-shadow: 0 4px 0px #000; border: 3px solid #000; 
            flex: 1; margin: 0 10px; display: flex; align-items: center; justify-content: center;
        }
        #statusText { font-size: 1.8rem; font-weight: 900; color: #000; }

        .icon-btn { background: none; border: none; font-size: 2.2rem; cursor: pointer; color: #fff; text-shadow: 2px 2px 0 #000; padding: 5px; }

        /* לוח משחק מיושר */
        .super-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            background: #000; border: 4px solid #000; border-radius: 12px; 
            width: 92vw; max-width: 380px; aspect-ratio: 1 / 1; margin: 10px auto; 
            overflow: hidden; gap: 4px;
        }
        .mini-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            background: #fff; position: relative; gap: 1px; padding: 1px;
        }
        .cell { 
            background: #fff; aspect-ratio: 1 / 1; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; font-weight: 900; border: 0.5px solid #eee;
        }
        .active-mini { background: #fff9c4; }
        .active-mini .cell { background: #fff9c4; }
        
        .x-color { color: var(--x-color); }
        .o-color { color: var(--o-color); }

        .mini-win-overlay { 
            position: absolute; inset: 0; display: flex; align-items: center; 
            justify-content: center; font-size: 6.5rem; font-weight: 900; 
            z-index: 20; background: rgba(255, 255, 255, 0.95); 
        }

        /* כפתור שאלה שטוח */
        .q-btn { 
            width: 90px; height: 90px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 4rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; margin: 20px auto; box-shadow: none;
        }

        /* מודאל שאלות */
        .modal { position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .word-row { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; margin-bottom: 20px; width: 100%;
        }
        #qWord { font-size: clamp(2.5rem, 10vw, 4.2rem); font-weight: 900; text-shadow: 3px 3px 0 #000; margin: 0; }
        
        /* כפתור הקראה שקוף משמאל */
        .speaker-btn { 
            background: none; border: none; padding: 0; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; order: -1; /* מעביר לשמאל ב-flex */
        }
        .speaker-btn svg { width: 40px; height: 40px; fill: white; filter: drop-shadow(2px 2px 0 #000); }

        .opt-btn { transition: background 0.3s, transform 0.1s; }
        .opt-correct { background: var(--correct) !important; color: white !important; }
        .opt-wrong { background: var(--wrong) !important; color: white !important; }

        .hidden { display: none; }
        .footer-text { font-size: 0.9rem; margin-top: auto; padding-bottom: 15px; opacity: 0.8; text-align: center; }
    </style>
</head>
<body>

    <div id="lobby" class="modal" style="display: flex;">
        <div class="logo-container">
            <h1 class="super-text">SUPER</h1>
            <div class="ttt-text">TIC TAC TOE</div>
        </div>
        <button onclick="showModal('vocabModal')" class="btn-main" style="background-color: var(--yellow);">הוספת מילים</button>
        <button onclick="startGame('pvp')" class="btn-main" style="color: var(--x-color);">שחקן נגד שחקן</button>
        <button onclick="startGame('pvc')" class="btn-main" style="color: var(--o-color);">שחקן נגד מחשב</button>
        <div class="footer-text">פותח ע"י חזי כהן גלמן 2026 ©</div>
    </div>

    <div id="gameUI" class="hidden" style="flex-direction: column; height: 100%;">
        <div class="header-controls">
            <button onclick="location.reload()" class="icon-btn">➔</button>
            <div id="statusContainer"><div id="statusText">תור X</div></div>
            <button onclick="showModal('videoModal')" class="icon-btn">ⓘ</button>
        </div>
        <div id="mainGrid" class="super-grid"></div>
        <div id="qButton" onclick="openQuiz()" class="q-btn x-color">?</div>
        <div class="footer-text">SUPER TIC TAC TOE © 2026</div>
    </div>

    <div id="quizModal" class="modal">
        <div class="word-row">
            <div id="qWord"></div>
            <button class="speaker-btn" onclick="speakWord()">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
        </div>
        <div id="qOptions" style="display: flex; flex-direction: column; width: 100%; align-items: center; gap: 10px;"></div>
    </div>

    <div id="videoModal" class="modal">
        <h2 style="margin-bottom: 15px;">איך משחקים?</h2>
        <div style="width: 100%; max-width: 350px; aspect-ratio: 9/16; background: #000; border-radius: 15px; overflow: hidden;">
            <iframe id="rulesVideo" style="width:100%; height:100%; border:none;" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closeVideoModal()" class="btn-main" style="margin-top: 20px;">סגור</button>
    </div>

    <div id="vocabModal" class="modal">
        <h2 style="margin-bottom: 15px;">עריכת אוצר מילים</h2>
        <textarea id="vInput" style="width: 85vw; max-width: 350px; height: 50vh; border-radius: 15px; padding: 15px; border: 4px solid #000; font-size: 1.1rem; text-align: right;"></textarea>
        <button onclick="hideModal('vocabModal')" class="btn-main" style="margin-top: 20px; background: var(--yellow);">שמור וחזור</button>
    </div>

    <script>
        let vocab = [], turn = "X", activeBoard = -1, canMove = false, gameMode = 'pvp';
        let superData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let currentWord = null;
        let isAnswering = false;

        window.onload = () => {
            const saved = localStorage.getItem('sttt_bolt_final');
            document.getElementById('vInput').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול";
            // Pre-warm TTS
            window.speechSynthesis.getVoices();
        };

        const showModal = id => {
            if(id === 'videoModal') document.getElementById('rulesVideo').src = "https://www.youtube.com/embed/xLcUtltJk2c?autoplay=1";
            document.getElementById(id).style.display = 'flex';
        }
        
        const hideModal = id => document.getElementById(id).style.display = 'none';

        function closeVideoModal() {
            document.getElementById('rulesVideo').src = "";
            hideModal('videoModal');
        }

        function startGame(mode) {
            const raw = document.getElementById('vInput').value;
            vocab = raw.split('\n').map(l => {
                const p = l.split(/[–\-\—:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);
            if(vocab.length < 4) return alert("הכנס לפחות 4 מילים");
            
            localStorage.setItem('sttt_bolt_final', raw);
            gameMode = mode;
            hideModal('lobby');
            document.getElementById('gameUI').style.display = 'flex';
            initBoard();
            updateUI();
        }

        function initBoard() {
            const container = document.getElementById('mainGrid');
            container.innerHTML = '';
            for(let b=0; b<9; b++) {
                const mini = document.createElement('div');
                mini.id = `mini-${b}`;
                mini.className = 'mini-grid';
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => handleCellClick(b, c);
                    mini.appendChild(cell);
                }
                container.appendChild(mini);
            }
        }

        function handleCellClick(bIdx, cIdx) {
            if(!canMove || miniWinners[bIdx] !== "" || superData[bIdx][cIdx] !== "") return;
            if(activeBoard !== -1 && activeBoard !== bIdx) return;
            
            superData[bIdx][cIdx] = turn;
            canMove = false;
            
            if(checkCombo(superData[bIdx], turn)) miniWinners[bIdx] = turn;

            const isFull = superData[cIdx].every(cell => cell !== "");
            activeBoard = (miniWinners[cIdx] !== "" || isFull) ? -1 : cIdx;

            if(checkCombo(miniWinners, turn)) {
                confetti({ particleCount: 200, spread: 80 });
                setTimeout(() => { alert(`ניצחון ל-${turn}!`); location.reload(); }, 500);
                return;
            }
            
            turn = turn === "X" ? "O" : "X";
            updateUI();
            if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 800);
        }

        function speakWord() {
            if(!currentWord) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(currentWord.en);
            u.lang = 'en-US';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function openQuiz() {
            if(canMove || isAnswering) return;
            isAnswering = true;
            currentWord = vocab[Math.floor(Math.random() * vocab.length)];
            const opts = [currentWord.he];
            while(opts.length < 3) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            
            document.getElementById('qWord').textContent = currentWord.en;
            const cont = document.getElementById('qOptions'); 
            cont.innerHTML = '';
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-main opt-btn'; 
                b.textContent = o;
                b.onclick = () => handleAnswer(b, o === currentWord.he);
                cont.appendChild(b);
            });
            showModal('quizModal');
        }

        function handleAnswer(btn, isCorrect) {
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(b => {
                b.disabled = true;
                if(b.textContent === currentWord.he) b.classList.add('opt-correct');
            });

            if(!isCorrect) btn.classList.add('opt-wrong');

            setTimeout(() => {
                hideModal('quizModal');
                isAnswering = false;
                if(isCorrect) {
                    canMove = true; updateUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(executeAiMove, 500);
                } else {
                    turn = turn === "X" ? "O" : "X"; updateUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
                }
            }, 1200);
        }

        function executeAiMove() {
            let boards = activeBoard === -1 ? 
                miniWinners.map((w,i)=>w==="" && !superData[i].every(c=>c!=="") ?i:null).filter(v=>v!==null) : [activeBoard];
            if (boards.length === 0) return;
            let b = boards[Math.floor(Math.random()*boards.length)];
            let cells = superData[b].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            let c = cells[Math.floor(Math.random()*cells.length)];
            handleCellClick(b, c);
        }

        function checkCombo(arr, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => s.every(i => arr[i] === p));
        }

        function updateUI() {
            const stText = document.getElementById('statusText');
            stText.textContent = `תור ${turn}`;
            stText.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';
            
            const qBtn = document.getElementById('qButton');
            qBtn.textContent = canMove ? '!' : '?';
            qBtn.className = `q-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;

            for(let b=0; b<9; b++) {
                const mini = document.getElementById(`mini-${b}`);
                mini.className = 'mini-grid';
                if(canMove && (activeBoard === -1 || activeBoard === b) && miniWinners[b] === "") {
                    mini.classList.add('active-mini');
                }
                
                const cells = mini.querySelectorAll('.cell');
                superData[b].forEach((val, i) => {
                    cells[i].textContent = val === 'X' ? '✕' : (val === 'O' ? '◯' : '');
                    cells[i].className = 'cell ' + (val === 'X' ? 'x-color' : (val === 'O' ? 'o-color' : ''));
                });
                
                if(miniWinners[b] !== "" && !mini.querySelector('.mini-win-overlay')) {
                    const over = document.createElement('div');
                    over.className = 'mini-win-overlay ' + (miniWinners[b] === 'X' ? 'x-color' : 'o-color');
                    over.textContent = miniWinners[b] === 'X' ? '✕' : '◯';
                    mini.appendChild(over);
                }
            }
        }
    </script>
</body>
</html>
