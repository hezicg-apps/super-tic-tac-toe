<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe Bolt</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { 
            background: #1a7b4e; 
            color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; overflow: hidden; position: fixed; width: 100%; 
        }
        
        .logo-container { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .super-text { font-size: 5rem; font-weight: 900; color: #facc15; margin: 0; line-height: 0.9; text-shadow: 4px 4px 0px #000; }
        .ttt-text { color: #fff; font-size: 2.2rem; font-weight: 900; margin-top: 5px; }

        .header-controls { display: flex; align-items: center; justify-content: center; width: 100%; margin-top: 20px; gap: 15px; padding: 0 10px; }
        #statusContainer { background: rgba(255, 255, 255, 0.95); padding: 10px 0; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); flex: 1; max-width: 280px; text-align: center; border: 3px solid #000; }
        #statusText { font-size: 2.2rem; font-weight: 900; line-height: 1; }

        .side-btn { color: #fff; background: none; border: none; font-size: 2.2rem; font-weight: 900; cursor: pointer; padding: 5px; -webkit-tap-highlight-color: transparent; }

        .super-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; background: #000; border-radius: 12px; width: 92vw; max-width: 380px; aspect-ratio: 1 / 1; margin: 15px auto; }
        .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #bbb; position: relative; border-radius: 4px; overflow: hidden; }
        .cell { background: #fff; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; cursor: pointer; }
        .active-mini { outline: 5px solid #facc15; z-index: 20; box-shadow: 0 0 20px rgba(250, 204, 21, 0.6); }
        .x-color { color: #1976d2; }
        .o-color { color: #d32f2f; }

        .mini-win-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 7.5rem; font-weight: 900; z-index: 30; background: rgba(255, 255, 255, 0.9); pointer-events: none; }

        .q-btn { width: 85px; height: 85px; border-radius: 50%; background: #fff; border: 6px solid #000; font-size: 4rem; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.4); margin: 20px auto; }
        .btn-main { width: 280px; min-height: 60px; border-radius: 35px; font-weight: 900; margin-bottom: 12px; border: 4px solid #000; background: #fff; color: #000; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 0 #000; cursor: pointer; text-align: center; }
        
        .modal { position: fixed; inset: 0; background: rgba(26, 123, 78, 0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none; }
        .flex { display: flex; }

        /* תיקון למילים ארוכות במודאל השאלה */
        .question-container { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 90vw; margin-bottom: 25px; gap: 10px; }
        #qWord { 
            font-size: clamp(2.5rem, 12vw, 4.5rem); 
            font-weight: 900; 
            word-break: break-word; 
            max-width: 75%; 
            text-align: center; 
            line-height: 1;
        }

        .speak-btn { background: #facc15; border: 3px solid #000; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="lobby" class="modal" style="display: flex;">
        <div class="logo-container">
            <h1 class="super-text">SUPER</h1>
            <div class="ttt-text">TIC TAC TOE</div>
        </div>
        <button onclick="showModal('vocabModal')" class="btn-main" style="background-color: #facc15;">הוספת מילים</button>
        <button onclick="startGame('pvp')" class="btn-main" style="color: #1976d2;">שחקן נגד שחקן</button>
        <button onclick="startGame('pvc')" class="btn-main" style="color: #d32f2f;">שחקן נגד מחשב</button>
    </div>

    <div id="gameUI" class="hidden flex flex-col items-center justify-between" style="height: 100%;">
        <div class="header-controls">
            <button onclick="location.reload()" class="side-btn">➔</button>
            <div id="statusContainer"><div id="statusText">תור X</div></div>
            <button onclick="alert('חוקים: נצח 3 לוחות ברצף. כל מהלך קובע איפה היריב ישחק. אם הלוח מלא או תפוס - תקבל מהלך חופשי (Wildcard)!')" class="side-btn">ⓘ</button>
        </div>
        <div id="mainGrid" class="super-grid"></div>
        <div id="qButton" onclick="openQuiz()" class="q-btn x-color">?</div>
        <div style="font-size: 0.8rem; padding-bottom: 10px;">פותח ע"י חזי כהן גלמן 2026 ©</div>
    </div>

    <div id="quizModal" class="modal">
        <div class="question-container">
            <div id="qWord"></div>
            <button onclick="speakWord()" class="speak-btn">🔊</button>
        </div>
        <div id="qOptions" class="flex flex-col gap-4" style="width: 280px; max-width: 90vw;"></div>
    </div>

    <div id="vocabModal" class="modal">
        <h2 style="color: #fff; font-size: 2rem; margin-bottom: 10px;">עריכת מילים</h2>
        <textarea id="vInput" style="width: 85vw; max-width: 400px; height: 300px; padding: 15px; border-radius: 15px; text-align: right; font-family: sans-serif; font-size: 1.1rem;"></textarea>
        <button onclick="hideModal('vocabModal')" class="btn-main" style="margin-top: 15px; background: #facc15;">שמור</button>
    </div>

    <script>
        let vocab = [], turn = "X", activeBoard = -1, canMove = false, gameMode = 'pvp';
        let superData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let quizActive = false, currentEn = "";

        window.onload = () => {
            const saved = localStorage.getItem('sttt_bolt_v8');
            document.getElementById('vInput').value = saved || "red - אדום\nblue - כחול\ngreen - ירוק\nyellow - צהוב\napple - תפוח\ndog - כלב";
        };

        const showModal = id => document.getElementById(id).style.display = 'flex';
        const hideModal = id => document.getElementById(id).style.display = 'none';

        function startGame(mode) {
            const raw = document.getElementById('vInput').value;
            vocab = raw.split('\n').map(l => {
                const p = l.split(/[–\-\—:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);
            if(vocab.length < 3) return alert("הוסף עוד מילים");
            
            localStorage.setItem('sttt_bolt_v8', raw);
            gameMode = mode;
            hideModal('lobby');
            document.getElementById('gameUI').classList.remove('hidden');
            initBoard();
            updateUI();
        }

        function initBoard() {
            const container = document.getElementById('mainGrid');
            container.innerHTML = '';
            for(let b=0; b<9; b++) {
                const mini = document.createElement('div');
                mini.id = `mini-${b}`;
                mini.className = 'mini-grid';
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => handleCellClick(b, c);
                    mini.appendChild(cell);
                }
                container.appendChild(mini);
            }
        }

        function handleCellClick(bIdx, cIdx) {
            if(!canMove || miniWinners[bIdx] !== "" || superData[bIdx][cIdx] !== "") return;
            if(activeBoard !== -1 && activeBoard !== bIdx) return;
            
            superData[bIdx][cIdx] = turn;
            canMove = false;
            
            if(checkCombo(superData[bIdx], turn)) {
                miniWinners[bIdx] = turn;
            }

            // לוגיקת Wildcard: אם הלוח הבא תפוס או מלא, הופך ל-1- (מהלך חופשי)
            const isFull = superData[cIdx].every(cell => cell !== "");
            activeBoard = (miniWinners[cIdx] !== "" || isFull) ? -1 : cIdx;

            if(checkCombo(miniWinners, turn)) {
                confetti({ particleCount: 200, spread: 80 });
                setTimeout(() => {
                    alert(`ניצחון ל-${turn}!`);
                    location.reload();
                }, 500);
                return;
            }
            
            turn = turn === "X" ? "O" : "X";
            updateUI();
            if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 800);
        }

        function openQuiz() {
            if(canMove || quizActive) return;
            quizActive = true;
            const item = vocab[Math.floor(Math.random() * vocab.length)];
            currentEn = item.en;
            const opts = [item.he];
            while(opts.length < 3) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            
            document.getElementById('qWord').textContent = item.en;
            const cont = document.getElementById('qOptions'); 
            cont.innerHTML = '';
            
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-main'; 
                b.textContent = o;
                b.onclick = () => {
                    quizActive = false;
                    hideModal('quizModal');
                    if(o === item.he) {
                        canMove = true; 
                        updateUI();
                        if(gameMode === 'pvc' && turn === 'O') setTimeout(executeAiMove, 400);
                    } else {
                        turn = turn === "X" ? "O" : "X"; 
                        updateUI();
                        if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
                    }
                };
                cont.appendChild(b);
            });
            showModal('quizModal');
            speakWord();
        }

        function speakWord() {
            if (!currentEn) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(currentEn);
            u.lang = 'en-US';
            u.rate = 0.9; // קצב דיבור מעט איטי יותר לבהירות
            window.speechSynthesis.speak(u);
        }

        function executeAiMove() {
            let boards = activeBoard === -1 ? 
                miniWinners.map((w,i)=>w==="" && !superData[i].every(c=>c!=="") ?i:null).filter(v=>v!==null) : [activeBoard];
            
            if (boards.length === 0) return;
            
            let b = boards[Math.floor(Math.random()*boards.length)];
            let cells = superData[b].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            let c = cells[Math.floor(Math.random()*cells.length)];
            handleCellClick(b, c);
        }

        function checkCombo(arr, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(s => s.every(i => arr[i] === p));
        }

        function render() {
            for(let b=0; b<9; b++) {
                const mini = document.getElementById(`mini-${b}`);
                mini.classList.remove('active-mini');
                const isFull = superData[b].every(cell => cell !== "");
                
                if(canMove && (activeBoard === -1 || activeBoard === b) && miniWinners[b] === "" && !isFull) {
                    mini.classList.add('active-mini');
                }
                
                const cells = mini.querySelectorAll('.cell');
                superData[b].forEach((val, i) => {
                    cells[i].textContent = val === 'X' ? '✕' : (val === 'O' ? '◯' : '');
                    cells[i].className = 'cell ' + (val === 'X' ? 'x-color' : (val === 'O' ? 'o-color' : ''));
                });
                
                if(miniWinners[b] !== "" && !mini.querySelector('.mini-win-overlay')) {
                    const over = document.createElement('div');
                    over.className = 'mini-win-overlay ' + (miniWinners[b] === 'X' ? 'x-color' : 'o-color');
                    over.textContent = miniWinners[b] === 'X' ? '✕' : '◯';
                    mini.appendChild(over);
                }
            }
        }

        function updateUI() {
            const st = document.getElementById('statusText');
            st.textContent = `תור ${turn}`;
            st.className = turn === 'X' ? 'x-color' : 'o-color';
            const btn = document.getElementById('qButton');
            btn.textContent = canMove ? '!' : '?';
            btn.className = `q-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;
            render();
        }
    </script>
</body>
</html>
