<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v1.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2; 
            --o-color: #d32f2f; 
            --yellow: #facc15;
            --black: #000000;
            --white: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0;
            user-select: none;
        }

        body, html { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .page.active { display: flex; }

        /* מסך בית */
        .logo-area { text-align: center; margin-bottom: 40px; }
        .m-title { font-size: 5rem; font-weight: 900; color: var(--yellow); line-height: 0.8; }
        .s-title { font-size: 2.2rem; font-weight: 900; margin-top: 5px; color: #fff; text-shadow: 2px 2px 0px #000; }

        .btn-stack { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .main-btn { 
            width: 280px; height: 60px; border-radius: 40px; font-weight: 900; 
            border: 4px solid #000; background: #fff; color: #000; 
            font-size: 1.4rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 0 #000; cursor: pointer; transition: 0.1s;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        .v-tag { font-size: 0.8rem; opacity: 0.8; position: absolute; bottom: 15px; text-align: center; width: 100%; }

        /* לוח משחק */
        .top-bar { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 90%; max-width: 400px; margin-bottom: 15px;
        }
        .status-pill { 
            background: #fff; height: 45px; border-radius: 40px; 
            border: 3px solid #000; flex: 1; margin: 0 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #000;
        }
        #turnLabel { font-size: 1.5rem; font-weight: 900; color: #000; }

        .board-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; border: 4px solid #000; border-radius: 8px;
            width: 90vw; max-width: 360px; aspect-ratio: 1/1; gap: 4px;
            overflow: hidden;
        }
        
        .mini-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; gap: 1px; height: 100%; width: 100%; position: relative;
        }

        .active-sub { 
            outline: 5px solid var(--yellow);
            outline-offset: -2px;
            z-index: 10;
        }

        .cell { 
            background: #fff; display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: 900; height: 100%; width: 100%;
            line-height: 0;
            padding: 0; margin: 0;
        }

        /* שיפור קריאות עם צל לבן עדין */
        .x-player { color: var(--x-color); text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff; }
        .o-player { color: var(--o-color); text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff; }

        .sub-win-mark { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 5.5rem; font-weight: 900; background: rgba(255, 255, 255, 0.9); z-index: 20;
        }

        .q-button { 
            width: 80px; height: 80px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 3.5rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; margin-top: 15px;
        }

        /* מודאלים */
        .modal-overlay { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 3000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        
        #wordToGuess { 
            font-size: 3.5rem; font-weight: 900; 
            text-shadow: 2px 2px 0 #fff; 
            margin: 0; text-align: center;
        }

        .tts-btn {
            background: none; border: none; cursor: pointer; color: #fff;
            display: flex; align-items: center; justify-content: center;
        }

        .info-link { background: none; border: none; font-size: 2.2rem; color: #fff; cursor: pointer; }

    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="home-page" class="page active">
        <div class="logo-area">
            <h1 class="m-title">SUPER</h1>
            <div class="s-title">TIC TAC TOE</div>
        </div>
        <div class="btn-stack">
            <button onclick="openTab('vocab')" class="main-btn" style="background: var(--yellow);">הוספת מילים</button>
            <button id="pvpBtn" onclick="initiateGame('pvp')" class="main-btn">שני שחקנים</button>
            <button id="pvcBtn" onclick="initiateGame('pvc')" class="main-btn">נגד המחשב</button>
            <button onclick="openTab('info')" class="info-link" style="margin-top:10px;">ⓘ הוראות</button>
        </div>
        <div class="v-tag">v1.9 | פותח ע"י חזי כהן גלמן</div>
    </div>

    <!-- מסך משחק -->
    <div id="game-page" class="page">
        <div class="top-bar">
            <button onclick="location.reload()" style="background:none; border:none; font-size:2.2rem; color:#fff;">➔</button>
            <div class="status-pill"><div id="turnLabel">תור X</div></div>
            <button onclick="openTab('info')" class="info-link">ⓘ</button>
        </div>
        
        <div id="mainBoard" class="board-container"></div>
        
        <div id="quizButton" onclick="triggerQuiz()" class="q-button x-player">?</div>
    </div>

    <!-- מודאל שאלה -->
    <div id="quiz-modal" class="modal-overlay">
        <div style="display:flex; flex-direction:column; align-items:center; gap:20px; margin-bottom: 30px;">
            <button class="tts-btn" onclick="speakWord()">
                <svg viewBox="0 0 24 24" width="70" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <h2 id="wordToGuess"></h2>
        </div>
        <div id="choiceContainer" style="display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px;"></div>
    </div>

    <!-- מודאל אוצר מילים -->
    <div id="vocab-modal" class="modal-overlay">
        <h2 style="margin-bottom:15px;">ניהול מילים</h2>
        <textarea id="vocabTxt" style="width:90%; height:50vh; border-radius:15px; padding:15px; border:4px solid #000; font-size:1.1rem; text-align:right;"></textarea>
        <button onclick="saveAndCloseVocab()" class="main-btn" style="margin-top:20px; background:var(--yellow);">שמור וצא</button>
    </div>

    <!-- מודאל הוראות -->
    <div id="info-modal" class="modal-overlay">
        <h2 style="margin-bottom:15px;">איך משחקים?</h2>
        <iframe id="vidFrame" style="width:90%; aspect-ratio:9/16; border:4px solid #000; border-radius:15px;" src="" allowfullscreen></iframe>
        <button onclick="closeInfoTab()" class="main-btn" style="margin-top:20px;">סגור</button>
    </div>

    <!-- מודאל ניצחון -->
    <div id="win-modal" class="modal-overlay" style="background:rgba(0,0,0,0.9);">
        <div style="background:#fff; padding:35px; border-radius:30px; border:8px solid var(--yellow); text-align:center; color:#000;">
            <h2 style="font-size:2.5rem; margin:0;">ניצחון!</h2>
            <div id="finalMark" style="font-size:6rem; font-weight:900;">✕</div>
            <p id="finalMsg" style="font-size:1.4rem; font-weight:900; margin-bottom:20px;"></p>
            <button onclick="location.reload()" class="main-btn" style="width:100%; background:var(--yellow);">משחק חדש</button>
        </div>
    </div>

    <script>
        let vocab = [], currTurn = "X", nextSub = -1, moveReady = false, gameMode = 'pvp';
        let fullGrid = Array(9).fill(null).map(() => Array(9).fill(""));
        let subWins = Array(9).fill("");
        let currentItem = null;

        // שחרור חסימת סאונד וטעינת קולות
        function unlockAudio() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(msg);
        }

        window.onload = () => {
            const saved = localStorage.getItem('sttt_v19_vocab');
            document.getElementById('vocabTxt').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול\nsun - שמש\nwater - מים";
        };

        function openTab(id) {
            if(id === 'vocab') document.getElementById('vocab-modal').style.display = 'flex';
            if(id === 'info') {
                document.getElementById('vidFrame').src = "https://www.youtube.com/embed/xLcUtltJk2c?autoplay=1";
                document.getElementById('info-modal').style.display = 'flex';
            }
        }

        function closeInfoTab() {
            document.getElementById('vidFrame').src = "";
            document.getElementById('info-modal').style.display = 'none';
        }

        function saveAndCloseVocab() {
            localStorage.setItem('sttt_v19_vocab', document.getElementById('vocabTxt').value);
            document.getElementById('vocab-modal').style.display = 'none';
        }

        function initiateGame(m) {
            unlockAudio(); 
            const raw = document.getElementById('vocabTxt').value.split('\n');
            vocab = raw.map(l => {
                const p = l.split(/[-–:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);

            if(vocab.length < 4) {
                alert("צריך לפחות 4 מילים תקינות");
                return;
            }
            
            gameMode = m;
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('game-page').classList.add('active');
            
            createBoard();
            updateAll();
        }

        function createBoard() {
            const b = document.getElementById('mainBoard');
            b.innerHTML = '';
            for(let i=0; i<9; i++) {
                const sub = document.createElement('div');
                sub.id = `subGrid-${i}`;
                sub.className = 'mini-grid';
                for(let j=0; j<9; j++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => doMove(i, j);
                    sub.appendChild(c);
                }
                b.appendChild(sub);
            }
        }

        function doMove(sIdx, cIdx) {
            if(!moveReady || subWins[sIdx] || fullGrid[sIdx][cIdx]) return;
            if(nextSub !== -1 && nextSub !== sIdx) return;

            fullGrid[sIdx][cIdx] = currTurn;
            const targetCell = document.getElementById(`subGrid-${sIdx}`).children[cIdx];
            targetCell.textContent = currTurn === 'X' ? '✕' : '◯';
            targetCell.className = 'cell ' + (currTurn === 'X' ? 'x-player' : 'o-player');

            if(checkSubWin(fullGrid[sIdx], currTurn)) subWins[sIdx] = currTurn;

            const isNextBlocked = fullGrid[cIdx].every(v => v !== "");
            nextSub = (subWins[cIdx] || isNextBlocked) ? -1 : cIdx;

            if(checkSubWin(subWins, currTurn)) {
                celebrate(currTurn);
                return;
            }

            currTurn = currTurn === 'X' ? 'O' : 'X';
            moveReady = false;
            updateAll();

            if(gameMode === 'pvc' && currTurn === 'O') setTimeout(triggerQuiz, 600);
        }

        function speakWord() {
            if(!currentItem) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(currentItem.en);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function triggerQuiz() {
            currentItem = vocab[Math.floor(Math.random() * vocab.length)];
            const pool = [currentItem.he];
            while(pool.length < 4) {
                const rand = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!pool.includes(rand)) pool.push(rand);
            }
            pool.sort(() => Math.random() - 0.5);

            const wordH2 = document.getElementById('wordToGuess');
            wordH2.textContent = currentItem.en;
            wordH2.className = currTurn === 'X' ? 'x-player' : 'o-player';

            const container = document.getElementById('choiceContainer');
            container.innerHTML = '';
            pool.forEach(p => {
                const b = document.createElement('button');
                b.className = 'main-btn';
                b.style.width = "100%";
                b.textContent = p;
                b.onclick = () => handleQuizResult(p === currentItem.he, b);
                container.appendChild(b);
            });

            document.getElementById('quiz-modal').style.display = 'flex';
            setTimeout(speakWord, 400);
        }

        function handleQuizResult(correct, btn) {
            const btns = document.querySelectorAll('#choiceContainer .main-btn');
            btns.forEach(b => b.disabled = true);

            if(correct) {
                btn.style.background = "#4caf50";
            } else {
                btn.style.background = "#f44336";
                btns.forEach(b => { if(b.textContent === currentItem.he) b.style.background = "#4caf50"; });
            }

            setTimeout(() => {
                document.getElementById('quiz-modal').style.display = 'none';
                if(correct) {
                    moveReady = true;
                    updateAll();
                    if(gameMode === 'pvc' && currTurn === 'O') runAI();
                } else {
                    currTurn = currTurn === 'X' ? 'O' : 'X';
                    updateAll();
                    if(gameMode === 'pvc' && currTurn === 'O') setTimeout(triggerQuiz, 600);
                }
            }, 1100);
        }

        function runAI() {
            const opts = nextSub === -1 ? 
                subWins.map((w,i) => w==="" && !fullGrid[i].every(c=>c!=="") ? i : null).filter(v=>v!==null) : [nextSub];
            const chosenSub = opts[Math.floor(Math.random()*opts.length)];
            const empties = fullGrid[chosenSub].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            const chosenCell = empties[Math.floor(Math.random()*empties.length)];
            doMove(chosenSub, chosenCell);
        }

        function checkSubWin(data, p) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(l => l.every(i => data[i] === p));
        }

        function updateAll() {
            const lab = document.getElementById('turnLabel');
            lab.textContent = `תור ${currTurn}`;
            lab.style.color = currTurn === 'X' ? 'var(--x-color)' : 'var(--o-color)';

            const qb = document.getElementById('quizButton');
            qb.textContent = moveReady ? '!' : '?';
            qb.className = `q-button ${currTurn === 'X' ? 'x-player' : 'o-player'}`;

            for(let i=0; i<9; i++) {
                const sub = document.getElementById(`subGrid-${i}`);
                sub.classList.remove('active-sub');
                if(moveReady && (nextSub === -1 || nextSub === i) && !subWins[i]) {
                    sub.classList.add('active-sub');
                }
                if(subWins[i] && !sub.querySelector('.sub-win-mark')) {
                    const mark = document.createElement('div');
                    mark.className = 'sub-win-mark ' + (subWins[i] === 'X' ? 'x-player' : 'o-player');
                    mark.textContent = subWins[i] === 'X' ? '✕' : '◯';
                    sub.appendChild(mark);
                }
            }
        }

        function celebrate(w) {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            document.getElementById('finalMark').textContent = w === 'X' ? '✕' : '◯';
            document.getElementById('finalMark').className = w === 'X' ? 'x-player' : 'o-player';
            document.getElementById('finalMsg').textContent = `שחקן ${w} ניצח!`;
            document.getElementById('win-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
