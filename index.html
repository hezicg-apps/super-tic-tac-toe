<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Tic Tac Toe - V1.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.startOnline = async () => {
            if (window.vocabulary.length < 3) return alert("הכנס לפחות 3 מילים!");
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            window.gameId = id; window.myRole = "X"; window.gameMode = "online";
            await setDoc(doc(db, 'games', id), {
                board: Array(9).fill(""), currentPlayer: "X", status: "waiting", vocabulary: window.vocabulary, history: {X:[], O:[]}
            });
            const link = `https://hezicg-apps.github.io/super-tic-tac-toe/?game=${id}`;
            window.open(`https://wa.me/?text=בואו לשחק איתי! לחצו על הקישור:%0A${link}`, '_blank');
            document.getElementById('lobbyButtons').style.display = 'none';
            document.getElementById('onlineWaiting').style.display = 'block';
            document.getElementById('displayCode').textContent = id;
            listenToGame();
        };

        window.joinGame = async (id) => {
            if (!id) return;
            document.getElementById('lobbyModal').style.display = 'none';
            document.getElementById('loadingModal').style.display = 'flex';
            const snap = await getDoc(doc(db, 'games', id));
            if (snap.exists()) {
                window.gameId = id; window.myRole = "O"; window.gameMode = "online";
                window.vocabulary = snap.data().vocabulary;
                await updateDoc(doc(db, 'games', id), { status: "playing" });
                listenToGame();
                document.getElementById('loadingModal').style.display = 'none';
                document.getElementById('gameContainer').style.display = 'flex';
            } else {
                alert("קוד לא נמצא"); location.reload();
            }
        };

        function listenToGame() {
            onSnapshot(doc(db, 'games', window.gameId), (snap) => {
                const data = snap.data();
                if (data && (data.status === "playing" || data.status === "ready_to_move")) {
                    document.getElementById('lobbyModal').style.display = 'none';
                    document.getElementById('gameContainer').style.display = 'flex';
                    window.state = data;
                    updateUI();
                    if (data.status === "playing" && data.currentPlayer === window.myRole) showQuiz();
                }
            });
        }

        window.onload = async () => {
            await signInAnonymously(auth);
            const params = new URLSearchParams(window.location.search);
            if (params.get('game')) window.joinGame(params.get('game'));
        };
    </script>

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { 
            background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed;
        }
        
        .main-app { height: 100vh; display: flex; flex-direction: column; width: 100%; }
        
        .title-super { color: #fff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; font-size: 3.2rem; font-weight: 900; font-style: italic; line-height: 0.8; }
        .title-ttt { color: #fff; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; font-size: 2.8rem; font-weight: 900; font-style: italic; }
        .version-tag { color: #444; font-size: 0.75rem; font-weight: bold; margin-top: 4px; }

        .btn-lobby { width: 85vw; max-width: 320px; height: 50px; border: 2px solid #facc15; border-radius: 18px; color: #facc15; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; background: none; }
        .btn-fill { background: #facc15; color: #000; }
        .input-lobby { width: 85vw; max-width: 320px; height: 50px; background: transparent; border: 2px solid #facc15; border-radius: 18px; text-align: center; color: #fff; margin-bottom: 8px; outline: none; }
        
        .btn-help { position: absolute; top: 15px; left: 15px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00f2ff; color: #00f2ff; font-size: 1.2rem; font-weight: bold; z-index: 100; display: flex; align-items: center; justify-content: center; }

        .game-header { height: 15vh; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        .game-body { height: 75vh; display: flex; align-items: center; justify-content: center; }
        
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            width: 85vw; height: 85vw; max-width: 380px; max-height: 380px;
        }
        
        .cell { display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; }
        .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8) { border-left: 5px solid #fff; border-right: 5px solid #fff; }
        .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-top: 5px solid #fff; border-bottom: 5px solid #fff; }
        
        .x-ui { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .o-ui { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        .fading { opacity: 0.25; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.1; } }

        .modal-full { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        
        /* תיקון: כשמודלים סגורים הם לא חוסמים קליקים */
        .hidden-modals { display: none !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <div class="main-app">
        <div id="lobbyModal" class="modal-full p-4">
            <button class="btn-help" onclick="alert('חוקים:\n1. עונים על שאלה.\n2. מסמנים בלוח.\n3. מותר רק 3 סימנים - הרביעי מוחק את הראשון.')">?</button>
            <div class="mb-6 text-center">
                <div class="title-super">SUPER</div>
                <div class="title-ttt">TIC TAC TOE</div>
                <div class="version-tag">VERSION 1.3</div>
            </div>
            <div id="lobbyButtons" class="flex flex-col items-center">
                <button onclick="document.getElementById('vocabModal').style.display='flex'" class="btn-lobby italic">לחצו להוספת מילים</button>
                <button onclick="startGame('ai')" class="btn-lobby btn-fill">משחק נגד AI</button>
                <button onclick="startGame('friend')" class="btn-lobby btn-fill">משחק 1:1</button>
                <div class="h-4"></div>
                <button onclick="startOnline()" class="btn-lobby bg-green-600 border-none text-white">משחק אונליין (שלח לינק)</button>
                <input type="text" id="joinInput" placeholder="קוד הצטרפות" class="input-lobby">
                <button onclick="joinGame(document.getElementById('joinInput').value)" class="btn-lobby">הצטרף</button>
            </div>
            <div id="onlineWaiting" style="display:none;" class="text-center">
                <div id="displayCode" class="text-6xl font-bold mb-4 text-yellow-500"></div>
                <p class="animate-pulse text-zinc-400">מחכה לחבר/ה שייכנסו מהלינק...</p>
            </div>
        </div>

        <div id="gameContainer" style="display:none;" class="flex flex-col h-full w-full">
            <div class="game-header" id="turnBar">
                <span id="turnIcon" class="ml-3 text-5xl">✕</span>
                <span class="text-3xl font-bold">תור השחקן</span>
            </div>
            <div class="game-body">
                <div class="board">
                    <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
                    <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
                    <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vocabModal" style="display:none;" class="modal-full bg-black/95 z-[2000] p-6">
        <div class="bg-zinc-900 p-6 rounded-3xl w-full max-w-sm border-2 border-[#facc15]">
            <h2 class="text-white font-bold mb-4 italic">English - עברית</h2>
            <textarea id="vocabInput" placeholder="apple - תפוח" class="w-full h-48 bg-black text-white p-3 mb-4 rounded-xl border border-zinc-700 text-right"></textarea>
            <button onclick="saveVocab()" class="btn-lobby btn-fill w-full">שמור מילים</button>
        </div>
    </div>

    <div id="quizModal" class="quiz-overlay">
        <h2 id="qText" class="text-6xl font-black mb-12 italic text-center px-4"></h2>
        <div id="optionsContainer" class="flex flex-col items-center w-full px-6"></div>
    </div>

    <div id="loadingModal" style="display:none;" class="modal-full z-[3000]">
        <p class="text-2xl animate-bounce">טוען משחק...</p>
    </div>

    <script>
        window.vocabulary = [];
        window.state = { board: Array(9).fill(""), currentPlayer: "X", history: {X:[], O:[]}, status: "lobby" };
        window.gameMode = "ai";

        function startGame(mode) {
            if (vocabulary.length < 3) return alert("הכנס לפחות 3 מילים!");
            gameMode = mode;
            document.getElementById('lobbyModal').classList.add('hidden-modals');
            document.getElementById('gameContainer').style.display = 'flex';
            window.state.status = "playing";
            updateUI(); showQuiz();
        }

        function saveVocab() {
            const input = document.getElementById('vocabInput').value;
            window.vocabulary = input.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i);
            document.getElementById('vocabModal').style.display = 'none';
        }

        function showQuiz() {
            const item = vocabulary[Math.floor(Math.random()*vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            document.getElementById('qText').textContent = item.en;
            document.getElementById('qText').style.color = window.state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-lobby w-full bg-zinc-900 border-zinc-700 text-white mb-4';
                btn.textContent = o;
                btn.onclick = () => {
                    if(o === item.he) {
                        document.getElementById('quizModal').style.display = 'none';
                        window.state.status = "ready_to_move";
                    } else {
                        alert("טעות!"); switchTurn();
                    }
                };
                container.appendChild(btn);
            });
            document.getElementById('quizModal').style.display = 'flex';
        }

        function switchTurn() {
            window.state.currentPlayer = window.state.currentPlayer === "X" ? "O" : "X";
            window.state.status = "playing";
            updateUI();
            if(gameMode === "ai" && window.state.currentPlayer === "O") setTimeout(aiMove, 800);
            else setTimeout(showQuiz, 400);
        }

        function updateUI() {
            const isX = window.state.currentPlayer === 'X';
            const bar = document.getElementById('turnBar');
            bar.style.color = isX ? "#00f2ff" : "#bc13fe";
            bar.style.borderColor = isX ? "#00f2ff" : "#bc13fe";
            document.getElementById('turnIcon').textContent = isX ? "✕" : "◯";
            
            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = window.state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                let fade = (val && window.state.history[val].length === 3 && window.state.history[val][0] === i) ? "fading" : "";
                cell.className = `cell ${val === 'X' ? 'x-ui' : (val === 'O' ? 'o-ui' : '')} ${fade}`;
            });
        }

        function cellClick(i) {
            if (window.state.status !== "ready_to_move" || window.state.board[i] !== "") return;
            window.state.board[i] = window.state.currentPlayer;
            window.state.history[window.state.currentPlayer].push(i);
            if(window.state.history[window.state.currentPlayer].length > 3) {
                window.state.board[window.state.history[window.state.currentPlayer].shift()] = "";
            }
            if(checkWin()) {
                confetti();
                setTimeout(() => { alert("ניצחון ל-" + window.state.currentPlayer); location.reload(); }, 500);
                return;
            }
            switchTurn();
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => window.state.board[p[0]] && window.state.board[p[0]] === window.state.board[p[1]] && window.state.board[p[0]] === window.state.board[p[2]]);
        }

        function aiMove() {
            const empty = window.state.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if(empty.length > 0) {
                const move = empty[Math.floor(Math.random() * empty.length)];
                window.state.status = "ready_to_move";
                cellClick(move);
            }
        }
    </script>
</body>
</html>
