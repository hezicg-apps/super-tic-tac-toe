<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2;
            --o-color: #d32f2f;
            --yellow: #facc15;
            --grid-border: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body, html { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ניווט בין מסכים */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
        }

        .screen.active { display: flex; }

        /* מסך פתיחה */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .super-text { font-size: 4rem; font-weight: 900; color: var(--yellow); margin: 0; line-height: 1; }
        .ttt-text { font-size: 2.2rem; font-weight: 900; margin-top: 5px; text-shadow: 2px 2px 0px #000; }

        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .btn-main { 
            width: 280px; height: 60px; border-radius: 40px; font-weight: 900; 
            border: 4px solid #000; background: #fff; color: #000; 
            font-size: 1.4rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 0 #000; cursor: pointer; transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* לוח המשחק */
        .header-controls { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 90vw; max-width: 400px; margin-top: 10px;
        }
        #statusContainer { 
            background: #fff; height: 50px; border-radius: 50px; 
            border: 3px solid #000; flex: 1; margin: 0 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 #000;
        }
        #statusText { font-size: 1.6rem; font-weight: 900; color: #000; }

        .super-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #000; border: 6px solid #000; border-radius: 12px;
            width: 92vw; max-width: 380px; aspect-ratio: 1/1; gap: 5px; margin: 15px auto;
        }
        
        .mini-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            background: #ccc; gap: 1px; height: 100%; width: 100%; position: relative;
        }

        /* סימון צהוב פשוט ללא הצללה זוהרת */
        .active-mini { 
            outline: 5px solid var(--yellow);
            outline-offset: -3px;
            z-index: 10;
        }

        .cell { 
            background: #fff; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; font-weight: 900; height: 100%; width: 100%;
        }

        .x-color { color: var(--x-color); }
        .o-color { color: var(--o-color); }

        /* שכבת ניצחון */
        .mini-win-overlay { 
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            font-size: 5rem; font-weight: 900; background: rgba(255, 255, 255, 0.85); z-index: 20;
        }

        /* כפתור שאלה - ללא הצללה בכלל */
        .q-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: #fff; 
            border: 6px solid #000; font-size: 3.5rem; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: none !important;
        }

        /* מודאל */
        .modal { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 9000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        
        #qWord { font-size: 3.5rem; font-weight: 900; text-shadow: 2px 2px 0 #000; margin-bottom: 20px; }

        .footer-text { font-size: 0.8rem; margin-top: auto; padding: 15px; opacity: 0.7; text-align: center; }
        .version-tag { font-weight: 900; margin: 20px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

    <!-- מסך פתיחה -->
    <div id="screen-lobby" class="screen active">
        <div class="logo-container">
            <h1 class="super-text">SUPER</h1>
            <div class="ttt-text">TIC TAC TOE</div>
        </div>
        <div class="btn-container">
            <button onclick="showModal('modal-vocab')" class="btn-main" style="background: var(--yellow);">הוספת מילים</button>
            <button onclick="handleStartGame('pvp')" class="btn-main" style="color: var(--x-color);">שחקן נגד שחקן</button>
            <button onclick="handleStartGame('pvc')" class="btn-main" style="color: var(--o-color);">שחקן נגד מחשב</button>
        </div>
        <div class="version-tag">v1.2</div>
        <div class="footer-text">פותח ע"י חזי כהן גלמן 2026 ©</div>
    </div>

    <!-- מסך משחק -->
    <div id="screen-game" class="screen">
        <div class="header-controls">
            <button onclick="location.reload()" style="background:none; border:none; font-size:2rem; color:#fff;">➔</button>
            <div id="statusContainer"><div id="statusText">תור X</div></div>
            <button onclick="showModal('modal-video')" style="background:none; border:none; font-size:2rem; color:#fff;">ⓘ</button>
        </div>
        
        <div id="mainGrid" class="super-grid"></div>
        
        <div id="qButton" onclick="openQuiz()" class="q-btn x-color">?</div>
        
        <div class="version-tag" style="margin-top:auto;">v1.2</div>
    </div>

    <!-- מודאל שאלה -->
    <div id="modal-quiz" class="modal">
        <div style="display:flex; align-items:center; gap:15px;">
            <button onclick="speakWord()" style="background:#fff; border:4px solid #000; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center;">
                <svg viewBox="0 0 24 24" width="30"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <h2 id="qWord"></h2>
        </div>
        <div id="qOptions" style="display:flex; flex-direction:column; gap:12px; width:100%; align-items:center;"></div>
    </div>

    <!-- מודאל אוצר מילים -->
    <div id="modal-vocab" class="modal">
        <h2 style="margin-bottom:15px;">עריכת מילים</h2>
        <textarea id="vocabInput" style="width:85%; height:50vh; border-radius:15px; padding:15px; border:4px solid #000; font-size:1.1rem; text-align:right;"></textarea>
        <button onclick="saveVocab()" class="btn-main" style="margin-top:20px; background:var(--yellow);">שמור</button>
    </div>

    <!-- מודאל וידאו -->
    <div id="modal-video" class="modal">
        <h2 style="margin-bottom:15px;">איך משחקים?</h2>
        <iframe id="videoFrame" style="width:90%; aspect-ratio:9/16; border:4px solid #000; border-radius:15px;" src="" allowfullscreen></iframe>
        <button onclick="hideModal('modal-video')" class="btn-main" style="margin-top:20px;">סגור</button>
    </div>

    <!-- מודאל ניצחון -->
    <div id="modal-win" class="modal" style="background:rgba(0,0,0,0.9);">
        <div style="background:#fff; padding:30px; border-radius:30px; border:8px solid var(--yellow); text-align:center; color:#000;">
            <h2 style="font-size:2.5rem; margin:0;">ניצחון!</h2>
            <div id="winnerIcon" style="font-size:5rem; font-weight:900;">✕</div>
            <p id="winnerMsg" style="font-size:1.3rem; font-weight:900;"></p>
            <button onclick="location.reload()" class="btn-main" style="width:100%; background:var(--yellow);">משחק חדש</button>
        </div>
    </div>

    <script>
        let vocab = [], turn = "X", activeBoard = -1, canMove = false, gameMode = 'pvp';
        let superData = Array(9).fill(null).map(() => Array(9).fill(""));
        let miniWinners = Array(9).fill("");
        let currentWord = null;

        window.onload = () => {
            const saved = localStorage.getItem('sttt_vocab_v12');
            document.getElementById('vocabInput').value = saved || "apple - תפוח\nbanana - בננה\nred - אדום\nblue - כחול\ndog - כלב\ncat - חתול\nsun - שמש\nwater - מים";
        };

        function showModal(id) {
            if(id === 'modal-video') document.getElementById('videoFrame').src = "https://www.youtube.com/embed/xLcUtltJk2c?autoplay=1";
            document.getElementById(id).style.display = 'flex';
        }

        function hideModal(id) {
            if(id === 'modal-video') document.getElementById('videoFrame').src = "";
            document.getElementById(id).style.display = 'none';
        }

        function saveVocab() {
            localStorage.setItem('sttt_vocab_v12', document.getElementById('vocabInput').value);
            hideModal('modal-vocab');
        }

        function handleStartGame(mode) {
            const raw = document.getElementById('vocabInput').value;
            vocab = raw.split('\n').map(line => {
                const parts = line.split(/[-–:]/);
                return parts.length >= 2 ? { en: parts[0].trim(), he: parts[1].trim() } : null;
            }).filter(v => v);

            if(vocab.length < 4) return alert("הזן לפחות 4 מילים");
            
            gameMode = mode;
            // אתחול הקראה
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            
            document.getElementById('screen-lobby').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            initBoard();
            updateUI();
        }

        function initBoard() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            for(let i=0; i<9; i++) {
                const mini = document.createElement('div');
                mini.id = `board-${i}`;
                mini.className = 'mini-grid';
                for(let j=0; j<9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => onCellClick(i, j);
                    mini.appendChild(cell);
                }
                grid.appendChild(mini);
            }
        }

        function onCellClick(bIdx, cIdx) {
            if(!canMove || miniWinners[bIdx] || superData[bIdx][cIdx]) return;
            if(activeBoard !== -1 && activeBoard !== bIdx) return;

            superData[bIdx][cIdx] = turn;
            const cell = document.getElementById(`board-${bIdx}`).children[cIdx];
            cell.textContent = turn === 'X' ? '✕' : '◯';
            cell.classList.add(turn === 'X' ? 'x-color' : 'o-color');

            if(checkWin(superData[bIdx], turn)) {
                miniWinners[bIdx] = turn;
            }

            const isFull = superData[cIdx].every(v => v !== "");
            activeBoard = (miniWinners[cIdx] || isFull) ? -1 : cIdx;

            if(checkWin(miniWinners, turn)) {
                endGame(turn);
                return;
            }

            turn = turn === 'X' ? 'O' : 'X';
            canMove = false;
            updateUI();

            if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
        }

        function speakWord() {
            if(!currentWord) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(currentWord.en);
            u.lang = 'en-US';
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function openQuiz() {
            currentWord = vocab[Math.floor(Math.random() * vocab.length)];
            const options = [currentWord.he];
            while(options.length < 4) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);

            const qWord = document.getElementById('qWord');
            qWord.textContent = currentWord.en;
            qWord.className = turn === 'X' ? 'x-color' : 'o-color';

            const container = document.getElementById('qOptions');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-main';
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(opt === currentWord.he, btn);
                container.appendChild(btn);
            });

            showModal('modal-quiz');
            setTimeout(speakWord, 300);
        }

        function handleAnswer(correct, btn) {
            const btns = document.querySelectorAll('#qOptions .btn-main');
            btns.forEach(b => {
                b.disabled = true;
                if(b.textContent === currentWord.he) b.style.background = "#4caf50";
            });

            if(!correct) btn.style.background = "#f44336";

            setTimeout(() => {
                hideModal('modal-quiz');
                if(correct) {
                    canMove = true;
                    updateUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(aiMove, 500);
                } else {
                    turn = turn === 'X' ? 'O' : 'X';
                    updateUI();
                    if(gameMode === 'pvc' && turn === 'O') setTimeout(openQuiz, 600);
                }
            }, 1200);
        }

        function aiMove() {
            const boards = activeBoard === -1 ? 
                miniWinners.map((w,i) => w==="" && !superData[i].every(c=>c!=="") ? i : null).filter(v=>v!==null) : [activeBoard];
            const b = boards[Math.floor(Math.random()*boards.length)];
            const cells = superData[b].map((v,i)=>v===""?i:null).filter(v=>v!==null);
            const c = cells[Math.floor(Math.random()*cells.length)];
            onCellClick(b, c);
        }

        function checkWin(arr, p) {
            const combos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return combos.some(s => s.every(i => arr[i] === p));
        }

        function updateUI() {
            const statusText = document.getElementById('statusText');
            statusText.textContent = `תור ${turn}`;
            statusText.style.color = turn === 'X' ? 'var(--x-color)' : 'var(--o-color)';

            const qBtn = document.getElementById('qButton');
            qBtn.textContent = canMove ? '!' : '?';
            qBtn.className = `q-btn ${turn === 'X' ? 'x-color' : 'o-color'}`;

            for(let i=0; i<9; i++) {
                const board = document.getElementById(`board-${i}`);
                board.classList.remove('active-mini');
                if(canMove && (activeBoard === -1 || activeBoard === i) && !miniWinners[i]) {
                    board.classList.add('active-mini');
                }

                if(miniWinners[i]) {
                    if(!board.querySelector('.mini-win-overlay')) {
                        const over = document.createElement('div');
                        over.className = 'mini-win-overlay ' + (miniWinners[i] === 'X' ? 'x-color' : 'o-color');
                        over.textContent = miniWinners[i] === 'X' ? '✕' : '◯';
                        board.appendChild(over);
                    }
                }
            }
        }

        function endGame(winner) {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            document.getElementById('winnerIcon').textContent = winner === 'X' ? '✕' : '◯';
            document.getElementById('winnerIcon').className = winner === 'X' ? 'x-color' : 'o-color';
            document.getElementById('winnerMsg').textContent = `שחקן ${winner} ניצח את כל הלוח!`;
            showModal('modal-win');
        }
    </script>
</body>
</html>
