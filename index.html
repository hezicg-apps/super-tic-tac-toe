<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #1a7b4e;
            --x-color: #1976d2; 
            --o-color: #d32f2f; 
            --yellow: #facc15;
        }
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Varela Round', sans-serif; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }
        .modal-overlay { 
            position: fixed; inset: 0; background: var(--bg-color); z-index: 1000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-overlay.active { display: flex; }
        
        .board-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 90vw; max-width: 360px; aspect-ratio: 1;
            margin: 20px auto;
        }
        .cell {
            background: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; color: #000; box-shadow: 0 4px 0 #000;
            cursor: pointer; transition: 0.1s;
        }
        .cell:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .cell.x-mark { color: var(--x-color); }
        .cell.o-mark { color: var(--o-color); }
        
        .main-btn {
            background: #fff; color: #000; border: 4px solid #000; border-radius: 40px;
            padding: 12px 25px; font-weight: 900; font-size: 1.2rem; width: 260px;
            box-shadow: 0 5px 0 #000; transition: 0.1s; text-align: center;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        
        .sets-scroll { display: flex; gap: 8px; overflow-x: auto; width: 100%; padding: 10px 0; }
        textarea { background: #fff; color: #000; border: 3px solid #000; width: 100%; height: 180px; border-radius: 15px; padding: 10px; font-family: sans-serif; }
    </style>
</head>
<body>

    <!-- מסך בית -->
    <div id="home-page" class="flex flex-col items-center justify-center h-full space-y-6">
        <div class="text-center">
            <h1 class="text-7xl font-black text-yellow-400 leading-none">SUPER</h1>
            <h2 class="text-3xl font-black">TIC TAC TOE</h2>
        </div>

        <div class="flex flex-col gap-4">
            <button onclick="openModal('vocab-modal')" class="main-btn !bg-yellow-400">ניהול פרקים ומילים</button>
            <button onclick="startGame('ai')" class="main-btn">נגד המחשב</button>
            <button onclick="startGame('friend')" class="main-btn">שני שחקנים</button>
        </div>

        <div class="text-xs opacity-60 fixed bottom-4">v2.0 | פותח ע"י חזי כהן גלמן</div>
    </div>

    <!-- מסך משחק -->
    <div id="game-page" class="hidden flex-col items-center justify-center h-full">
        <div class="flex justify-between items-center w-full px-6 max-w-md mb-4">
            <button onclick="location.reload()" class="text-3xl font-bold">➔</button>
            <div id="turnIndicator" class="bg-white text-black px-6 py-2 rounded-full border-4 border-black font-black text-xl shadow-[0_4px_0_#000]">תור X</div>
            <button onclick="alert('חוקי המשחק: ענה על שאלה כדי לסמן תא. 3 בטור/שורה/אלכסון מנצחים. כל שחקן יכול להחזיק רק 3 סימנים - הישן ביותר נמחק.')" class="text-2xl">ⓘ</button>
        </div>

        <div id="board" class="board-grid">
            <div class="cell" onclick="handleCellClick(0)"></div>
            <div class="cell" onclick="handleCellClick(1)"></div>
            <div class="cell" onclick="handleCellClick(2)"></div>
            <div class="cell" onclick="handleCellClick(3)"></div>
            <div class="cell" onclick="handleCellClick(4)"></div>
            <div class="cell" onclick="handleCellClick(5)"></div>
            <div class="cell" onclick="handleCellClick(6)"></div>
            <div class="cell" onclick="handleCellClick(7)"></div>
            <div class="cell" onclick="handleCellClick(8)"></div>
        </div>
    </div>

    <!-- מודאל אוצר מילים -->
    <div id="vocab-modal" class="modal-overlay">
        <div class="bg-white p-6 rounded-3xl border-8 border-black text-black w-full max-w-sm">
            <h2 class="text-2xl font-black mb-4">ניהול מילים</h2>
            <div id="setsContainer" class="sets-scroll mb-2"></div>
            <textarea id="vocabInput" placeholder="Apple - תפוח"></textarea>
            <div class="flex flex-wrap gap-2 mt-3">
                <button onclick="saveSet()" class="text-xs underline font-bold">שמור כפרק</button>
                <button onclick="exportData()" class="text-xs underline font-bold">ייצוא</button>
                <button onclick="importData()" class="text-xs underline font-bold">ייבוא</button>
            </div>
            <button onclick="closeModal('vocab-modal')" class="main-btn !w-full mt-6 !bg-yellow-400">אישור וסגירה</button>
        </div>
    </div>

    <!-- מודאל שאלה -->
    <div id="quiz-modal" class="modal-overlay">
        <div class="text-center mb-8">
            <button onclick="speakWord()" class="mb-4 text-white">
                <svg viewBox="0 0 24 24" width="80" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
            <h2 id="questionText" class="text-6xl font-black"></h2>
        </div>
        <div id="optionsContainer" class="flex flex-col gap-3 w-full max-w-xs"></div>
    </div>

    <script>
        let vocab = [], sets = JSON.parse(localStorage.getItem('sttt_sets')) || {};
        let gameMode = 'ai', currentTurn = 'X', canMove = false;
        let boardState = Array(9).fill(""), history = { X: [], O: [] };
        let currentItem = null;

        window.onload = () => {
            const defaultVocab = "Apple - תפוח\nBanana - בננה\nCat - חתול\nDog - כלב\nSun - שמש\nWater - מים";
            if(!localStorage.getItem('sttt_last_vocab')) localStorage.setItem('sttt_last_vocab', defaultVocab);
            document.getElementById('vocabInput').value = localStorage.getItem('sttt_last_vocab');
            renderSets();
        };

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function renderSets() {
            const container = document.getElementById('setsContainer');
            container.innerHTML = Object.keys(sets).map(name => `
                <div class="flex items-center bg-gray-200 rounded-full px-3 py-1 gap-2 whitespace-nowrap">
                    <button onclick="loadSet('${name}')" class="text-xs font-bold">${name}</button>
                    <button onclick="deleteSet('${name}')" class="text-red-500 font-bold">×</button>
                </div>
            `).join('');
        }

        function saveSet() {
            const name = prompt("שם הפרק:");
            if(name) { sets[name] = document.getElementById('vocabInput').value; localStorage.setItem('sttt_sets', JSON.stringify(sets)); renderSets(); }
        }
        function loadSet(name) { document.getElementById('vocabInput').value = sets[name]; }
        function deleteSet(name) { if(confirm('למחוק?')) { delete sets[name]; localStorage.setItem('sttt_sets', JSON.stringify(sets)); renderSets(); } }
        
        function exportData() { navigator.clipboard.writeText(JSON.stringify(sets)); alert("הנתונים הועתקו ללוח"); }
        function importData() { try { sets = JSON.parse(prompt("הדבק קוד ייבוא:")); localStorage.setItem('sttt_sets', JSON.stringify(sets)); renderSets(); } catch(e){alert("קוד לא תקין");} }

        function startGame(mode) {
            const text = document.getElementById('vocabInput').value;
            localStorage.setItem('sttt_last_vocab', text);
            vocab = text.split('\n').map(l => {
                const p = l.split(/[-:]/);
                return p.length >= 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i);

            if(vocab.length < 4) return alert("צריך לפחות 4 מילים");

            gameMode = mode;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'flex';
            triggerQuiz();
        }

        function triggerQuiz() {
            currentItem = vocab[Math.floor(Math.random() * vocab.length)];
            const opts = [currentItem.he];
            while(opts.length < 4) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            document.getElementById('questionText').textContent = currentItem.en;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "main-btn !w-full";
                b.textContent = o;
                b.onclick = () => checkAnswer(o === currentItem.he);
                container.appendChild(b);
            });
            openModal('quiz-modal');
            setTimeout(speakWord, 300);
        }

        function speakWord() {
            const u = new SpeechSynthesisUtterance(currentItem.en);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        function checkAnswer(correct) {
            closeModal('quiz-modal');
            if(correct) {
                canMove = true;
                if(gameMode === 'ai' && currentTurn === 'O') setTimeout(aiLogic, 600);
            } else {
                alert("טעות! התור עובר");
                currentTurn = currentTurn === 'X' ? 'O' : 'X';
                updateUI();
                setTimeout(triggerQuiz, 600);
            }
        }

        function handleCellClick(idx) {
            if(!canMove || boardState[idx] !== "") return;
            if(gameMode === 'ai' && currentTurn === 'O') return;

            executeMove(idx);
        }

        function executeMove(idx) {
            boardState[idx] = currentTurn;
            history[currentTurn].push(idx);

            if(history[currentTurn].length > 3) {
                const old = history[currentTurn].shift();
                boardState[old] = "";
            }

            updateUI();

            if(checkWin(currentTurn)) {
                confetti();
                setTimeout(() => { alert(`שחקן ${currentTurn} ניצח!`); location.reload(); }, 500);
                return;
            }

            currentTurn = currentTurn === 'X' ? 'O' : 'X';
            canMove = false;
            setTimeout(triggerQuiz, 600);
        }

        function aiLogic() {
            const empties = boardState.map((v,i) => v===""?i:null).filter(v=>v!==null);
            if(empties.length) executeMove(empties[Math.floor(Math.random()*empties.length)]);
        }

        function checkWin(p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(l => l.every(i => boardState[i] === p));
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, i) => {
                c.textContent = boardState[i] === 'X' ? '✕' : (boardState[i] === 'O' ? '◯' : '');
                c.className = `cell ${boardState[i]==='X'?'x-mark':(boardState[i]==='O'?'o-mark':'')}`;
                // עמעום הכלי שעומד להימחק
                if(history[boardState[i]]?.length === 3 && history[boardState[i]][0] === i) {
                    c.style.opacity = "0.3";
                } else {
                    c.style.opacity = "1";
                }
            });
            const indicator = document.getElementById('turnIndicator');
            indicator.textContent = `תור ${currentTurn}`;
            indicator.style.color = currentTurn === 'X' ? 'var(--x-color)' : 'var(--o-color)';
        }
    </script>
</body>
</html>
