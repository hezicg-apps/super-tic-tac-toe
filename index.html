<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER TIC TAC TOE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Varela Round', sans-serif; background-color: #2d845c; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* כפתורי אפליקציה */
        .app-btn {
            background-color: white; color: #111; border: 4px solid #111; border-radius: 9999px;
            padding: 0.8rem 2rem; font-weight: 800; font-size: 1.2rem; width: 100%; max-width: 300px;
            box-shadow: 0 6px 0 0 #111; transition: all 0.1s; cursor: pointer; display: block; margin: 0 auto;
            text-align: center;
        }
        .app-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 0 #111; }
        .btn-yellow { background-color: #fbbf24; }
        .btn-inverse-yellow { background-color: #111; color: #fbbf24; border-color: #fbbf24; }

        .game-header {
            background-color: white; border: 4px solid #111; border-radius: 9999px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.5rem 1.5rem; width: 90%; max-width: 500px; margin: 1rem auto;
            color: #111; font-weight: 800;
        }

        /* עיצוב הלוח - מרכוז וביטול עיגול פינות */
        #board-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%;
        }
        #board-wrapper {
            width: 92vmin; height: 92vmin; max-width: 480px; max-height: 480px;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 4px; padding: 4px; background: #000; /* רשת שחורה */
        }
        .sub-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 2px; background-color: #000; position: relative;
        }
        .cell {
            background-color: white; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.4rem; cursor: default;
        }
        .cell.can-move { cursor: pointer; background-color: #fff9c4; }
        .active-board { outline: 6px solid #fbbf24; outline-offset: -3px; z-index: 5; }

        .won-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; z-index: 10; font-weight: 900;
        }

        dialog { border: 6px solid #111; border-radius: 2.5rem; padding: 0; overflow: hidden; max-width: 90vw; width: 400px; }
        dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .dialog-content { padding: 1.5rem; }

        .status-circle {
            width: 70px; height: 70px; border-radius: 50%; border: 5px solid #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; cursor: pointer; background: white; margin-bottom: 1.5rem;
        }

        .player-x { color: #2563eb; }
        .player-o { color: #dc2626; }
        
        .answer-correct { background-color: #22c55e !important; color: white !important; }
        .answer-wrong { background-color: #ef4444 !important; color: white !important; }

        .speaker-btn { font-size: 2rem; cursor: pointer; background: none; border: none; padding: 0; }
        .word-ltr { direction: ltr; display: inline-block; }
    </style>
</head>
<body>

    <div id="lobby" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 bg-app-green" style="background-color: #2d845c;">
        <div class="mb-10 text-center">
            <h1 class="text-7xl font-black text-[#fbbf24] drop-shadow-md">SUPER</h1>
            <h2 class="text-4xl font-bold text-white tracking-widest">TIC TAC TOE</h2>
        </div>
        <div class="space-y-4 w-full">
            <button onclick="openModal('help-modal')" class="app-btn btn-inverse-yellow">איך משחקים?</button>
            <button onclick="openModal('vocab-modal')" class="app-btn btn-yellow">הוספת מילים</button>
            <button onclick="startGame('pvp')" class="app-btn">שחקן נגד שחקן</button>
            <button onclick="startGame('pvc')" class="app-btn">שחקן נגד מחשב</button>
        </div>
    </div>

    <div id="game-screen" class="hidden w-full h-full flex flex-col items-center">
        <div class="game-header">
            <button onclick="location.reload()" title="בית">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </button>
            <div id="turn-text" class="text-xl">תור: X</div>
            <button onclick="openModal('help-modal')" class="w-8 h-8 rounded-full border-2 border-black flex items-center justify-center font-bold italic">i</button>
        </div>

        <div id="board-container">
            <div id="board-wrapper"></div>
        </div>

        <div id="action-btn" onclick="handleActionClick()" class="status-circle">?</div>
    </div>

    <dialog id="quiz-modal">
        <div class="dialog-content text-center">
            <p class="text-gray-500 font-bold mb-4 text-xl">כיצד אומרים בעברית:</p>
            <div class="flex items-center justify-center gap-4 mb-8" dir="ltr">
                <button onclick="speakWord()" class="speaker-btn">🔊</button>
                <h3 id="quiz-word" class="text-5xl font-black word-ltr">WORD</h3>
            </div>
            <div id="quiz-options" class="space-y-3"></div>
        </div>
    </dialog>

    <dialog id="help-modal">
        <div class="dialog-content text-center">
            <h2 class="text-2xl font-bold mb-4">איך משחקים?</h2>
            <div class="text-right text-lg space-y-3 mb-6 px-2">
                <p>1️⃣ לחצו על כפתור <b>השאלה (?)</b> למטה.</p>
                <p>2️⃣ ענו נכון כדי לקבל את <b>סימן הקריאה (!)</b>.</p>
                <p>3️⃣ כעת תוכלו לסמן בלוח המודגש בצהוב.</p>
                <p>4️⃣ המיקום שתבחרו בתוך הלוח הקטן, יקבע באיזה לוח היריב ישחק!</p>
            </div>
            <button onclick="closeModal('help-modal')" class="app-btn btn-yellow !py-3">הבנתי!</button>
        </div>
    </dialog>

    <dialog id="end-game-modal">
        <div class="dialog-content text-center">
            <h2 id="end-game-title" class="text-4xl font-black mb-8">ניצחון!</h2>
            <div class="flex flex-col gap-4">
                <button onclick="resetGame()" class="app-btn btn-yellow">משחק חוזר</button>
                <button onclick="location.reload()" class="app-btn">חזרה לבית</button>
            </div>
        </div>
    </dialog>

    <dialog id="vocab-modal">
        <div class="dialog-content">
            <h2 class="text-xl font-bold mb-2">הוספת מילים (זוג בשורה: מילה-תרגום)</h2>
            <textarea id="vocab-input" class="w-full h-48 border-4 border-black rounded-2xl p-3 mb-4 font-bold" dir="ltr"></textarea>
            <button onclick="saveVocab()" class="app-btn btn-yellow !py-2">שמור וחזור</button>
        </div>
    </dialog>

    <script>
        let vocab = [{word:'Red',translation:'אדום'},{word:'Blue',translation:'כחול'},{word:'Sun',translation:'שמש'},{word:'Apple',translation:'תפוח'},{word:'Dog',translation:'כלב'},{word:'Cat',translation:'חתול'}];
        let state = {
            player: 'X',
            grids: Array(9).fill(null).map(() => Array(9).fill(null)),
            mainBoard: Array(9).fill(null),
            nextBoard: -1,
            phase: 'ASK', 
            mode: 'pvp',
            currentWord: ''
        };

        // אתחול הקראה (חשוב למובייל)
        function initSpeech() {
            const ut = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(ut);
        }

        function speakWord() {
            if (!state.currentWord) return;
            window.speechSynthesis.cancel(); // עצירת הקראות קודמות
            const ut = new SpeechSynthesisUtterance(state.currentWord);
            ut.lang = 'en-US';
            ut.rate = 0.9;
            window.speechSynthesis.speak(ut);
        }

        function openModal(id) { 
            const modal = document.getElementById(id);
            if(id === 'quiz-modal') {
                modal.style.borderColor = state.player === 'X' ? '#2563eb' : '#dc2626';
                initSpeech(); // הכנת המנוע לדיבור
            }
            modal.showModal(); 
        }
        function closeModal(id) { document.getElementById(id).close(); }

        function startGame(mode) {
            state.mode = mode;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            initBoard();
            updateUI();
        }

        function initBoard() {
            const b = document.getElementById('board-wrapper');
            b.innerHTML = '';
            for(let i=0; i<9; i++) {
                const sg = document.createElement('div');
                sg.className = 'sub-grid';
                sg.id = `board-${i}`;
                for(let j=0; j<9; j++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => handleCellClick(i, j);
                    sg.appendChild(c);
                }
                b.appendChild(sg);
            }
        }

        function handleActionClick() {
            if(state.phase === 'ASK') showQuiz();
        }

        function showQuiz() {
            const q = vocab[Math.floor(Math.random()*vocab.length)];
            state.currentWord = q.word;
            document.getElementById('quiz-word').innerText = q.word;
            document.getElementById('quiz-word').className = `text-5xl font-black word-ltr ${state.player === 'X' ? 'text-app-blue' : 'text-app-red'}`;

            const opts = [q.translation];
            while(opts.length < 4 && opts.length < vocab.length + 1) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].translation;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(()=>Math.random()-0.5);

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "app-btn !py-2 !text-xl";
                btn.innerText = o;
                btn.onclick = () => {
                    if(o === q.translation) {
                        btn.classList.add('answer-correct');
                        setTimeout(() => {
                            closeModal('quiz-modal');
                            state.phase = 'MOVE';
                            updateUI();
                        }, 500);
                    } else {
                        btn.classList.add('answer-wrong');
                        setTimeout(() => {
                            closeModal('quiz-modal');
                            changePlayer();
                        }, 500);
                    }
                };
                container.appendChild(btn);
            });
            openModal('quiz-modal');
        }

        function handleCellClick(bi, ci) {
            if(state.phase !== 'MOVE') return;
            if(state.mainBoard[bi] !== null || (state.nextBoard !== -1 && state.nextBoard !== bi) || state.grids[bi][ci] !== null) return;

            state.grids[bi][ci] = state.player;
            if(checkWin(state.grids[bi])) {
                state.mainBoard[bi] = state.player;
                const div = document.getElementById(`board-${bi}`);
                const ov = document.createElement('div');
                ov.className = `won-overlay ${state.player === 'X' ? 'player-x' : 'player-o'}`;
                ov.innerText = state.player;
                div.appendChild(ov);
            }

            state.nextBoard = state.mainBoard[ci] === null ? ci : -1;
            
            if(checkWin(state.mainBoard)) {
                endGame(`ניצחון לשחקן ${state.player}!`);
            } else if (!state.mainBoard.includes(null) && !state.grids.flat().includes(null)) {
                endGame("תיקו!");
            } else {
                changePlayer();
            }
        }

        function changePlayer() {
            state.player = state.player === 'X' ? 'O' : 'X';
            state.phase = 'ASK';
            updateUI();
            if(state.mode === 'pvc' && state.player === 'O') setTimeout(aiMove, 800);
        }

        function aiMove() {
            let bi = (state.nextBoard === -1 || state.mainBoard[state.nextBoard] !== null) ? 
                state.mainBoard.map((v, i) => v === null ? i : null).filter(v => v !== null)[0] : state.nextBoard;
            const validCells = state.grids[bi].map((v, i) => v === null ? i : null).filter(v => v !== null);
            if(validCells.length > 0) {
                const ci = validCells[Math.floor(Math.random() * validCells.length)];
                state.phase = 'MOVE'; 
                handleCellClick(bi, ci);
            }
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(l => b[l[0]] && b[l[0]]===b[l[1]] && b[l[0]]===b[l[2]]);
        }

        function updateUI() {
            const btn = document.getElementById('action-btn');
            btn.innerText = state.phase === 'ASK' ? '?' : '!';
            btn.style.borderColor = state.player === 'X' ? '#2563eb' : '#dc2626';
            btn.className = `status-circle ${state.player === 'X' ? 'player-x' : 'player-o'}`;
            document.getElementById('turn-text').innerText = `תור: ${state.player}`;
            document.getElementById('turn-text').className = `text-xl ${state.player === 'X' ? 'text-app-blue' : 'text-app-red'}`;

            for(let i=0; i<9; i++) {
                const bg = document.getElementById(`board-${i}`);
                bg.classList.remove('active-board');
                if(state.phase === 'MOVE' && state.mainBoard[i] === null && (state.nextBoard === -1 || state.nextBoard === i)) bg.classList.add('active-board');
                for(let j=0; j<9; j++) {
                    const c = bg.querySelectorAll('.cell')[j];
                    c.innerText = state.grids[i][j] || '';
                    c.className = `cell ${state.grids[i][j] === 'X' ? 'player-x' : 'player-o'} ${(!state.grids[i][j] && bg.classList.contains('active-board')) ? 'can-move' : ''}`;
                }
            }
        }

        function endGame(msg) {
            const title = document.getElementById('end-game-title');
            title.innerText = msg;
            title.className = `text-4xl font-black mb-8 ${state.player === 'X' ? 'text-app-blue' : 'text-app-red'}`;
            openModal('end-game-modal');
        }

        function resetGame() {
            state.grids = Array(9).fill(null).map(() => Array(9).fill(null));
            state.mainBoard = Array(9).fill(null);
            state.nextBoard = -1;
            state.player = 'X';
            state.phase = 'ASK';
            closeModal('end-game-modal');
            initBoard();
            updateUI();
        }

        function saveVocab() {
            const lines = document.getElementById('vocab-input').value.split('\n');
            const newVocab = lines.filter(l => l.includes('-')).map(l => {
                const [w, t] = l.split('-').map(s => s.trim());
                return { word: w, translation: t };
            });
            if(newVocab.length > 0) vocab = newVocab;
            closeModal('vocab-modal');
        }

        window.onload = () => { 
            document.getElementById('vocab-input').value = vocab.map(v => `${v.word} - ${v.translation}`).join('\n'); 
        };
    </script>
</body>
</html>
