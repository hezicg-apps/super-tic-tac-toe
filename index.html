<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe - V1.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // פונקציה ליצירת משחק וקבלת לינק
        window.startOnline = async () => {
            if (!window.vocab || window.vocab.length < 3) { 
                showStatusModal("יש להוסיף לפחות 3 מילים לפני תחילת משחק אונליין."); 
                return; 
            }
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            window.gameId = id; window.myRole = "X"; window.mode = "online";
            
            await setDoc(doc(db, 'games', id), {
                board: Array(9).fill(""), turn: "X", status: "waiting", 
                vocabulary: window.vocab, history: {X:[], O:[]}
            });
            
            const link = `https://hezicg-apps.github.io/super-tic-tac-toe/?game=${id}`;
            document.getElementById('gameLinkInput').value = link;
            document.getElementById('lobbyMain').style.display = 'none';
            document.getElementById('onlineWait').style.display = 'flex';
            document.getElementById('gameCodeDisplay').textContent = id;
            listenToGame();
        };

        window.copyLink = () => {
            const input = document.getElementById('gameLinkInput');
            input.select();
            document.execCommand('copy');
            showStatusModal("הקישור הועתק! שלח אותו לחבר/ה.");
        };

        window.joinGame = async (id) => {
            if (!id) return;
            const cleanId = id.trim().toUpperCase();
            const snap = await getDoc(doc(db, 'games', cleanId));
            if (snap.exists()) {
                window.gameId = cleanId; window.myRole = "O"; window.mode = "online";
                window.vocab = snap.data().vocabulary;
                await updateDoc(doc(db, 'games', cleanId), { status: "playing" });
                listenToGame();
            } else { showStatusModal("קוד משחק לא נמצא."); }
        };

        function listenToGame() {
            onSnapshot(doc(db, 'games', window.gameId), (snap) => {
                const data = snap.data();
                if (data) {
                    window.state = data;
                    if (data.status === "playing") {
                        document.getElementById('lobby').style.display = 'none';
                        document.getElementById('gameUI').style.display = 'flex';
                        render();
                        if (data.turn === window.myRole && !window.state.asking) {
                            window.state.asking = true;
                            setTimeout(ask, 500);
                        }
                    }
                }
            });
        }

        // עדכון Firebase בכל תנועה
        window.syncMove = async () => {
            if (window.mode === "online") {
                await updateDoc(doc(db, 'games', window.gameId), {
                    board: state.board, turn: state.turn, history: state.history
                });
            }
        };
    </script>

    <style>
        body, html { 
            background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed;
        }
        .board-container { width: 320px; height: 320px; display: grid; grid-template-columns: repeat(3, 1fr); margin: 0 auto; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; width: 106px; height: 106px; }
        .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8) { border-left: 5px solid #fff; border-right: 5px solid #fff; }
        .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-top: 5px solid #fff; border-bottom: 5px solid #fff; }
        .x-neon { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .o-neon { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        .fading { opacity: 0.3; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.1; } }
        .btn { width: 290px; height: 55px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .btn-gold { background: #facc15; color: #000; }
        .btn-outline { border: 2px solid #facc15; color: #facc15; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="lobby" class="modal">
        <div id="lobbyMain" class="flex flex-col items-center">
            <h1 class="text-[#00f2ff] text-5xl font-black italic mb-2">SUPER</h1>
            <h1 class="text-[#bc13fe] text-4xl font-black italic mb-8">TIC TAC TOE</h1>
            <button onclick="showModal('vocabModal')" class="btn btn-outline">1. הוספת מילים</button>
            <button onclick="initGame('ai')" class="btn btn-gold">משחק נגד המחשב</button>
            <button onclick="initGame('friend')" class="btn btn-gold">שני שחקנים (באותו מכשיר)</button>
            <div class="h-8"></div>
            <button onclick="startOnline()" class="btn bg-green-600 text-white border-none">צור משחק אונליין</button>
            <input type="text" id="joinInput" placeholder="קוד הצטרפות" class="btn bg-transparent text-center border-zinc-700 text-white outline-none">
            <button onclick="joinGame(document.getElementById('joinInput').value)" class="btn border-zinc-500 text-zinc-500">הצטרף לחבר</button>
        </div>

        <div id="onlineWait" style="display:none;" class="flex flex-col items-center px-6 text-center">
            <h2 class="text-2xl mb-4">המשחק נוצר!</h2>
            <div id="gameCodeDisplay" class="text-6xl font-bold text-yellow-500 mb-6"></div>
            <input type="text" id="gameLinkInput" readonly class="w-full p-3 bg-zinc-900 rounded-lg text-xs mb-4 text-center">
            <button onclick="copyLink()" class="btn btn-gold w-full">העתק קישור ושלח בוואטסאפ</button>
            <p class="animate-pulse text-zinc-500 mt-4">ברגע שהחבר יתחבר, המשחק יתחיל אוטומטית...</p>
        </div>
    </div>

    <div id="gameUI" style="display:none;" class="flex flex-col h-full">
        <div class="h-24 flex items-center justify-center border-b border-zinc-900">
            <h2 id="turnDisplay" class="text-3xl font-bold italic"></h2>
        </div>
        <div class="flex-grow flex items-center justify-center">
            <div class="board-container">
                <div class="cell" onclick="handleCellClick(0)"></div><div class="cell" onclick="handleCellClick(1)"></div><div class="cell" onclick="handleCellClick(2)"></div>
                <div class="cell" onclick="handleCellClick(3)"></div><div class="cell" onclick="handleCellClick(4)"></div><div class="cell" onclick="handleCellClick(5)"></div>
                <div class="cell" onclick="handleCellClick(6)"></div><div class="cell" onclick="handleCellClick(7)"></div><div class="cell" onclick="handleCellClick(8)"></div>
            </div>
        </div>
    </div>

    <div id="vocabModal" style="display:none;" class="modal bg-black/95">
        <div class="bg-zinc-900 p-6 rounded-3xl border-2 border-[#facc15] w-80">
            <textarea id="vocabInput" placeholder="apple - תפוח" class="w-full h-48 bg-black text-white p-4 rounded-xl border border-zinc-800 text-right mb-4"></textarea>
            <button onclick="saveVocab()" class="btn btn-gold w-full">שמור</button>
        </div>
    </div>

    <div id="quiz" style="display:none;" class="modal bg-black/98">
        <div id="qWord" class="text-6xl font-black mb-12 italic"></div>
        <div id="options" class="flex flex-col items-center w-full px-8"></div>
    </div>

    <div id="statusModal" style="display:none;" class="modal bg-black/90">
        <div class="bg-zinc-900 p-8 rounded-3xl text-center max-w-xs">
            <p id="statusMsg" class="text-xl mb-6"></p>
            <button onclick="hideModal('statusModal')" class="btn btn-gold w-full">סגור</button>
        </div>
    </div>

    <script>
        window.vocab = [];
        window.state = { board: Array(9).fill(""), turn: "X", history: {X:[], O:[]}, canMove: false, asking: false };
        window.mode = "ai";

        const showModal = (id) => document.getElementById(id).style.display = 'flex';
        const hideModal = (id) => document.getElementById(id).style.display = 'none';
        const showStatusModal = (msg) => { document.getElementById('statusMsg').textContent = msg; showModal('statusModal'); };

        function saveVocab() {
            window.vocab = document.getElementById('vocabInput').value.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);
            hideModal('vocabModal');
        }

        function initGame(m) {
            if (vocab.length < 3) return showStatusModal("הוסף מילים תחילה.");
            window.mode = m;
            hideModal('lobby');
            showModal('gameUI');
            render();
            ask();
        }

        function ask() {
            if (vocab.length === 0) return;
            const item = vocab[Math.floor(Math.random()*vocab.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocab.length)) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const qW = document.getElementById('qWord');
            qW.textContent = item.en;
            qW.className = `text-6xl font-black mb-12 italic ${state.turn==='X'?'x-neon':'o-neon'}`;
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn border-zinc-800 text-white w-full';
                b.textContent = o;
                b.onclick = () => {
                    if(o === item.he) {
                        b.style.background = '#22c55e';
                        setTimeout(() => { hideModal('quiz'); state.canMove = true; state.asking = false; }, 600);
                    } else {
                        b.style.background = '#ef4444';
                        setTimeout(() => { hideModal('quiz'); state.asking = false; nextPlayer(); }, 1000);
                    }
                };
                container.appendChild(b);
            });
            showModal('quiz');
        }

        function handleCellClick(i) {
            if (!state.canMove || state.board[i] !== "") return;
            if (window.mode === "online" && state.turn !== window.myRole) return;

            state.board[i] = state.turn;
            state.history[state.turn].push(i);
            if(state.history[state.turn].length > 3) {
                const old = state.history[state.turn].shift();
                state.board[old] = "";
            }
            
            state.canMove = false;
            render();
            if (window.mode === "online") window.syncMove();
            
            if(checkWin()) {
                confetti();
                showStatusModal(`ניצחון ל-${state.turn}!`);
                setTimeout(()=>location.reload(), 3000);
            } else {
                nextPlayer();
            }
        }

        function nextPlayer() {
            state.turn = state.turn === "X" ? "O" : "X";
            render();
            if (window.mode === "online") {
                window.syncMove();
            } else if (mode === "ai" && state.turn === "O") {
                setTimeout(aiPlay, 800);
            } else {
                setTimeout(ask, 500);
            }
        }

        function aiPlay() {
            const empty = state.board.map((v,i) => v===""?i:null).filter(v=>v!==null);
            if(empty.length) { state.canMove = true; handleCellClick(empty[Math.floor(Math.random()*empty.length)]); }
        }

        function render() {
            const isX = state.turn === 'X';
            const head = document.getElementById('turnDisplay');
            head.textContent = `תור השחקן ${state.turn}`;
            head.style.color = isX ? "#00f2ff" : "#bc13fe";

            document.querySelectorAll('.cell').forEach((c, i) => {
                const val = state.board[i];
                c.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                let cls = val === 'X' ? 'x-neon' : (val === 'O' ? 'o-neon' : '');
                if (val && state.history[val].length === 3 && state.history[val][0] === i) cls += " fading";
                c.className = "cell " + cls;
            });
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => state.board[p[0]] && state.board[p[0]] === state.board[p[1]] && state.board[p[0]] === state.board[p[2]]);
        }

        // תמיכה בכניסה ישירה מקישור
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('game');
            if (gameId) window.joinGame(gameId);
        };
    </script>
</body>
</html>
