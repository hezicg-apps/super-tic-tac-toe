<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b",
            measurementId: "G-0476T9DDNG"
        };

        let db, auth, appId = "super-ttt-v1";
        let firebaseReady = false;
        
        async function setupFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                firebaseReady = true;
                document.getElementById('gameStatus').innerHTML = "מחובר לשרת ✅";
                enableLobby();
            } catch (e) {
                console.error(e);
                document.getElementById('gameStatus').innerHTML = `<span class="text-amber-500">אופליין</span>`;
                enableLobby();
            }
        }

        function enableLobby() {
            const lobby = document.getElementById('lobbyInputs');
            lobby.style.opacity = "1";
            lobby.classList.remove('pointer-events-none');
        }

        let vocabulary = [
            { en: "at last", he: "סוף סוף" }, { en: "downstairs", he: "בקומה למטה" },
            { en: "give up", he: "לוותר" }, { en: "luckily", he: "למרבה המזל" },
            { en: "more and more", he: "יותר ויותר" }, { en: "on time", he: "בזמן" },
            { en: "part of", he: "חלק מ..." }, { en: "take part in", he: "להשתתף ב..." },
            { en: "upstairs", he: "בקומה למעלה" }, { en: "way", he: "דרך" }
        ];

        let gameMode = "ai"; 
        let gameId = "";
        let myRole = "X"; 
        let unsubscribe = null;
        let localState = { board: Array(9).fill(""), currentPlayer: "X", playerTurns: { X: 0, O: 0 }, status: "playing" };

        window.addEventListener('load', () => {
            setupFirebase();
            document.getElementById('lobbyModal').classList.add('active');
        });

        window.openVocabEditor = () => {
            document.getElementById('vocabInput').value = vocabulary.map(item => `${item.en}:${item.he}`).join('\n');
            document.getElementById('vocabModal').classList.add('active');
        };

        window.saveVocab = () => {
            const lines = document.getElementById('vocabInput').value.split('\n');
            const newVocab = lines.map(line => {
                const parts = line.split(':');
                if (parts.length === 2) return { en: parts[0].trim(), he: parts[1].trim() };
                return null;
            }).filter(i => i !== null);
            if (newVocab.length >= 3) vocabulary = newVocab;
            closeModal('vocabModal');
        };

        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.openTutorial = () => document.getElementById('tutorialModal').classList.add('active');

        function checkWinner(board) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let p of wins) {
                if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) return board[p[0]];
            }
            return board.includes("") ? null : "draw";
        }

        window.startAI = () => {
            gameMode = "ai";
            localState = { board: Array(9).fill(""), currentPlayer: "X", playerTurns: { X: 0, O: 0 }, status: "playing" };
            closeModal('lobbyModal');
            renderGame(localState);
        };

        window.createOnline = async () => {
            if (!firebaseReady) return;
            gameMode = "online";
            gameId = Math.random().toString(36).substring(2, 7).toUpperCase();
            myRole = "X";
            const gameRef = doc(db, 'games', gameId);
            await setDoc(gameRef, { 
                board: Array(9).fill(""), 
                currentPlayer: "X", 
                playerTurns: { X: 0, O: 0 }, 
                status: "waiting", 
                players: { X: auth.currentUser.uid, O: null } 
            });
            startListening();
            showLobbyInfo();
        };

        window.joinOnline = async () => {
            const inputId = document.getElementById('gameIdInput').value.toUpperCase();
            if (!inputId || !firebaseReady) return;
            gameMode = "online";
            gameId = inputId;
            myRole = "O";
            const gameRef = doc(db, 'games', gameId);
            const snap = await getDoc(gameRef);
            if (snap.exists()) {
                await updateDoc(gameRef, { "players.O": auth.currentUser.uid, status: "playing" });
                startListening();
                closeModal('lobbyModal');
            } else alert("משחק לא נמצא");
        };

        function startListening() {
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(doc(db, 'games', gameId), (snap) => {
                if (snap.exists()) renderGame(snap.data());
            });
        }

        function renderGame(data) {
            // אם המשחק התחיל (יש שחקן O), נסגור את המודאל של הלובי סופית
            if (data.status !== 'waiting' && document.getElementById('lobbyModal').classList.contains('active')) {
                closeModal('lobbyModal');
            }

            const isMyTurn = data.currentPlayer === myRole;
            document.getElementById('turnBar').className = `turn-bar turn-${data.currentPlayer.toLowerCase()}`;
            document.getElementById('turnIcon').textContent = data.currentPlayer === "X" ? "✕" : "◯";
            document.getElementById('playerTurnCounter').textContent = data.playerTurns[data.currentPlayer];

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = data.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = `cell ${val === "X" ? 'x-neon' : (val === "O" ? 'o-neon' : '')} ${val === "" && isMyTurn && data.status === 'ready_to_move' ? 'highlight' : ''}`;
            });

            if (data.status === "playing" && isMyTurn) showQuiz();
            else if (data.status === "finished") showResult(data.winner);
            else if (data.status === "ready_to_move") closeModal('quizModal');

            if (gameMode === "ai" && data.currentPlayer === "O" && data.status === "playing") {
                setTimeout(() => aiMove(data), 800);
            }
        }

        async function aiMove(data) {
            let bestMove = data.board.map((v, i) => v === "" ? i : null).filter(v => v !== null)[0];
            if (bestMove !== undefined) executeMove("O", bestMove);
        }

        async function executeMove(role, idx) {
            let currentData = gameMode === "online" ? (await getDoc(doc(db, 'games', gameId))).data() : localState;
            let newBoard = [...currentData.board];
            newBoard[idx] = role;
            let turns = {...currentData.playerTurns};
            turns[role]++;

            if (turns[role] >= 4) {
                const indices = newBoard.map((v,i) => v === role ? i : null).filter(v => v !== null);
                newBoard[indices[Math.floor(Math.random()*indices.length)]] = "";
                turns[role] = 0;
                showFlashMsg();
            }

            const win = checkWinner(newBoard);
            const updates = { board: newBoard, playerTurns: turns, status: win ? "finished" : "playing", winner: win || null, currentPlayer: role === "X" ? "O" : "X" };

            if (gameMode === "online") {
                await updateDoc(doc(db, 'games', gameId), updates);
            } else {
                localState = {...localState, ...updates};
                renderGame(localState);
            }
        }

        window.handleCellClick = async (idx) => {
            let status;
            if (gameMode === "online") {
                const snap = await getDoc(doc(db, 'games', gameId));
                status = snap.data().status;
            } else {
                status = localState.status;
            }
            if (status === "ready_to_move") executeMove(myRole, idx);
        };

        function showQuiz() {
            if (document.getElementById('quizModal').classList.contains('active')) return;
            const item = vocabulary[Math.floor(Math.random()*vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random()-0.5);
            document.getElementById('questionText').textContent = item.en;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-option w-full text-white';
                b.textContent = o;
                b.onclick = async () => {
                    const isCorrect = o === item.he;
                    const updates = isCorrect ? { status: 'ready_to_move' } : { currentPlayer: myRole === "X" ? "O" : "X" };
                    if (gameMode === "online") await updateDoc(doc(db, 'games', gameId), updates);
                    else { Object.assign(localState, updates); renderGame(localState); }
                    closeModal('quizModal');
                };
                container.appendChild(b);
            });
            document.getElementById('quizModal').classList.add('active');
            speak(item.en);
        }

        function showLobbyInfo() {
            document.getElementById('lobbyInputs').style.display = 'none';
            document.getElementById('codeDisplayArea').style.display = 'block';
            document.getElementById('displayCode').textContent = gameId;
            document.getElementById('waLink').href = `https://wa.me/?text=${encodeURIComponent('בוא לשחק איתי סופר איקס עיגול!\nקוד: ' + gameId)}`;
        }

        function showResult(winner) {
            document.getElementById('resultTitle').textContent = (winner === "draw") ? "תיקו!" : (winner === myRole ? "ניצחת! 🎉" : "הפסדת... 😢");
            document.getElementById('resultModal').classList.add('active');
        }

        function showFlashMsg() {
            const m = document.getElementById('removalMsg');
            m.classList.add('visible');
            setTimeout(() => m.classList.remove('visible'), 2500);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        window.playAgain = () => location.reload();
    </script>
    <style>
        body { background: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .turn-bar { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
        .turn-x { color: #00f2ff; border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        .turn-o { color: #bc13fe; border-bottom: 1px solid rgba(188, 19, 254, 0.2); }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); width: 85vw; max-width: 320px; margin: 40px auto; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; cursor: pointer; }
        .cell:nth-child(3n-1), .cell:nth-child(3n-2) { border-left: 4px solid #222; }
        .cell:nth-child(n+4) { border-top: 4px solid #222; }
        .cell.highlight { background: rgba(255, 255, 255, 0.05); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .x-neon { color: #fff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        .o-neon { color: #fff; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .btn-option { background: #111; border: 1px solid #333; padding: 20px; margin: 8px 0; border-radius: 16px; font-size: 1.2rem; }
        .removal-alert { color: #ff4444; font-weight: bold; opacity: 0; transition: 0.3s; text-align: center; font-size: 0.9rem; }
        .removal-alert.visible { opacity: 1; }
        .wa-btn { background: #25D366; color: white; padding: 14px 24px; border-radius: 16px; font-weight: bold; text-decoration: none; margin-top: 20px; display: block; }
        textarea { background: #0a0a0a; color: #0f0; padding: 15px; border: 1px solid #333; width: 100%; height: 200px; }
        .btn-primary { background: #facc15; color: #000; padding: 20px; border-radius: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="turnBar" class="turn-bar turn-x">
        <span id="turnIcon" class="ml-3">✕</span>
        <span class="text-sm opacity-50 font-normal">תור השחקן</span>
    </div>

    <div class="text-center mt-6">
        <div class="flex justify-center items-baseline gap-1">
            <span id="playerTurnCounter" class="text-2xl font-light">0</span>
            <span class="text-gray-600 text-sm">/ 4</span>
        </div>
        <p id="gameStatus" class="text-[11px] text-gray-600 mt-3 italic">מתחבר...</p>
    </div>

    <div class="board">
        <div class="cell" onclick="handleCellClick(2)"></div>
        <div class="cell" onclick="handleCellClick(1)"></div>
        <div class="cell" onclick="handleCellClick(0)"></div>
        <div class="cell" onclick="handleCellClick(5)"></div>
        <div class="cell" onclick="handleCellClick(4)"></div>
        <div class="cell" onclick="handleCellClick(3)"></div>
        <div class="cell" onclick="handleCellClick(8)"></div>
        <div class="cell" onclick="handleCellClick(7)"></div>
        <div class="cell" onclick="handleCellClick(6)"></div>
    </div>

    <div id="removalMsg" class="removal-alert">סימן ישן הוסר מהלוח</div>

    <div id="lobbyModal" class="modal">
        <h1 class="text-4xl font-black mb-8">SUPER <span class="text-yellow-400">TIC TAC TOE</span></h1>
        <div id="lobbyInputs" class="w-full max-w-xs space-y-4 pointer-events-none" style="opacity:0.5;">
            <button onclick="startAI()" class="btn-primary w-full">שחקן יחיד</button>
            <div class="flex gap-2">
                <button onclick="openVocabEditor()" class="bg-zinc-900 flex-1 py-3 rounded-xl text-xs text-gray-400">עריכה ⚙️</button>
                <button onclick="openTutorial()" class="bg-zinc-900 flex-1 py-3 rounded-xl text-xs text-gray-400">מדריך 📖</button>
            </div>
            <button onclick="createOnline()" class="bg-blue-600 w-full py-4 rounded-xl font-bold">צור קוד משחק</button>
            <input type="text" id="gameIdInput" placeholder="הכנס קוד" class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-center w-full">
            <button onclick="joinOnline()" class="bg-zinc-800 w-full py-4 rounded-xl font-bold">הצטרף</button>
        </div>
        <div id="codeDisplayArea" style="display:none" class="bg-zinc-900 p-8 rounded-3xl mt-4">
            <p class="text-gray-500 text-xs">הקוד שלך:</p>
            <div id="displayCode" class="text-6xl font-mono font-bold my-4"></div>
            <a id="waLink" href="#" target="_blank" class="wa-btn">שתף בוואטסאפ</a>
        </div>
    </div>

    <div id="quizModal" class="modal">
        <h2 id="questionText" class="text-5xl font-black mb-10"></h2>
        <div id="optionsContainer" class="w-full max-w-xs"></div>
    </div>

    <div id="resultModal" class="modal">
        <h2 id="resultTitle" class="text-6xl font-black mb-12"></h2>
        <button onclick="playAgain()" class="bg-white text-black px-12 py-5 rounded-2xl font-bold">שחק שוב</button>
    </div>

    <div id="vocabModal" class="modal">
        <div class="w-full max-w-md bg-zinc-900 p-6 rounded-3xl">
            <textarea id="vocabInput"></textarea>
            <button onclick="saveVocab()" class="bg-white text-black w-full py-4 rounded-xl mt-4 font-bold">שמור</button>
        </div>
    </div>

    <div id="tutorialModal" class="modal">
        <div class="bg-zinc-900 p-8 rounded-3xl text-right max-w-xs">
            <h2 class="text-xl font-bold mb-4">איך משחקים?</h2>
            <p class="text-gray-400 text-sm">עונים נכון על שאלה כדי לסמן בלוח. שימו לב: מותר רק 4 סימנים, החמישי ימחק את הראשון!</p>
            <button onclick="closeModal('tutorialModal')" class="mt-6 bg-blue-600 w-full py-3 rounded-xl font-bold">הבנתי</button>
        </div>
    </div>

</body>
</html>
