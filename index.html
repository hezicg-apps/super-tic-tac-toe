<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* לוח # פשוט וקבוע */
        .board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            width: 90vw; max-width: 360px; margin: 20px auto; 
        }
        .cell { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 5rem; font-weight: bold; cursor: pointer;
        }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(7), .cell:nth-child(8) { border-left: 4px solid #fff; }
        .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3), .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 4px solid #fff; }

        .x-style { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .o-style { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        .opacity-30 { opacity: 0.3 !important; }

        /* מסך פתיחה מקורי */
        .modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        
        .game-title { font-size: 3.5rem; font-weight: 900; font-style: italic; text-align: center; line-height: 1; }
        .btn-gold { width: 100%; max-width: 300px; height: 60px; border: 2px solid #facc15; border-radius: 15px; color: #facc15; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; }
        .btn-gold-fill { background: #facc15; color: #000; }
        .btn-green { background: #16a34a; border: none; color: #fff; }

        .btn-help { position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00f2ff; color: #00f2ff; font-weight: bold; animation: pulse 2s infinite; background: none; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px #00f2ff; } 50% { box-shadow: 0 0 20px #00f2ff; } }

        .quiz-container { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .btn-option { width: 100%; max-width: 300px; padding: 18px; border: 2px solid #fff; border-radius: 15px; margin: 8px 0; font-size: 1.3rem; font-weight: bold; background: #111; color: #fff; }
        
        #next-turn-btn { margin-top: 20px; padding: 15px 40px; background: #facc15; color: #000; border-radius: 12px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="turnBar" class="h-16 flex items-center justify-center border-b border-zinc-800 text-2xl font-bold">
        <span id="turnIcon" class="ml-2">✕</span> תור השחקן
    </div>

    <div class="board" id="mainBoard">
        <div class="cell" onclick="cellClick(0)"></div><div class="cell" onclick="cellClick(1)"></div><div class="cell" onclick="cellClick(2)"></div>
        <div class="cell" onclick="cellClick(3)"></div><div class="cell" onclick="cellClick(4)"></div><div class="cell" onclick="cellClick(5)"></div>
        <div class="cell" onclick="cellClick(6)"></div><div class="cell" onclick="cellClick(7)"></div><div class="cell" onclick="cellClick(8)"></div>
    </div>

    <div id="lobbyModal" class="modal active">
        <button class="btn-help" onclick="alert('חוקים: 3 סימנים לכל שחקן. הרביעי מוחק את הראשון.')">?</button>
        <div class="mb-10">
            <div class="game-title text-cyan-400 shadow-cyan-500/50">SUPER</div>
            <div class="game-title text-purple-500 shadow-purple-500/50">TIC TAC TOE</div>
        </div>
        <button onclick="document.getElementById('vocabEditor').style.display='flex'" class="btn-gold italic">לחצו להוספת מילים למשחק</button>
        <button onclick="startGame('ai')" class="btn-gold btn-gold-fill">משחק נגד AI</button>
        <button onclick="startGame('friend')" class="btn-gold">משחק 1:1</button>
        <p class="text-yellow-500 text-[10px] font-bold tracking-widest my-2 uppercase">Multiplayer Mode</p>
        <button onclick="alert('בקרוב!')" class="btn-gold btn-green">משחק אונליין</button>
    </div>

    <div id="quizModal" class="quiz-container">
        <div id="questionArea" class="w-full max-w-xs flex flex-col items-center">
            <h2 id="questionText" class="text-5xl font-black mb-10 italic"></h2>
            <div id="optionsContainer" class="w-full"></div>
        </div>
        <button id="next-turn-btn" onclick="hideQuiz()">המשך ללוח</button>
    </div>

    <div id="vocabEditor" class="modal">
        <textarea id="vocabInput" class="w-full max-w-xs h-48 bg-zinc-900 text-white p-4 border border-zinc-700 rounded-lg mb-4" placeholder="Dog - כלב"></textarea>
        <button onclick="saveVocab()" class="btn-gold btn-gold-fill">שמור מילים</button>
    </div>

    <script>
        let vocabulary = [];
        let state = { board: Array(9).fill(""), currentPlayer: "X", history: { X: [], O: [] }, status: "playing" };
        let gameMode = "ai";

        function startGame(mode) {
            if (vocabulary.length < 3) return alert("הוסף לפחות 3 מילים!");
            gameMode = mode;
            document.getElementById('lobbyModal').classList.remove('active');
            updateUI();
            showQuiz();
        }

        function updateUI() {
            const isX = state.currentPlayer === "X";
            document.getElementById('turnBar').style.color = isX ? "#00f2ff" : "#bc13fe";
            document.getElementById('turnIcon').textContent = isX ? "✕" : "◯";

            document.querySelectorAll('.cell').forEach((cell, i) => {
                const val = state.board[i];
                cell.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                cell.className = "cell " + (val === "X" ? "x-style" : "o-style");
                
                // סימן שעומד להימחק
                if ((state.history.X.length === 3 && state.history.X[0] === i) || 
                    (state.history.O.length === 3 && state.history.O[0] === i)) {
                    cell.classList.add('opacity-30');
                }
            });
        }

        function showQuiz() {
            const item = vocabulary[Math.floor(Math.random()*vocabulary.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocabulary.length)) {
                const r = vocabulary[Math.floor(Math.random()*vocabulary.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            document.getElementById('questionText').textContent = item.en;
            document.getElementById('questionText').style.color = state.currentPlayer === "X" ? "#00f2ff" : "#bc13fe";
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                b.textContent = o;
                b.onclick = () => {
                    if (o === item.he) {
                        document.getElementById('questionArea').style.display = 'none';
                        document.getElementById('next-turn-btn').style.display = 'block';
                        state.status = "ready_to_move";
                    } else {
                        alert("טעות!");
                        state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
                        updateUI();
                        if (gameMode === "ai" && state.currentPlayer === "O") setTimeout(aiMove, 1000);
                        else showQuiz();
                    }
                };
                container.appendChild(b);
            });
            document.getElementById('questionArea').style.display = 'flex';
            document.getElementById('next-turn-btn').style.display = 'none';
            document.getElementById('quizModal').style.display = 'flex';
        }

        function hideQuiz() {
            document.getElementById('quizModal').style.display = 'none';
        }

        function cellClick(i) {
            if (state.status !== "ready_to_move" || state.board[i] !== "") return;
            
            state.board[i] = state.currentPlayer;
            state.history[state.currentPlayer].push(i);
            if (state.history[state.currentPlayer].length > 3) state.board[state.history[state.currentPlayer].shift()] = "";

            updateUI();
            if (checkWin()) { confetti(); alert(state.currentPlayer + " ניצח!"); location.reload(); return; }

            state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
            state.status = "playing";
            updateUI();
            if (gameMode === "ai" && state.currentPlayer === "O") setTimeout(aiMove, 1000);
            else showQuiz();
        }

        function aiMove() {
            const empty = state.board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                const idx = empty[Math.floor(Math.random()*empty.length)];
                state.board[idx] = "O";
                state.history.O.push(idx);
                if (state.history.O.length > 3) state.board[state.history.O.shift()] = "";
                if (checkWin()) { alert("הפסדת!"); location.reload(); return; }
                state.currentPlayer = "X";
                updateUI();
                showQuiz();
            }
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(p => state.board[p[0]] && state.board[p[0]] === state.board[p[1]] && state.board[p[0]] === state.board[p[2]]);
        }

        function saveVocab() {
            vocabulary = document.getElementById('vocabInput').value.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(i => i);
            document.getElementById('vocabEditor').style.display = 'none';
        }
    </script>
</body>
</html>
