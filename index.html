<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tic Tac Toe - V2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqgGqCF5VzJ7I3x0O2DdQk7bY-ARajyE0",
            authDomain: "super-tic-tac-toe-57080.firebaseapp.com",
            projectId: "super-tic-tac-toe-57080",
            storageBucket: "super-tic-tac-toe-57080.firebasestorage.app",
            messagingSenderId: "32126067090",
            appId: "1:32126067090:web:517e9f90515eec6e0d614b"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.startOnline = async () => {
            if (!window.vocab || window.vocab.length < 3) { 
                alert("יש להוסיף לפחות 3 מילים קודם"); 
                showModal('vocabModal');
                return; 
            }
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            window.gameId = id; window.myRole = "X"; window.mode = "online";
            
            await setDoc(doc(db, 'games', id), {
                board: Array(9).fill(""), turn: "X", status: "waiting", 
                vocabulary: window.vocab, history: {X:[], O:[]}
            });
            
            document.getElementById('gameLinkDisplay').value = `https://hezicg-apps.github.io/super-tic-tac-toe/?game=${id}`;
            document.getElementById('lobbyMain').style.display = 'none';
            document.getElementById('onlineWait').style.display = 'flex';
            document.getElementById('codeDisplay').textContent = id;
            listenToGame();
        };

        window.joinGame = async (id) => {
            const cleanId = id?.trim().toUpperCase();
            if (!cleanId) return;
            const snap = await getDoc(doc(db, 'games', cleanId));
            if (snap.exists()) {
                window.gameId = cleanId; window.myRole = "O"; window.mode = "online";
                window.vocab = snap.data().vocabulary;
                await updateDoc(doc(db, 'games', cleanId), { status: "playing" });
                listenToGame();
            } else { alert("המשחק לא נמצא"); }
        };

        function listenToGame() {
            onSnapshot(doc(db, 'games', window.gameId), (snap) => {
                const data = snap.data();
                if (data && data.status === "playing") {
                    document.getElementById('lobby').style.display = 'none';
                    document.getElementById('gameUI').style.display = 'flex';
                    window.state = data;
                    render();
                    if (data.turn === window.myRole && !window.state.asking) {
                        window.state.asking = true;
                        setTimeout(ask, 600);
                    }
                }
            });
        }

        window.syncMove = async () => {
            if (window.mode === "online") {
                await updateDoc(doc(db, 'games', window.gameId), {
                    board: state.board, turn: state.turn, history: state.history
                });
            }
        };
    </script>

    <style>
        body, html { background-color: #000; color: #fff; font-family: 'Varela Round', sans-serif; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        .board { width: 310px; height: 310px; display: grid; grid-template-columns: repeat(3, 1fr); margin: 0 auto; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 4.5rem; font-weight: bold; width: 103px; height: 103px; }
        .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8) { border-left: 4px solid #fff; border-right: 4px solid #fff; }
        .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-top: 4px solid #fff; border-bottom: 4px solid #fff; }
        .x-neon { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .o-neon { color: #bc13fe; text-shadow: 0 0 15px #bc13fe; }
        .ghost { opacity: 0.2; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.05; } }
        .btn { width: 280px; height: 50px; border-radius: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: none; }
        .btn-gold { background: #facc15; color: #000; }
        .btn-outline { border: 2px solid #facc15; color: #facc15; background: transparent; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="lobby" class="modal">
        <button class="absolute top-6 left-6 w-10 h-10 border-2 border-[#00f2ff] text-[#00f2ff] rounded-full text-xl font-bold" onclick="showModal('rulesModal')">?</button>
        <div id="lobbyMain" class="flex flex-col items-center">
            <h1 class="text-[#00f2ff] text-5xl font-black italic mb-1">SUPER</h1>
            <h1 class="text-[#bc13fe] text-4xl font-black italic mb-8">TIC TAC TOE</h1>
            <button onclick="showModal('vocabModal')" class="btn btn-outline">הוספת מילים</button>
            <button onclick="initGame('ai')" class="btn btn-gold">נגד המחשב</button>
            <button onclick="initGame('friend')" class="btn btn-gold">שני שחקנים</button>
            <div class="h-6"></div>
            <button onclick="startOnline()" class="btn bg-green-600 text-white">משחק אונליין</button>
            <input type="text" id="joinIn" placeholder="הכנס קוד מחבר" class="btn bg-transparent border-2 border-zinc-800 text-white text-center outline-none">
            <button onclick="joinGame(document.getElementById('joinIn').value)" class="btn border border-zinc-700 text-zinc-500">הצטרף</button>
            <div class="mt-6 text-zinc-800 text-[10px] font-bold">VERSION 2.1</div>
        </div>
        <div id="onlineWait" style="display:none;" class="flex flex-col items-center px-6">
            <div id="codeDisplay" class="text-7xl font-black text-white mb-6"></div>
            <input type="text" id="gameLinkDisplay" readonly class="w-full p-2 bg-zinc-900 rounded text-[10px] mb-4 text-center">
            <button onclick="copyLink()" class="btn btn-gold w-full">העתק קישור</button>
            <p class="animate-pulse text-zinc-600 mt-6">ממתין לחבר...</p>
        </div>
    </div>

    <div id="gameUI" style="display:none;" class="flex flex-col h-full">
        <div class="h-24 flex items-center justify-center border-b border-zinc-900"><h2 id="turnInfo" class="text-3xl font-black italic"></h2></div>
        <div class="flex-grow flex items-center justify-center"><div class="board">
            <div class="cell" onclick="cellTap(0)"></div><div class="cell" onclick="cellTap(1)"></div><div class="cell" onclick="cellTap(2)"></div>
            <div class="cell" onclick="cellTap(3)"></div><div class="cell" onclick="cellTap(4)"></div><div class="cell" onclick="cellTap(5)"></div>
            <div class="cell" onclick="cellTap(6)"></div><div class="cell" onclick="cellTap(7)"></div><div class="cell" onclick="cellTap(8)"></div>
        </div></div>
    </div>

    <div id="rulesModal" style="display:none;" class="modal bg-black/95">
        <div class="bg-zinc-900 p-8 rounded-3xl border-2 border-[#00f2ff] max-w-xs text-center">
            <h3 class="text-[#00f2ff] text-2xl font-bold mb-4">איך משחקים?</h3>
            <p class="text-right text-zinc-300 mb-6">עונים על שאלה, מסמנים בלוח. לכל אחד רק 3 סימנים. הרביעי ימחק את הישן ביותר!</p>
            <button onclick="hideModal('rulesModal')" class="btn btn-gold w-full">הבנתי</button>
        </div>
    </div>

    <div id="vocabModal" style="display:none;" class="modal bg-black/95">
        <div class="bg-zinc-900 p-6 rounded-3xl border-2 border-[#facc15] w-80">
            <h3 class="text-white font-bold text-center mb-4 text-xl">הזן מילים לתרגול</h3>
            <textarea id="vInput" placeholder="dog - כלב" class="w-full h-44 bg-black text-white p-4 rounded-xl border border-zinc-800 text-right mb-4"></textarea>
            <button onclick="saveVocab()" class="btn btn-gold w-full">שמור</button>
        </div>
    </div>

    <div id="quiz" style="display:none;" class="modal bg-black/98"><div id="qText" class="text-6xl font-black mb-12 italic"></div><div id="qOpts" class="flex flex-col items-center w-full px-10"></div></div>

    <script>
        window.vocab = [];
        window.state = { board: Array(9).fill(""), turn: "X", history: {X:[], O:[]}, canMove: false, asking: false };
        const showModal = (id) => document.getElementById(id).style.display = 'flex';
        const hideModal = (id) => document.getElementById(id).style.display = 'none';
        
        function copyLink() {
            const el = document.getElementById('gameLinkDisplay');
            el.select(); document.execCommand('copy');
            alert("הקישור הועתק!");
        }

        function saveVocab() {
            window.vocab = document.getElementById('vInput').value.split('\n').map(l => {
                const p = l.split('-');
                return p.length === 2 ? { en: p[0].trim(), he: p[1].trim() } : null;
            }).filter(x => x);
            hideModal('vocabModal');
        }

        function initGame(m) {
            if (vocab.length < 3) return showModal('vocabModal');
            window.mode = m; hideModal('lobby'); showModal('gameUI'); render(); ask();
        }

        function ask() {
            const item = vocab[Math.floor(Math.random()*vocab.length)];
            const opts = [item.he];
            while(opts.length < Math.min(4, vocab.length)) {
                const r = vocab[Math.floor(Math.random()*vocab.length)].he;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            document.getElementById('qText').textContent = item.en;
            document.getElementById('qText').className = `text-6xl font-black mb-12 italic text-center ${state.turn==='X'?'x-neon':'o-neon'}`;
            const container = document.getElementById('qOpts'); container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn border border-zinc-800 text-white w-full'; b.textContent = o;
                b.onclick = () => {
                    if(o === item.he) { b.style.background = '#22c55e'; setTimeout(() => { hideModal('quiz'); state.canMove = true; state.asking = false; }, 600); }
                    else { b.style.background = '#ef4444'; setTimeout(() => { hideModal('quiz'); state.asking = false; nextTurn(); }, 1000); }
                };
                container.appendChild(b);
            });
            showModal('quiz');
        }

        function cellTap(i) {
            if (!state.canMove || state.board[i] !== "") return;
            if (window.mode === "online" && state.turn !== window.myRole) return;
            state.board[i] = state.turn;
            state.history[state.turn].push(i);
            if(state.history[state.turn].length > 3) state.board[state.history[state.turn].shift()] = "";
            state.canMove = false; render();
            if (window.mode === "online") syncMove();
            if(checkWin()) { confetti(); alert(`ניצחון ל-${state.turn}!`); location.reload(); }
            else nextTurn();
        }

        function nextTurn() {
            state.turn = state.turn === "X" ? "O" : "X"; render();
            if (window.mode === "online") syncMove();
            else if (window.mode === "ai" && state.turn === "O") setTimeout(() => {
                const empty = state.board.map((v,i) => v===""?i:null).filter(v=>v!==null);
                if(empty.length) { state.canMove = true; cellTap(empty[Math.floor(Math.random()*empty.length)]); }
            }, 800);
            else setTimeout(ask, 500);
        }

        function render() {
            document.getElementById('turnInfo').textContent = `תור השחקן ${state.turn}`;
            document.getElementById('turnInfo').style.color = state.turn === 'X' ? "#00f2ff" : "#bc13fe";
            document.querySelectorAll('.cell').forEach((c, i) => {
                const val = state.board[i];
                c.textContent = val === "X" ? "✕" : (val === "O" ? "◯" : "");
                let cls = val === 'X' ? 'x-neon' : (val === 'O' ? 'o-neon' : '');
                if (val && state.history[val].length === 3 && state.history[val][0] === i) cls += " ghost";
                c.className = "cell " + cls;
            });
        }

        function checkWin() {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(p => state.board[p[0]] && state.board[p[0]] === state.board[p[1]] && state.board[p[0]] === state.board[p[2]]);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('game')) joinGame(params.get('game'));
        };
    </script>
</body>
</html>
